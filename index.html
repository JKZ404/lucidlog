// Image generation with retry and DOM update (v5 — uses provider orchestrator)
async function triggerImageGeneration(dreamId, retryCount = 0, options = {}) {
  const imageGenOn = await getSetting('imageGen', true);
  if (!imageGenOn) return;

  // 1. If we already have a valid image AND not forcing regenerate, use it.
  if (!options.force) {
    const existing = await getDreamImage(dreamId);
    if (existing && existing.url && retryCount === 0) {
      updateImageInDOM(dreamId, existing.url, existing);
      return;
    }
  }

  // 2. Remove any previously stored (possibly broken) entry.
  await deleteDreamImage(dreamId);

  // Show shimmer while generating
  showImageLoadingInDOM(dreamId);

  // If offline, fall back to procedural SVG (don't mark pending — generate immediately)
  if (!navigator.onLine) {
    const result = await generateDreamImage(dreamId, options);
    if (result) {
      await putDreamImage(dreamId, result);
      updateImageInDOM(dreamId, result.url, result);
    } else {
      showImageFallbackInDOM(dreamId);
    }
    return;
  }

  // 3. Pick style if not specified
  if (!options.style) {
    const dream = await getDream(dreamId);
    if (dream) options.style = await pickStyleForDream(dream);
  }

  // 4. Try generation via orchestrator (handles provider fallback + procedural fallback)
  const result = await generateDreamImage(dreamId, options);
  if (result && result.url) {
    // Add to multi-image gallery (also writes to legacy store for backward compat)
    await addDreamImage(dreamId, result);
    await putDreamImage(dreamId, result);  // legacy
    updateImageInDOM(dreamId, result.url, result);
    // If procedural (offline-fallback) and we're back online, mark pending to retry later
    if (result.procedural && navigator.onLine) {
      const d = await getDream(dreamId);
      if (d) await putDream({ ...d, imagePending: true });
    } else {
      const d = await getDream(dreamId);
      if (d && d.imagePending) await putDream({ ...d, imagePending: false });
    }
    // Dispatch event so detail view can refresh gallery if open
    window.dispatchEvent(new CustomEvent('dream-image-added', { detail: { dreamId, image: result } }));
  } else {
    showImageFallbackInDOM(dreamId);
  }
}

// Retry pending images on app open
async function retryPendingImages() {
  const dreams = await getAllDreams();
  // Also populate cache for all existing images
  window.__dreamImageCache = window.__dreamImageCache || {};
  for (const d of dreams) {
    const rec = await getDreamImage(d.id);
    if (rec && typeof rec.url === 'string' && rec.url.length > 0) {
      window.__dreamImageCache[d.id] = rec.url;
    } else if (rec && typeof rec.url === 'object' && rec.url && typeof rec.url.url === 'string') {
      // Repair legacy bad data
      window.__dreamImageCache[d.id] = rec.url.url;
      await putDreamImage(d.id, rec.url.url);
    } else if (rec) {
      // Bad record — clean up
      await deleteDreamImage(d.id);
    }
  }
  // Retry pending
  for (const d of dreams) {
    if (d.imagePending && navigator.onLine) {
      await putDream({...d, imagePending: false});
      triggerImageGeneration(d.id);
    }
  }
}

// Async image loader
async function loadImagesIntoDOM(dreamIds, container) {
  window.__dreamImageCache = window.__dreamImageCache || {};
  for (const id of dreamIds) {
    const rec = await getDreamImage(id);
    // Defensive: only cache if url is a non-empty string
    if (rec && typeof rec.url === 'string' && rec.url.length > 0) {
      window.__dreamImageCache[id] = rec.url;
    } else if (rec && typeof rec.url === 'object') {
      // Legacy bad data: rec.url is an object (from old putDreamImage bug).
      // Try to extract the actual url string, or clean up.
      if (rec.url && typeof rec.url.url === 'string') {
        window.__dreamImageCache[id] = rec.url.url;
        // Repair the stored record
        await putDreamImage(id, rec.url.url);
      } else {
        // Unrecoverable — delete the bad record so it can regenerate
        await deleteDreamImage(id);
      }
    }
  }
  if (!container) container = document;
  for (const id of dreamIds) {
    const url = window.__dreamImageCache[id];
    if (!url || typeof url !== 'string') continue;
    const thumb = container.querySelector(`[data-thumb="${id}"]`);
    if (thumb) thumb.innerHTML = `<img src="${url}" alt="" loading="lazy">`;
    const banner = container.querySelector(`[data-banner="${id}"]`);
    if (banner) banner.innerHTML = `<img class="dream-banner" src="${url}" alt="Dream illustration" loading="lazy">`;
  }
}

// Animate a number from 0 to target value over duration
function animateCounter(el, target, duration=900, suffix='') {
  if (!el) return;
  const start = 0;
  const startTime = performance.now();
  const isFloat = !Number.isInteger(target);
  function step(now) {
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / duration);
    // ease-out-expo
    const eased = t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    const val = start + (target - start) * eased;
    el.textContent = (isFloat ? val.toFixed(1) : Math.round(val)) + suffix;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

}

function renderDreamList(filter='all',search='') {
  let dreams=[...dreamsCache].reverse();
  if(filter==='lucid') dreams=dreams.filter(d=>d.isLucid);
  else if(filter==='non-lucid') dreams=dreams.filter(d=>!d.isLucid);
  else if(filter.startsWith('sign:')) { const w=filter.replace('sign:','').toLowerCase(); dreams=dreams.filter(d=>(d.narrative||'').toLowerCase().includes(w)||(d.title||'').toLowerCase().includes(w)); }
  if(currentJournalTag) dreams=dreams.filter(d=>d.tags&&d.tags.includes(currentJournalTag));
  if(search){const q=search.toLowerCase();dreams=dreams.filter(d=>d.title.toLowerCase().includes(q)||d.narrative.toLowerCase().includes(q));}
  if(!dreams.length) return `<div class="empty-state" style="padding:40px 0;"><svg width="56" height="56" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="24" stroke="var(--accent)" stroke-width="1" opacity="0.25"/><path d="M32 8 A24 24 0 1 1 32 56 A12 24 0 1 0 32 8Z" fill="var(--accent)" opacity="0.12"/></svg><h3>${search?'No matching dreams':'Your journal awaits'}</h3><p>${search?'Try a different search term or filter.':'Record your dreams to discover patterns and improve recall.'}</p>${!search?'<button class="btn btn-primary btn-sm" onclick="openDreamForm()">Log a dream</button>':''}</div>`;
  return `<div class="dream-list">${dreams.map(d=>renderDreamCard(d)).join('')}</div>`;
}

function renderDreamCard(d) {
  const isLucid = d.isLucid;
  const date = new Date(d.date + 'T00:00:00');
  const dayLabel = date.toLocaleDateString('en', { month: 'short', day: 'numeric' });
  const stars = Array.from({length: 5}, (_, i) => `<span class="l-star${i < (d.lucidityLevel || 0) ? '' : ' dim'}">&#9733;</span>`).join('');
  const preview = (d.narrative || '').slice(0, 140) + ((d.narrative || '').length > 140 ? '…' : '');
  return `<div class="dream-entry-card ${isLucid ? 'is-lucid' : ''}" onclick="viewDream('${d.id}')" tabindex="0" role="button" aria-label="View dream: ${escapeHtml(d.title)}">
    <div class="dream-thumb" data-thumb="${d.id}">
      ${renderThumb(d.id)}
      ${isLucid ? '<div class="thumb-lucid-badge">Lucid</div>' : ''}
      <div class="thumb-date-badge">${dayLabel}</div>
    </div>
    <div class="dream-body">
      <div class="dream-title"><span class="dream-title-text">${escapeHtml(d.title)}</span>${isLucid ? '<span class="lucid-star-marker" title="Lucid dream">&#9733;</span>' : ''}</div>
      <div class="dream-preview">${escapeHtml(preview)}</div>
      <div class="dream-bottom">
        <div class="dream-lucidity" title="Lucidity level">${stars}</div>
        ${d.emotions ? d.emotions.slice(0, 3).map(e => `<span class="badge badge-accent" style="font-size:0.68rem;">${e}</span>`).join('') : ''}
        ${d.tags && d.tags.length ? d.tags.slice(0, 2).map(t => `<span class="badge" style="background:rgba(245,217,122,0.1);color:var(--gold);font-size:0.65rem;">#${escapeHtml(t)}</span>`).join('') : ''}
      </div>
    </div>
  </div>`;
}

            <select id="lucidTrigger">
              ${['Reality check','Dream sign recognised','Spontaneous','WILD transition','MILD intention','SSILD','WBTB','Other'].map(o => `<option value="${o}" ${existing&&existing.lucidTrigger===o?'selected':''}>${o}</option>`).join('')}

          <div class="emotion-chips" id="stabilizationChips">
            ${['Hand rubbing','Spinning','Touching walls','Looking at hands','Verbal affirmation','Falling backwards','Other'].map(t => `<button class="chip${existing&&existing.stabilization&&existing.stabilization.includes(t)?' selected':''}" data-stab="${t}">${t}</button>`).join('')}

  // Stabilization chips (separate from emotions)
  overlay.querySelectorAll('#stabilizationChips .chip').forEach(chip=>{chip.addEventListener('click',()=>chip.classList.toggle('selected'));});
  // Toggle lucid extras visibility based on isLucid toggle
  const lucidToggleEl = overlay.querySelector('#isLucidToggle');
  const lucidExtras = overlay.querySelector('#lucidExtras');
  if (lucidToggleEl && lucidExtras) {
    lucidToggleEl.addEventListener('change', () => {
      lucidExtras.style.display = lucidToggleEl.checked ? 'block' : 'none';
    });
  }
  // Tag input: Enter to add, comma to add
  const tagInput = overlay.querySelector('#dreamTags');
  if (tagInput) {
    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();

}

async function saveDream(editId) {
  const modal=document.getElementById('dreamModal');
  const title=modal.querySelector('#dreamTitle').value.trim();
  const date=modal.querySelector('#dreamDate').value;
  const time=modal.querySelector('#dreamTime').value;
  const narrative=modal.querySelector('#dreamNarrative').value.trim();
  const lucidityLevel=[...modal.querySelectorAll('.star-btn.filled')].length;
  const isLucid=modal.querySelector('#isLucidToggle').checked;
  const emotions=[...modal.querySelectorAll('#emotionChips .chip.selected')].map(c=>c.dataset.emotion);
  const tagPills=[...modal.querySelectorAll('#tagList .tag-pill')].map(p=>p.dataset.tag);
  const tags=tagPills.slice(0, CONFIG.maxTagsPerDream);
  const lucidDuration = parseFloat(modal.querySelector('#lucidDuration')?.value) || 0;
  const lucidTrigger = modal.querySelector('#lucidTrigger')?.value || '';
  const stabilization = [...modal.querySelectorAll('#stabilizationChips .chip.selected')].map(c=>c.dataset.stab);
  if(!title){showToast('Please add a title','alert-circle');return;}
  if(!narrative){showToast('Describe your dream to save it','alert-circle');return;}
  let dreamId = editId;
  if(editId) {
    const existing = await getDream(editId);
    await putDream({ ...existing, title, date, time, narrative, lucidityLevel, isLucid, emotions, tags, lucidDuration, lucidTrigger, stabilization });
  } else {
    dreamId = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    await putDream({ id: dreamId, title, date, time, narrative, lucidityLevel, isLucid, emotions, tags, lucidDuration, lucidTrigger, stabilization, createdAt: Date.now() });
  }
  closeModal(); showToast(editId?'Dream updated':'Dream saved');
  await refreshCache();
  checkAchievements();
  await renderPage(currentPage);
  if (dreamId) triggerImageGeneration(dreamId);
}

async function regenerateImage(dreamId) {
  await deleteDreamImage(dreamId);
  if (window.__dreamImageCache) delete window.__dreamImageCache[dreamId];
  // Show shimmer in current banner while regenerating
  const banner = document.querySelector(`[data-banner="${dreamId}"]`);
  if (banner) banner.innerHTML = `<div class="dream-banner-shimmer shimmer"></div>`;
  const thumb = document.querySelector(`[data-thumb="${dreamId}"]`);
  if (thumb) thumb.innerHTML = `<div class="thumb-shimmer shimmer"></div>`;
  showToast('Regenerating dream art...', 'image');
  triggerImageGeneration(dreamId, 0);
}

function addTag(tag) {
  tag = (tag||'').trim().toLowerCase().replace(/^#/, '');
  if (!tag) return;
  if (tag.length > 24) { showToast('Tag too long (max 24 chars)', 'alert-circle'); return; }
  const modal = document.getElementById('dreamModal');
  if (!modal) return;
  const list = modal.querySelector('#tagList');
  if (!list) return;
  const existing = [...list.querySelectorAll('.tag-pill')].map(p => p.dataset.tag);
  if (existing.includes(tag)) { showToast('Tag already added', 'alert-circle'); return; }
  if (existing.length >= CONFIG.maxTagsPerDream) { showToast(`Max ${CONFIG.maxTagsPerDream} tags per dream`, 'alert-circle'); return; }
  const pill = document.createElement('span');
  pill.className = 'tag-pill';
  pill.dataset.tag = tag;
  pill.innerHTML = `${escapeHtml(tag)}<button type="button" class="tag-remove" onclick="removeTag('${tag.replace(/'/g,"\\'")}')">&times;</button>`;
  list.appendChild(pill);
  const input = modal.querySelector('#dreamTags');
  if (input) input.value = '';
}

function removeTag(tag) {
  const modal = document.getElementById('dreamModal');
  if (!modal) return;
  const pill = modal.querySelector(`#tagList .tag-pill[data-tag="${CSS.escape(tag)}"]`);
  if (pill) pill.remove();
}

function renderRealityCheck() {
  const awarenessScore = getRCAwarenessScore();

  const awarenessLabel = awarenessScore >= 75 ? 'Highly mindful' : awarenessScore >= 50 ? 'Mindful' : awarenessScore >= 25 ? 'Building habit' : 'Just starting';
  return `<div class="page"><h1 style="margin-bottom:6px;">Reality Checks</h1><p class="text-muted" style="margin-bottom:24px;max-width:560px;">Reality checks are the foundation of lucid dreaming. Perform them mindfully throughout the day, and the habit will carry into your dreams.</p>

    <div class="card rc-awareness-ring" style="margin-bottom:20px;">
      ${getRCAwarenessRing(awarenessScore)}
      <div class="ring-body">
        <h3>Daytime Awareness</h3>
        <p class="text-muted" style="font-size:0.86rem;line-height:1.6;">${awarenessLabel}. ${todayCount} check${todayCount===1?'':'s'} today, ${weekCount} this week. Aim for 3+ mindful checks daily.</p>

async function logRCSession(technique, result) {
  const id = 'rc_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const entry = {
    id, technique, result,
    timestamp: Date.now(),
    date: new Date().toISOString().split('T')[0],
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  };
  await putRCLog(entry);
  closeModal();
  const msg = result === 'dreaming' ? 'You became lucid! Log your dream in the journal.' : result === 'awake' ? 'Reality check logged. Stay mindful.' : 'Reality check logged. Try another technique.';
  showToast(msg, result === 'dreaming' ? 'sparkles' : 'check-circle');
  await refreshCache();
  if (currentPage === 'reality-check') await renderPage(currentPage);
}

function getRCAwarenessScore() {
  // Score 0-100 based on last 7 days of RC log entries
  const cutoff = Date.now() - 7 * 86400000;
  const recent = rcLogCache.filter(r => r.timestamp >= cutoff);
  const today = new Date().toISOString().split('T')[0];
  const todayCount = recent.filter(r => r.date === today).length;
  // 7-day average: 3+ checks/day = 100
  const avgPerDay = recent.length / 7;
  const frequencyScore = Math.min(60, (avgPerDay / 3) * 60);
  // Today bonus: up to 20 points for checking today
  const todayScore = Math.min(20, todayCount * 7);
  // Streak bonus: 20 points for 7-day streak
  const uniqueDates = [...new Set(recent.map(r => r.date))];
  const streakScore = uniqueDates.length >= 7 ? 20 : (uniqueDates.length / 7) * 20;
  return Math.round(frequencyScore + todayScore + streakScore);
}

function getRCAwarenessRing(score) {
  const sz = 80, r = 34, c = 2 * Math.PI * r;
  const filled = (score / 100) * c;
  const color = score >= 75 ? 'var(--success)' : score >= 50 ? 'var(--accent)' : score >= 25 ? 'var(--warning)' : 'var(--danger)';
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" class="ring-svg">
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--card-border)" stroke-width="6"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${filled} ${c}" stroke-linecap="round"
      transform="rotate(-90 ${sz/2} ${sz/2})"/>
    <text x="${sz/2}" y="${sz/2 + 6}" text-anchor="middle" class="ring-text" font-size="1.4rem">${score}</text>
  </svg>`;
}

function timeToMinutes(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function minutesToTime(m){m=((m%1440)+1440)%1440;return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;}
function calculateREMWindows(bedtime,waketime){let bed=timeToMinutes(bedtime),wake=timeToMinutes(waketime);if(wake<=bed)wake+=1440;const total=wake-bed,windows=[];let s=bed+70,len=10,c=1;while(s<wake){windows.push({start:s,end:Math.min(s+len,wake),cycle:c,isOptimal:c>=3});s+=90;len=Math.min(len+10,40);c++;}return{windows,total,bed,wake};}
function calculateWBTB(bedtime,waketime){const{windows}=calculateREMWindows(bedtime,waketime);const o=windows.find(w=>w.isOptimal);return o?minutesToTime(o.start-5):windows.length?minutesToTime(windows[windows.length-1].start-5):'04:30';}
function renderREMTimeline({windows,total,bed,wake}){
  const h=100,w=700,pad=44,barY=36,barH=28,barW=w-pad*2;
  let s=`<svg viewBox="0 0 ${w} ${h}" fill="none" role="img" aria-label="REM timeline">
    <defs>
      <linearGradient id="remSleepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(159,234,232,0.1)"/>
        <stop offset="50%" stop-color="rgba(159,234,232,0.2)"/>
        <stop offset="100%" stop-color="rgba(159,234,232,0.1)"/>
      </linearGradient>
      <linearGradient id="remBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#B8F5F3"/>
        <stop offset="100%" stop-color="#5FBDB9"/>
      </linearGradient>
      <linearGradient id="remBarOptimal" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#FFE08A"/>
        <stop offset="100%" stop-color="#F5D97A"/>
      </linearGradient>
      <filter id="remGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <rect x="${pad}" y="${barY}" width="${barW}" height="${barH}" rx="6" fill="url(#remSleepGrad)" stroke="rgba(159,234,232,0.2)" stroke-width="1"/>`;

// ---- Sleep Tracker ----
async function renderSleepTracker() {
  const today = new Date().toISOString().split('T')[0];
  const todayLog = await getSleepLog(today);
  // Last 7 days
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const dStr = d.toISOString().split('T')[0];
    const log = sleepLogCache.find(l => l.date === dStr);
    last7.push({ date: dStr, dayLabel: d.toLocaleDateString('en', { weekday: 'short' }), log });
  }
  const logsThisWeek = last7.filter(d => d.log);
  const avgHours = logsThisWeek.length
    ? (logsThisWeek.reduce((s, d) => s + (d.log.hoursSlept || 0), 0) / logsThisWeek.length).toFixed(1)
    : '—';
  const avgQuality = logsThisWeek.length
    ? (logsThisWeek.reduce((s, d) => s + (d.log.quality || 0), 0) / logsThisWeek.length).toFixed(1)
    : '—';
  const sleepDebt = logsThisWeek.length
    ? Math.max(0, (CONFIG.sleepDebtTargetHours * 7) - logsThisWeek.reduce((s, d) => s + (d.log.hoursSlept || 0), 0)).toFixed(1)
    : '—';

  // Build trend chart SVG
  const svgW = 600, svgH = 180, pad = 30, barW = 50, gap = 18;
  const plotH = svgH - pad * 2;
  const maxH = 12; // 12 hours max for y-axis
  let trendSvg = `<svg viewBox="0 0 ${svgW} ${svgH}" class="sleep-trend-svg" fill="none" role="img" aria-label="Sleep trend last 7 days">`;
  // Y-axis grid lines
  for (let h = 0; h <= 12; h += 3) {
    const y = pad + plotH - (h / maxH) * plotH;
    trendSvg += `<line x1="${pad}" y1="${y}" x2="${svgW - pad}" y2="${y}" stroke="var(--card-border)" stroke-width="0.5" opacity="0.3"/>`;
    trendSvg += `<text x="${pad - 6}" y="${y + 3}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="JetBrains Mono,monospace">${h}h</text>`;
  }
  // Target line
  const targetY = pad + plotH - (CONFIG.sleepDebtTargetHours / maxH) * plotH;
  trendSvg += `<line x1="${pad}" y1="${targetY}" x2="${svgW - pad}" y2="${targetY}" stroke="var(--gold)" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>`;
  trendSvg += `<text x="${svgW - pad}" y="${targetY - 4}" text-anchor="end" fill="var(--gold)" font-size="9">Target: ${CONFIG.sleepDebtTargetHours}h</text>`;
  // Bars
  const totalBarsW = last7.length * barW + (last7.length - 1) * gap;
  const startX = (svgW - totalBarsW) / 2;
  last7.forEach((d, i) => {
    const x = startX + i * (barW + gap);
    const hrs = d.log ? (d.log.hoursSlept || 0) : 0;
    const h = (hrs / maxH) * plotH;
    const y = pad + plotH - h;
    const fill = d.log ? (hrs >= CONFIG.sleepDebtTargetHours ? 'var(--accent)' : 'rgba(159,234,232,0.4)') : 'var(--card-border)';
    trendSvg += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(h, 1)}" rx="3" fill="${fill}" opacity="${d.log ? 0.8 : 0.2}"/>`;
    if (d.log) trendSvg += `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" fill="var(--accent)" font-size="10" font-family="JetBrains Mono,monospace">${hrs.toFixed(1)}h</text>`;
    trendSvg += `<text x="${x + barW/2}" y="${pad + plotH + 14}" text-anchor="middle" fill="var(--muted)" font-size="10">${d.dayLabel}</text>`;
  });
  trendSvg += `</svg>`;

  // Build list of last 14 sleep logs (most recent first)
  const recentLogs = [...sleepLogCache].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 14);

  return `<div class="page">
    <div class="journal-header"><h1>Sleep Log</h1><button class="btn btn-primary" onclick="openSleepLogForm()"><i data-lucide="plus" style="width:16px;height:16px;"></i> Log Last Night</button></div>
    <p class="text-muted" style="margin-bottom:20px;max-width:560px;">Sleep is the foundation of dream recall and lucidity. Track your sleep to see how it affects your dreams.</p>

    <div class="card sleep-summary-card" style="margin-bottom:20px;">
      <div class="sleep-stat"><div class="val">${avgHours}h</div><div class="lbl">Avg sleep (7d)</div></div>
      <div class="sleep-stat"><div class="val">${avgQuality}<span style="font-size:0.9rem;opacity:0.5;">/5</span></div><div class="lbl">Avg quality (7d)</div></div>
      <div class="sleep-stat"><div class="val" style="color:${sleepDebt==='0.0'?'var(--success)':'var(--warning)'};">${sleepDebt}h</div><div class="lbl">Sleep debt (7d)</div></div>
      <div class="sleep-stat"><div class="val">${logsThisWeek.length}<span style="font-size:0.9rem;opacity:0.5;">/7</span></div><div class="lbl">Days logged</div></div>
    </div>

    <div class="card stat-chart-card" style="margin-bottom:20px;">
      <h3 style="margin-bottom:12px;">Last 7 Nights</h3>
      ${trendSvg}
      <div style="display:flex;gap:14px;margin-top:10px;font-size:0.78rem;color:var(--muted);flex-wrap:wrap;">
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--accent);"></span> Met target</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(159,234,232,0.4);"></span> Below target</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--card-border);opacity:0.5;"></span> Not logged</span>
      </div>
    </div>

    ${recentLogs.length === 0
      ? `<div class="card empty-state"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><path d="M16 32 Q16 22 24 22 L40 22 Q48 22 48 32 L48 42 Q48 50 40 50 L24 50 Q16 50 16 42 Z" stroke="var(--accent)" stroke-width="1.5" opacity="0.4"/><circle cx="32" cy="36" r="3" fill="var(--accent)" opacity="0.5"/></svg><h3>No sleep logs yet</h3><p>Log last night's sleep to start tracking trends and seeing how it affects your dreams.</p><button class="btn btn-primary" onclick="openSleepLogForm()">Log last night</button></div>`
      : `<div class="card" style="padding:18px;">
          <h3 style="margin-bottom:14px;">Recent Logs</h3>
          <div class="sleep-log-row" style="font-weight:600;font-size:0.78rem;color:var(--muted);border:none;background:transparent;padding:4px 12px;">
            <span>Date</span><span>Bed / Wake</span><span style="text-align:center;">Hours</span><span style="text-align:center;">Quality</span><span></span>
          </div>
          ${recentLogs.map(l => {
            const d = new Date(l.date + 'T00:00:00');
            const dStr = d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
            const q = l.quality || 0;
            const stars = Array.from({length: 5}, (_, i) => `<span class="star-mini" style="opacity:${i < q ? '1' : '0.2'};">&#9733;</span>`).join('');
            return `<div class="sleep-log-row" onclick="openSleepLogForm('${l.date}')" style="cursor:pointer;" tabindex="0" role="button" aria-label="Edit sleep log for ${l.date}">
              <span class="sleep-date">${dStr}</span>
              <span class="sleep-times">${l.bedtime || '—'} &rarr; ${l.waketime || '—'}</span>
              <span class="sleep-hrs">${(l.hoursSlept || 0).toFixed(1)}</span>
              <span class="sleep-q">${stars}</span>
              <span style="text-align:right;"><i data-lucide="chevron-right" style="width:14px;height:14px;color:var(--muted);"></i></span>
            </div>`;
          }).join('')}
        </div>`}
  </div>`;
}

async function saveSleepLog() {
  const modal = document.getElementById('dreamModal');
  const date = modal.querySelector('#sleepDate').value;
  const bedtime = modal.querySelector('#sleepBedtime').value;
  const waketime = modal.querySelector('#sleepWaketime').value;
  const quality = [...modal.querySelectorAll('.qbar.filled')].length;
  const dreamsRecalled = parseInt(modal.querySelector('#sleepDreamsRecalled').value) || 0;
  const notes = modal.querySelector('#sleepNotes').value.trim();
  if (!date) { showToast('Date required', 'alert-circle'); return; }
  if (!bedtime || !waketime) { showToast('Please set bedtime and wake time', 'alert-circle'); return; }
  // Calculate hours slept
  const [bh, bm] = bedtime.split(':').map(Number);
  const [wh, wm] = waketime.split(':').map(Number);
  let mins = (wh * 60 + wm) - (bh * 60 + bm);
  if (mins < 0) mins += 1440; // Overnight
  const hoursSlept = mins / 60;
  const existing = await getSleepLog(date);
  await putSleepLog({
    date, bedtime, waketime, quality, dreamsRecalled, notes, hoursSlept,
    updatedAt: Date.now(),
    createdAt: existing ? existing.createdAt : Date.now()
  });
  closeModal();
  showToast(existing ? 'Sleep log updated' : 'Sleep logged');
  await refreshCache();
  await renderPage(currentPage);
}

  await refreshCache();
  await renderPage(currentPage);
}

let wbtbAlarmTimer = null;
function setWBTBAlarm() {
  const delay = 5.5 * 3600000; // 5h30m
  if (!('Notification' in window)) {
    showToast('Notifications not supported in this browser', 'alert-circle');
    return;
  }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      clearTimeout(wbtbAlarmTimer);
      wbtbAlarmTimer = setTimeout(() => {
        new Notification('LucidLog — WBTB Alarm', {
          body: 'Time to wake up! Stay up for 20-30 minutes, review your dream signs, then return to bed with lucid intention.',
          icon: window.__MOON_ICON_512 || '',
          tag: 'lucidlog-wbtb'
        });
      }, delay);
      showToast(`WBTB alarm set for 5h 30m from now`, 'alarm-clock');
    } else {
      showToast('Notification permission denied. WBTB alarm cannot fire.', 'alert-circle');
    }
  });
}

function renderConstellation() {
  if (!dreamsCache.length) {
    return `<div class="page"><h1 style="margin-bottom:6px;">Constellation</h1><div class="card empty-state" style="margin-top:24px;"><svg width="72" height="72" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="30" stroke="var(--accent)" stroke-width="1" opacity="0.2"/><circle cx="40" cy="40" r="2" fill="var(--accent)" opacity="0.5"/><circle cx="25" cy="30" r="1.5" fill="var(--accent)" opacity="0.3"/><circle cx="55" cy="25" r="1.5" fill="var(--accent)" opacity="0.3"/><circle cx="50" cy="55" r="1.5" fill="var(--accent)" opacity="0.3"/></svg><h3>Your sky is empty</h3><p>Log dreams to fill your personal cosmos. Each dream becomes a star.</p><button class="btn btn-primary btn-sm" onclick="openDreamForm()">Log a dream</button></div></div>`;
  }

  const svgW = 800, svgH = 500, padX = 50, padY = 40;
  const plotW = svgW - padX * 2, plotH = svgH - padY * 2;

  // Date range
  const dates = dreamsCache.map(d => new Date(d.date + 'T00:00:00').getTime());
  const minDate = Math.min(...dates), maxDate = Math.max(...dates);
  const dateRange = maxDate - minDate || 86400000;

  // Build star data
  const stars = dreamsCache.map(d => {
    const dateMs = new Date(d.date + 'T00:00:00').getTime();
    const x = padX + ((dateMs - minDate) / dateRange) * plotW;
    const timeParts = (d.time || '06:00').split(':');
    const hour = parseInt(timeParts[0] || 6) + parseInt(timeParts[1] || 0) / 60;
    const y = padY + plotH - (hour / 24) * plotH;
    const wordCount = (d.narrative || '').split(/\s+/).filter(Boolean).length;
    const size = Math.max(3, Math.min(10, wordCount / 15));
    return { ...d, x, y, size };
  });

  // Sort stars chronologically for connecting lines (most recent 8)
  const chronoStars = [...stars].sort((a, b) => new Date(a.date) - new Date(b.date));
  const connectStars = chronoStars.slice(-12);

  // Y-axis labels + grid lines (dotted, faint)
  const yLabels = [0, 3, 6, 9, 12, 15, 18, 21, 24].map(h => {
    const y = padY + plotH - (h / 24) * plotH;
    const label = h === 0 ? '12am' : h < 12 ? h + 'am' : h === 12 ? '12pm' : (h-12) + 'pm';
    return `<text x="${padX - 8}" y="${y + 4}" text-anchor="end" class="axis-label">${label}</text><line x1="${padX}" y1="${y}" x2="${svgW - padX}" y2="${y}" class="grid-line"/>`;
  }).join('');

  // Build connecting line path
  let linePath = '';
  if (connectStars.length >= 2) {
    linePath = 'M ' + connectStars.map(s => `${s.x.toFixed(1)} ${s.y.toFixed(1)}`).join(' L ');
  }

  // Build defs (gradients + filters)
  const defs = `<defs>
    <radialGradient id="lucidStarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8F5F3" stop-opacity="1"/>
      <stop offset="40%" stop-color="#9FEAE8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5FBDB9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dimStarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9FEAE8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9FEAE8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="constLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(159,234,232,0.4)"/>
      <stop offset="100%" stop-color="rgba(159,234,232,0.15)"/>
    </linearGradient>
    <filter id="lucidGlow2" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // Draw background parallax stars (decorative, inside SVG)
  let bgStarsSvg = '';
  for (let i = 0; i < 60; i++) {
    const x = Math.random() * svgW;
    const y = Math.random() * svgH;
    const r = 0.3 + Math.random() * 0.8;
    const o = 0.1 + Math.random() * 0.3;
    bgStarsSvg += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="#9FEAE8" opacity="${o.toFixed(2)}"/>`;
  }

  // Draw connecting line
  let lineSvg = '';
  if (linePath) {
    lineSvg = `<path d="${linePath}" class="constellation-line" style="--dash:1000;"/>`;
  }

  // Draw stars with rich halos
  let starsSvg = '';
  for (const s of stars) {
    const haloR = s.size * 3;
    const haloGrad = s.isLucid ? 'url(#lucidStarGrad)' : 'url(#dimStarGrad)';
    const coreColor = s.isLucid ? '#B8F5F3' : '#9FEAE8';
    const coreOpacity = s.isLucid ? 1 : 0.6;
    const lucidClass = s.isLucid ? 'star-lucid' : '';

    // Halo (large soft gradient)
    starsSvg += `<circle cx="${s.x.toFixed(1)}" cy="${s.y.toFixed(1)}" r="${haloR.toFixed(1)}" fill="${haloGrad}" opacity="0.5" pointer-events="none"/>`;
    // Glow for lucid
    if (s.isLucid) {
      starsSvg += `<circle cx="${s.x.toFixed(1)}" cy="${s.y.toFixed(1)}" r="${(s.size * 1.5).toFixed(1)}" fill="${coreColor}" opacity="0.4" filter="url(#lucidGlow2)" pointer-events="none"/>`;
      // Cross-flare
      starsSvg += `<line x1="${(s.x - s.size * 3).toFixed(1)}" y1="${s.y.toFixed(1)}" x2="${(s.x + s.size * 3).toFixed(1)}" y2="${s.y.toFixed(1)}" stroke="${coreColor}" stroke-width="0.6" opacity="0.5" pointer-events="none"/>`;
      starsSvg += `<line x1="${s.x.toFixed(1)}" y1="${(s.y - s.size * 3).toFixed(1)}" x2="${s.x.toFixed(1)}" y2="${(s.y + s.size * 3).toFixed(1)}" stroke="${coreColor}" stroke-width="0.6" opacity="0.5" pointer-events="none"/>`;
    }
    // Core star
    starsSvg += `<circle cx="${s.x.toFixed(1)}" cy="${s.y.toFixed(1)}" r="${s.size.toFixed(1)}" fill="${coreColor}" opacity="${coreOpacity}" class="constellation-star ${lucidClass}" data-title="${escapeHtml(s.title)}" data-date="${s.date}" data-lucid="${s.isLucid?'1':'0'}" data-id="${s.id}"/>`;
  }

  const svg = `<svg viewBox="0 0 ${svgW} ${svgH}" class="constellation-svg" fill="none" role="img" aria-label="Dream constellation">
    ${defs}
    ${bgStarsSvg}
    ${yLabels}
    ${lineSvg}
    ${starsSvg}
  </svg>`;

  return `<div class="page">
    <h1 style="margin-bottom:6px;">Constellation</h1>
    <p class="text-muted" style="margin-bottom:20px;max-width:560px;">Each star is a dream. Size shows detail. Bright stars are lucid. Tap a star to see its name.</p>
    <div class="card" style="padding:20px;position:relative;">
      <div class="constellation-container" id="constellationContainer">
        ${svg}
        <div class="constellation-tooltip" id="constTooltip"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:0.8rem;color:var(--muted);flex-wrap:wrap;">
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;"></span> Lucid dream</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:rgba(159,234,232,0.35);flex-shrink:0;"></span> Non-lucid</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="font-size:0.75rem;">Star size = word count</span></span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:18px;height:1px;background:linear-gradient(90deg,rgba(159,234,232,0.4),transparent);border-top:1px dashed rgba(159,234,232,0.4);"></span> Recent dream trail</span>
      </div>
    </div>
  </div>`;
}

// ---- Recurring Elements ----
function renderRecurring() {
  const filterType = window.__recurringFilter || 'all';
  const counts = {};
  for (const el of recurringCache) counts[el.type] = (counts[el.type] || 0) + 1;
  const total = recurringCache.length;
  let filtered = filterType === 'all' ? recurringCache : recurringCache.filter(e => e.type === filterType);
  // Sort: most occurrences first, then by name
  filtered.sort((a, b) => (b.occurrences || 0) - (a.occurrences || 0) || a.name.localeCompare(b.name));

  // Auto-scan narratives for top recurring names (helps discovery)
  const autoDetected = (function() {
    if (!dreamsCache.length) return [];
    // Simple heuristic: find capitalized words that appear in 3+ dreams, not in our recurring list
    const knownNames = new Set(recurringCache.map(e => e.name.toLowerCase()));
    const wordToDreams = {};
    for (const d of dreamsCache) {
      const words = (d.narrative || '').match(/[A-Z][a-z]{2,}/g) || [];
      const unique = new Set(words.map(w => w.toLowerCase()));
      for (const w of unique) {
        if (knownNames.has(w)) continue;
        if (['The','And','But','Was','Were','Had','Have','Did','This','That','Then','When','What','Where','Why','How','There','Here','They','Them','Their','His','Her','She','He','You','Your','With','From','Into','Upon','After','Before'].includes(w)) continue;
        wordToDreams[w] = (wordToDreams[w] || 0) + 1;
      }
    }
    return Object.entries(wordToDreams)
      .filter(([w, c]) => c >= 3)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 5)
      .map(([w, c]) => ({ name: w.charAt(0).toUpperCase() + w.slice(1), count: c }));
  })();

  return `<div class="page">
    <div class="journal-header"><h1>Recurring Elements</h1><button class="btn btn-primary" onclick="openRecurringForm()"><i data-lucide="plus" style="width:16px;height:16px;"></i> New</button></div>
    <p class="text-muted" style="margin-bottom:20px;max-width:560px;">Track people, places, themes, and objects that appear across multiple dreams. Recognising them is key to becoming lucid.</p>

    <div class="stats-grid">
      <div class="card mini-stat"><div class="mini-val">${total}</div><div class="mini-label">Total tracked</div></div>
      <div class="card mini-stat"><div class="mini-val">${counts.character || 0}</div><div class="mini-label">Characters</div></div>
      <div class="card mini-stat"><div class="mini-val">${counts.location || 0}</div><div class="mini-label">Locations</div></div>
      <div class="card mini-stat"><div class="mini-val">${counts.theme || 0}</div><div class="mini-label">Themes</div></div>
    </div>

    <div class="recurring-type-filter">
      <button class="chip ${filterType==='all'?'selected':''}" data-rfilter="all">All</button>
      ${CONFIG.recurringTypes.map(t => `<button class="chip ${filterType===t.id?'selected':''}" data-rfilter="${t.id}">${t.label}</button>`).join('')}
    </div>

    ${filtered.length === 0
      ? `<div class="card empty-state"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="22" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/><path d="M22 32 Q32 22 42 32 Q32 42 22 32" stroke="var(--accent)" stroke-width="1.5" opacity="0.4" fill="none"/></svg><h3>No recurring elements yet</h3><p>Track characters, places, and themes that appear in your dreams to spot patterns.</p><button class="btn btn-primary" onclick="openRecurringForm()">Add your first</button></div>`
      : `<div class="recurring-grid">${filtered.map(el => {
          const tinfo = CONFIG.recurringTypes.find(t => t.id === el.type) || CONFIG.recurringTypes[0];
          return `<div class="recurring-card" onclick="viewRecurring('${el.id}')" tabindex="0" role="button" aria-label="View ${escapeHtml(el.name)}">
            <div class="recurring-icon"><i data-lucide="${tinfo.icon}" style="width:20px;height:20px;"></i></div>
            <div class="recurring-body">
              <div class="recurring-name">${escapeHtml(el.name)}</div>
              <div class="recurring-meta">${tinfo.label} &middot; ${el.occurrences||0} occurrence${(el.occurrences||0)===1?'':'s'}</div>
              ${el.notes ? `<div class="recurring-notes">${escapeHtml(el.notes).slice(0,120)}${el.notes.length>120?'…':''}</div>` : ''}
            </div>
          </div>`;
        }).join('')}</div>`}

    ${autoDetected.length ? `
      <div class="card" style="margin-top:24px;padding:20px;">
        <h3 style="margin-bottom:8px;font-size:1rem;">Suggested from your dreams</h3>
        <p class="text-muted" style="font-size:0.85rem;margin-bottom:14px;">Names that appear in 3+ dreams but aren't tracked yet. Click to add.</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${autoDetected.map(s => `<button class="chip" onclick="quickAddRecurring('${escapeHtml(s.name).replace(/'/g,"\\'")}')">${escapeHtml(s.name)} <span style="opacity:0.6;">(${s.count})</span></button>`).join('')}
        </div>
      </div>` : ''}
  </div>`;
}

    <div style="display:flex;flex-direction:column;gap:18px;">

      <div class="form-group"><label for="recurringType">Type</label>

async function saveRecurring(editId) {
  const modal = document.getElementById('dreamModal');
  const name = modal.querySelector('#recurringName').value.trim();
  const type = modal.querySelector('#recurringType').value;
  const occurrences = parseInt(modal.querySelector('#recurringOccurrences').value) || 0;
  const notes = modal.querySelector('#recurringNotes').value.trim();
  if (!name) { showToast('Please add a name', 'alert-circle'); return; }
  if (editId) {
    const existing = recurringCache.find(e => e.id === editId);
    if (existing) await putRecurring({ ...existing, name, type, occurrences, notes });
  } else {
    const id = 'rec_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    await putRecurring({ id, name, type, occurrences, notes, createdAt: Date.now() });
  }
  closeModal();
  showToast(editId ? 'Element updated' : 'Element added');
  await refreshCache();
  await renderPage(currentPage);
}

// ---- Statistics ----
function renderStats() {
  if (!dreamsCache.length) {
    return `<div class="page"><h1 style="margin-bottom:6px;">Statistics</h1><div class="card empty-state" style="margin-top:24px;"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect x="14" y="36" width="8" height="14" fill="var(--accent)" opacity="0.4"/><rect x="28" y="24" width="8" height="26" fill="var(--accent)" opacity="0.6"/><rect x="42" y="14" width="8" height="36" fill="var(--accent)" opacity="0.8"/></svg><h3>No statistics yet</h3><p>Log dreams to start seeing your patterns and insights.</p><button class="btn btn-primary" onclick="openDreamForm()">Log a dream</button></div></div>`;
  }

  // === Compute statistics ===
  const totalDreams = dreamsCache.length;
  const lucidDreams = dreamsCache.filter(d => d.isLucid).length;
  const lucidityRate = ((lucidDreams / totalDreams) * 100).toFixed(1);
  const avgLucidity = (dreamsCache.reduce((s, d) => s + (d.lucidityLevel || 0), 0) / totalDreams).toFixed(2);
  const avgWordCount = Math.round(dreamsCache.reduce((s, d) => s + (d.narrative || '').split(/\s+/).filter(Boolean).length, 0) / totalDreams);

  // Dreams per month (last 6 months)
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString('en', { month: 'short', year: '2-digit' });
    const dreams = dreamsCache.filter(dr => (dr.date || '').slice(0, 7) === key);
    const lucid = dreams.filter(dr => dr.isLucid).length;
    months.push({ label, total: dreams.length, lucid });
  }

  // Top emotions
  const emotionCounts = {};
  for (const d of dreamsCache) {
    if (!d.emotions) continue;
    for (const e of d.emotions) emotionCounts[e] = (emotionCounts[e] || 0) + 1;
  }
  const topEmotions = Object.entries(emotionCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);

  // Top tags
  const topTags = getAllTagsFromDreams(dreamsCache).slice(0, 6);

  // Day-of-week distribution
  const dowNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const dowCounts = [0, 0, 0, 0, 0, 0, 0];
  for (const d of dreamsCache) {
    const dt = new Date(d.date + 'T00:00:00');
    if (!isNaN(dt)) dowCounts[dt.getDay()]++;
  }

  // Lucidity distribution (0-5 stars)
  const lucidityDist = [0, 0, 0, 0, 0, 0]; // index = level
  for (const d of dreamsCache) lucidityDist[d.lucidityLevel || 0]++;

  // Sleep vs dreams correlation
  const sleepCorrelation = (function() {
    const matched = [];
    for (const sl of sleepLogCache) {
      const dreamsThatDay = dreamsCache.filter(d => d.date === sl.date);
      if (dreamsThatDay.length) {
        matched.push({ hours: sl.hoursSlept || 0, dreams: dreamsThatDay.length, quality: sl.quality || 0 });
      }
    }
    if (matched.length < 3) return null;
    const avgSleep = matched.reduce((s, m) => s + m.hours, 0) / matched.length;
    const avgDreams = matched.reduce((s, m) => s + m.dreams, 0) / matched.length;
    const wellRested = matched.filter(m => m.hours >= avgSleep);
    const poorSleep = matched.filter(m => m.hours < avgSleep);
    return {
      matched: matched.length,
      wellRestedAvg: wellRested.length ? (wellRested.reduce((s, m) => s + m.dreams, 0) / wellRested.length).toFixed(1) : '—',
      poorSleepAvg: poorSleep.length ? (poorSleep.reduce((s, m) => s + m.dreams, 0) / poorSleep.length).toFixed(1) : '—',
      avgSleep: avgSleep.toFixed(1)
    };
  })();

  // === Build charts ===

  // Line chart: dreams per month (smoothed bezier with gradient area fill)
  const lineSvg = (function() {
    const w = 500, h = 220, pad = 36, plotW = w - pad * 2, plotH = h - pad * 2;
    const maxVal = Math.max(...months.map(m => m.total), 1);
    const xStep = plotW / Math.max(months.length - 1, 1);
    const points = months.map((m, i) => ({
      x: pad + i * xStep,
      yTotal: pad + plotH - (m.total / maxVal) * plotH,
      yLucid: pad + plotH - (m.lucid / maxVal) * plotH,
      m
    }));

    // Build smooth cubic bezier path through points (Catmull-Rom to Bezier)
    function smoothPath(pts) {
      if (pts.length < 2) return '';
      let d = `M ${pts[0].x.toFixed(1)} ${pts[0].yTotal.toFixed(1)}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const cp1x = p1.x + (p2.x - p0.x) / 6;
        const cp1y = p1.yTotal + (p2.yTotal - p0.yTotal) / 6;
        const cp2x = p2.x - (p3.x - p1.x) / 6;
        const cp2y = p2.yTotal - (p3.yTotal - p1.yTotal) / 6;
        d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.yTotal.toFixed(1)}`;
      }
      return d;
    }
    function smoothPathLucid(pts) {
      if (pts.length < 2) return '';
      let d = `M ${pts[0].x.toFixed(1)} ${pts[0].yLucid.toFixed(1)}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[i + 2] || p2;
        const cp1x = p1.x + (p2.x - p0.x) / 6;
        const cp1y = p1.yLucid + (p2.yLucid - p0.yLucid) / 6;
        const cp2x = p2.x - (p3.x - p1.x) / 6;
        const cp2y = p2.yLucid - (p3.yLucid - p1.yLucid) / 6;
        d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.yLucid.toFixed(1)}`;
      }
      return d;
    }

    const pathTotal = smoothPath(points);
    const pathLucid = smoothPathLucid(points);
    // Area fill path (close to bottom)
    const areaPath = pathTotal + ` L ${points[points.length-1].x.toFixed(1)} ${(pad + plotH).toFixed(1)} L ${points[0].x.toFixed(1)} ${(pad + plotH).toFixed(1)} Z`;

    let svg = `<svg viewBox="0 0 ${w} ${h}" class="stat-chart-svg" fill="none" role="img" aria-label="Dreams per month">`;
    // Defs: gradients + filter
    svg += `<defs>
      <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#5FBDB9"/>
        <stop offset="50%" stop-color="#9FEAE8"/>
        <stop offset="100%" stop-color="#B8F5F3"/>
      </linearGradient>
      <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#9FEAE8" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#9FEAE8" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="lucidLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#C9A040"/>
        <stop offset="50%" stop-color="#F5D97A"/>
        <stop offset="100%" stop-color="#FFE08A"/>
      </linearGradient>
    </defs>`;
    // Y-axis grid (dashed, faint)
    for (let i = 0; i <= 4; i++) {
      const y = pad + (plotH / 4) * i;
      svg += `<line x1="${pad}" y1="${y}" x2="${w - pad}" y2="${y}" class="grid-line"/>`;
      svg += `<text x="${pad - 6}" y="${y + 3}" text-anchor="end" class="axis-label">${Math.round(maxVal - (maxVal/4)*i)}</text>`;
    }
    // Area fill
    svg += `<path d="${areaPath}" fill="url(#areaGrad)" class="data-area"/>`;
    // Total line
    svg += `<path d="${pathTotal}" stroke="url(#lineGrad)" class="data-line"/>`;
    // Lucid line
    if (points.some(p => p.m.lucid > 0)) {
      svg += `<path d="${pathLucid}" stroke="url(#lucidLineGrad)" class="data-line data-line-lucid"/>`;
    }
    // Points + labels
    points.forEach((p, i) => {
      svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.yTotal.toFixed(1)}" r="3.5" fill="#B8F5F3" class="data-point" style="animation-delay:${0.4 + i*0.1}s"/>`;
      if (p.m.lucid > 0) svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.yLucid.toFixed(1)}" r="3.5" fill="#FFE08A" class="data-point" style="animation-delay:${0.5 + i*0.1}s"/>`;
      svg += `<text x="${p.x.toFixed(1)}" y="${h - pad + 16}" text-anchor="middle" class="axis-label">${p.m.label}</text>`;
    });
    svg += `</svg>`;
    return svg;
  })();

  // Bar chart: day of week (gradient + animated bars)
  const dowSvg = (function() {
    const w = 400, h = 200, pad = 30, plotH = h - pad * 2;
    const maxVal = Math.max(...dowCounts, 1);
    const barW = (w - pad * 2) / 7 - 6;
    let svg = `<svg viewBox="0 0 ${w} ${h}" class="stat-chart-svg" fill="none" role="img" aria-label="Dreams by day of week">`;
    svg += `<defs>
      <linearGradient id="dowBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#B8F5F3"/>
        <stop offset="60%" stop-color="#9FEAE8"/>
        <stop offset="100%" stop-color="#5FBDB9" stop-opacity="0.6"/>
      </linearGradient>
      <linearGradient id="dowBarDim" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(159,234,232,0.25)"/>
        <stop offset="100%" stop-color="rgba(159,234,232,0.05)"/>
      </linearGradient>
    </defs>`;
    // Grid lines (horizontal, faint)
    for (let i = 0; i <= 4; i++) {
      const y = pad + (plotH / 4) * i;
      svg += `<line x1="${pad}" y1="${y}" x2="${w - pad}" y2="${y}" class="grid-line"/>`;
    }
    for (let i = 0; i < 7; i++) {
      const x = pad + i * (barW + 6) + 3;
      const barH = (dowCounts[i] / maxVal) * plotH;
      const y = pad + plotH - barH;
      const fill = dowCounts[i] > 0 ? 'url(#dowBarGrad)' : 'url(#dowBarDim)';
      svg += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(barH, 1)}" rx="4" fill="${fill}" class="data-bar" style="animation-delay:${0.1 + i*0.08}s"/>`;
      if (dowCounts[i] > 0) svg += `<text x="${x + barW/2}" y="${y - 6}" text-anchor="middle" class="bar-label" style="animation-delay:${0.6 + i*0.08}s">${dowCounts[i]}</text>`;
      svg += `<text x="${x + barW/2}" y="${pad + plotH + 16}" text-anchor="middle" class="bar-axis">${dowNames[i]}</text>`;
    }
    svg += `</svg>`;
    return svg;
  })();

  // === Build insights ===
  const insights = [];
  // Most lucid month
  const bestMonth = months.reduce((best, m) => m.lucid > best.lucid ? m : best, months[0]);
  if (bestMonth && bestMonth.lucid > 0) insights.push(`Most lucid month: <strong>${bestMonth.label}</strong> with ${bestMonth.lucid} lucid dream${bestMonth.lucid === 1 ? '' : 's'}.`);
  // Most frequent dream day
  const maxDow = Math.max(...dowCounts);
  if (maxDow > 0) {
    const maxDowIdx = dowCounts.indexOf(maxDow);
    insights.push(`You recall dreams most often on <strong>${dowNames[maxDowIdx]} nights</strong> (${maxDow} dreams).`);
  }
  // Top emotion
  if (topEmotions.length) insights.push(`Your most common dream emotion is <strong>${topEmotions[0][0]}</strong> (${topEmotions[0][1]} dreams).`);
  // Lucidity rate
  insights.push(`Overall lucidity rate: <strong>${lucidityRate}%</strong> across ${totalDreams} recorded dreams.`);
  // Sleep correlation
  if (sleepCorrelation) {
    insights.push(`On nights with above-average sleep (<strong>${sleepCorrelation.avgSleep}h+</strong>), you recall ${sleepCorrelation.wellRestedAvg} dreams vs ${sleepCorrelation.poorSleepAvg} on shorter nights.`);
  }
  // Avg word count
  insights.push(`Average dream entry: <strong>${avgWordCount} words</strong>. ${avgWordCount < 50 ? 'Try adding more detail to improve recall.' : avgWordCount > 200 ? 'Excellent detail — strong dream recall practice.' : 'Good level of detail.'}`);

  return `<div class="page">
    <h1 style="margin-bottom:6px;">Statistics</h1>
    <p class="text-muted" style="margin-bottom:24px;max-width:560px;">Patterns in your dream life. More data means deeper insights — keep logging.</p>

    <div class="stats-grid">
      <div class="card mini-stat"><div class="mini-val">${totalDreams}</div><div class="mini-label">Total dreams</div></div>
      <div class="card mini-stat"><div class="mini-val">${lucidDreams}</div><div class="mini-label">Lucid dreams</div></div>
      <div class="card mini-stat"><div class="mini-val">${lucidityRate}%</div><div class="mini-label">Lucidity rate</div></div>
      <div class="card mini-stat"><div class="mini-val">${avgLucidity}<span style="font-size:0.9rem;opacity:0.5;">/5</span></div><div class="mini-label">Avg lucidity</div></div>
      <div class="card mini-stat"><div class="mini-val">${avgWordCount}</div><div class="mini-label">Avg words/entry</div></div>
    </div>

    <div class="stat-section">
      <h2>Dreams per month</h2>
      <div class="card stat-chart-card">${lineSvg}
        <div style="display:flex;gap:14px;margin-top:10px;font-size:0.78rem;color:var(--muted);">
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:2px;background:var(--accent);"></span> Total dreams</span>
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:2px;background:var(--gold);border-top:1px dashed var(--gold);"></span> Lucid dreams</span>
        </div>
      </div>
    </div>

    <div class="stat-section">
      <h2>By day of week</h2>
      <div class="card stat-chart-card">${dowSvg}</div>
    </div>

    ${topEmotions.length ? `
      <div class="stat-section">
        <h2>Top emotions</h2>
        <div class="card stat-chart-card">
          <div class="stat-bars">
            ${topEmotions.map(([e, c]) => {
              const pct = (c / topEmotions[0][1]) * 100;
              return `<div class="stat-bar-row">
                <span class="stat-bar-label">${escapeHtml(e)}</span>
                <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;"></div></div>
                <span class="stat-bar-val">${c}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>` : ''}

    ${topTags.length ? `
      <div class="stat-section">
        <h2>Top tags</h2>
        <div class="card stat-chart-card">
          <div class="stat-bars">
            ${topTags.map(t => {
              const pct = (t.count / topTags[0].count) * 100;
              return `<div class="stat-bar-row">
                <span class="stat-bar-label">#${escapeHtml(t.tag)}</span>
                <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:rgba(245,217,122,0.25);"></div></div>
                <span class="stat-bar-val" style="color:var(--gold);">${t.count}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>` : ''}

    <div class="stat-section">
      <h2>Lucidity distribution</h2>
      <div class="card stat-chart-card">
        <div class="stat-bars">
          ${lucidityDist.map((c, i) => {
            const maxC = Math.max(...lucidityDist, 1);
            const pct = (c / maxC) * 100;
            const labels = ['No stars', '1 star', '2 stars', '3 stars', '4 stars', '5 stars'];
            return `<div class="stat-bar-row">
              <span class="stat-bar-label">${labels[i]}</span>
              <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${i >= 3 ? 'var(--accent)' : 'var(--accent-dim)'};"></div></div>
              <span class="stat-bar-val">${c}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    ${insights.length ? `
      <div class="stat-section">
        <h2>Insights</h2>
        <div class="card" style="padding:20px;">
          <ul style="list-style:none;padding:0;margin:0;">
            ${insights.map(i => `<li style="padding:10px 0;border-bottom:1px solid var(--card-border);font-size:0.9rem;line-height:1.6;color:var(--text);">${i}</li>`).join('')}
          </ul>
        </div>
      </div>` : ''}
  </div>`;
}

const DICT_CATEGORIES = ['All', 'People', 'Animals', 'Places', 'Actions', 'Objects', 'Nature', 'Body', 'Situations', 'Lucidity Triggers'];

function renderDictionary() {
  const filterCat = window.__dictFilter || 'All';
  const searchTerm = (window.__dictSearch || '').toLowerCase();
  let filtered = DREAM_DICTIONARY;
  if (filterCat !== 'All') filtered = filtered.filter(d => d.category === filterCat);
  if (searchTerm) filtered = filtered.filter(d =>
    d.symbol.toLowerCase().includes(searchTerm) ||
    d.meaning.toLowerCase().includes(searchTerm) ||
    d.category.toLowerCase().includes(searchTerm)
  );

  return `<div class="page">
    <h1 style="margin-bottom:6px;">Dream Dictionary</h1>
    <p class="text-muted" style="margin-bottom:20px;max-width:560px;">A curated symbol reference. These are starting points for reflection, not fixed meanings — your personal associations matter most.</p>

    <div class="search-box dict-search" style="max-width:100%;">
      <i data-lucide="search"></i>
      <input type="text" id="dictSearch" placeholder="Search symbols or meanings..." value="${escapeHtml(window.__dictSearch || '')}" aria-label="Search dictionary">
    </div>

    <div class="filter-row" style="margin-bottom:18px;">
      ${DICT_CATEGORIES.map(c => `<button class="chip ${filterCat===c?'selected':''}" data-dict-cat="${c}" style="font-size:0.82rem;">${c}</button>`).join('')}
    </div>

    ${filtered.length === 0
      ? `<div class="card empty-state"><h3>No matches</h3><p>Try a different search term or category.</p></div>`
      : `<div class="dict-grid">${filtered.map(d => {
          // Count how many of user's dreams mention this symbol
          const matches = dreamsCache.filter(dr =>
            (dr.narrative || '').toLowerCase().includes(d.symbol.toLowerCase()) ||
            (dr.title || '').toLowerCase().includes(d.symbol.toLowerCase())
          );
          return `<div class="card dict-card" onclick="viewDictionaryEntry('${escapeHtml(d.symbol).replace(/'/g, "\\'")}')" tabindex="0" role="button" aria-label="View ${escapeHtml(d.symbol)}">
            <h3>${escapeHtml(d.symbol)} ${matches.length ? `<span class="badge badge-accent" style="font-size:0.65rem;">${matches.length} in your dreams</span>` : ''}</h3>
            <div class="dict-meaning">${escapeHtml(d.meaning.slice(0, 140))}${d.meaning.length > 140 ? '…' : ''}</div>
            <div style="font-size:0.74rem;color:var(--muted);">${d.category}</div>
          </div>`;
        }).join('')}</div>`}
  </div>`;
}

async function viewDictionaryEntry(symbol) {
  const entry = DREAM_DICTIONARY.find(d => d.symbol === symbol);
  if (!entry) return;
  const matches = dreamsCache.filter(dr =>
    (dr.narrative || '').toLowerCase().includes(symbol.toLowerCase()) ||
    (dr.title || '').toLowerCase().includes(symbol.toLowerCase())
  );
  const overlay = document.createElement('div'); overlay.className='modal-overlay'; overlay.id='dreamModal';
  overlay.innerHTML = `<div class="modal">
    <div class="modal-header"><div><h2 style="margin-bottom:4px;">${escapeHtml(entry.symbol)}</h2><div style="color:var(--muted);font-size:0.84rem;">${entry.category}</div></div><button class="btn-icon btn-secondary" onclick="closeModal()" aria-label="Close"><i data-lucide="x" style="width:20px;height:20px;"></i></button></div>
    <div style="background:var(--mist);border-left:3px solid var(--accent);padding:14px 18px;border-radius:var(--radius-xs);margin-bottom:16px;font-size:0.92rem;line-height:1.7;">${escapeHtml(entry.meaning)}</div>
    <h3 style="font-size:0.92rem;margin-bottom:8px;">Reflection questions</h3>
    <p style="font-style:italic;color:var(--text);font-size:0.9rem;line-height:1.6;margin-bottom:18px;">${escapeHtml(entry.questions)}</p>
    ${matches.length ? `
      <h3 style="font-size:0.92rem;margin-bottom:10px;">Your dreams mentioning "${escapeHtml(entry.symbol)}" (${matches.length})</h3>
      <div class="dream-list">${matches.slice(-5).reverse().map(d => renderDreamCard(d)).join('')}</div>
    ` : `<p class="text-muted" style="font-size:0.85rem;">No dreams in your journal mention this symbol yet.</p>`}
  </div>`;
  document.body.appendChild(overlay); lucide.createIcons({nodes:[overlay]});
  animateModalEntrance(overlay.querySelector('.modal'));
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  if (matches.length) loadImagesIntoDOM(matches.map(d => d.id), overlay);
}

async function toggleChallenge(id) {
  const completed = await getSetting('completedChallenges', []);
  const idx = completed.indexOf(id);
  if (idx >= 0) {
    completed.splice(idx, 1);
    showToast('Challenge unmarked', 'circle');
  } else {
    completed.push(id);
    showToast('Challenge complete! Beautiful work.', 'trophy');
    checkAchievements();
  }
  await putSetting('completedChallenges', completed);
  await renderPage(currentPage);
}

async function clearAllDreamImages() {
  if (!confirm('Delete ALL generated dream images? This frees storage but you\'ll need to regenerate.')) return;
  if (!confirm('This will delete images for every dream. Really proceed?')) return;
  const d = await openDB();
  if (d.objectStoreNames.contains('dream_images')) {
    d.transaction('dream_images', 'readwrite').objectStore('dream_images').clear();
  }
  if (d.objectStoreNames.contains('dream_images_v2')) {
    d.transaction('dream_images_v2', 'readwrite').objectStore('dream_images_v2').clear();
  }
  window.__dreamImageCache = {};
  window.__dreamImageMeta = {};
  showToast('All dream images cleared', 'trash-2', 'success');
  await renderPage(currentPage);
}

function selectRCTechnique(id) {
  document.querySelectorAll('.rc-technique-option').forEach(el => el.classList.toggle('selected', el.dataset.rcTechnique === id));
}
function selectRCFreq(n) {
  document.querySelectorAll('.rc-freq-option').forEach(el => el.classList.toggle('selected', el.dataset.rcFreq == n));
}

async function startRCNotifications() {
  const techniqueEl = document.querySelector('.rc-technique-option.selected');
  const freqEl = document.querySelector('.rc-freq-option.selected');
  const technique = techniqueEl ? techniqueEl.dataset.rcTechnique : 'fingers';
  const frequency = freqEl ? parseInt(freqEl.dataset.rcFreq) : 5;
  await putSetting('rcNotifSetup', { technique, frequency, enabled: true });

  const opt = RC_NOTIF_OPTIONS.find(o => o.id === technique);

  if (!('Notification' in window)) {
    showToast('Notifications not supported. Using in-app reminders instead.', 'alert-circle');
    scheduleInAppRCReminders(opt, frequency);
    return;
  }

  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    showToast(`${frequency} daily reminders set for "${opt.name}"`, 'bell');
    schedulePushRCReminders(opt, frequency);
  } else {
    showToast('Push denied. Using in-app reminders instead.', 'alert-circle');
    scheduleInAppRCReminders(opt, frequency);
  }
}

let rcReminderTimers = [];

function stopRCNotifications() {
  rcReminderTimers.forEach(t => clearTimeout(t));
  rcReminderTimers = [];
}

function schedulePushRCReminders(opt, frequency) {
  stopRCNotifications();
  const now = new Date();
  const startHour = 8, endHour = 22;
  const totalMinutes = (endHour - startHour) * 60;
  const intervalMin = totalMinutes / frequency;

  for (let i = 0; i < frequency; i++) {
    const randomOffset = Math.random() * intervalMin * 0.8;
    const minutesFromStart = i * intervalMin + randomOffset;
    const fireTime = new Date(now);
    fireTime.setHours(startHour, 0, 0, 0);
    fireTime.setTime(fireTime.getTime() + minutesFromStart * 60000);

    const delay = fireTime.getTime() - now.getTime();
    if (delay <= 0) continue;

    const timer = setTimeout(() => {
      new Notification('LucidLog — Reality Check', {
        body: `Are you dreaming? ${opt.short}. If uncertain — you might be.`,
        icon: window.__MOON_ICON_512 || '',
        tag: 'lucidlog-rc-' + i
      });
    }, delay);
    rcReminderTimers.push(timer);
  }
}

function scheduleInAppRCReminders(opt, frequency) {
  stopRCNotifications();
  const now = new Date();
  const startHour = 8, endHour = 22;
  const totalMinutes = (endHour - startHour) * 60;
  const intervalMin = totalMinutes / frequency;

  for (let i = 0; i < frequency; i++) {
    const randomOffset = Math.random() * intervalMin * 0.8;
    const minutesFromStart = i * intervalMin + randomOffset;
    const fireTime = new Date(now);
    fireTime.setHours(startHour, 0, 0, 0);
    fireTime.setTime(fireTime.getTime() + minutesFromStart * 60000);

    const delay = fireTime.getTime() - now.getTime();
    if (delay <= 0) continue;

    const timer = setTimeout(() => {
      showRCInAppBanner(opt);
    }, delay);
    rcReminderTimers.push(timer);
  }
}

async function exportData() {
  const data = { dreams: await getAllDreams(), bookmarks: (await getAllBookmarks()).map(b=>b), settings: {}, achievements: await getAllAchievements() };
  const d = await openDB(); const tx = d.transaction('settings','readonly'); const store = tx.objectStore('settings'); let cursor = await store.openCursor();
  while(cursor) { data.settings[cursor.value.key] = cursor.value.value; cursor = await cursor.continue(); }
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`lucidlog-data-${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(url);
  showToast('Data exported successfully');
}

async function importData(event) {
  const file=event.target.files[0]; if(!file)return;
  const reader=new FileReader();

}

// ==================== PAGE EVENT BINDING ====================
function bindPageEvents(page) {
  if(page==='journal'){
    const searchInput=document.getElementById('journalSearch'); 
    if(searchInput){
      searchInput.addEventListener('input',()=>{
        currentJournalSearch=searchInput.value;
        document.getElementById('dreamListContainer').innerHTML=renderDreamList(currentJournalFilter,currentJournalSearch);
        loadImagesIntoDOM(dreamsCache.map(d=>d.id),document.getElementById('dreamListContainer'));
      });
    }
    document.querySelectorAll('[data-filter]').forEach(chip=>{
      chip.addEventListener('click',()=>{
        document.querySelectorAll('[data-filter]').forEach(c=>c.classList.remove('selected'));
        chip.classList.add('selected');
        currentJournalFilter=chip.dataset.filter;
        currentJournalSearch=searchInput?searchInput.value:'';
        document.getElementById('dreamListContainer').innerHTML=renderDreamList(currentJournalFilter,currentJournalSearch);
        loadImagesIntoDOM(dreamsCache.map(d=>d.id),document.getElementById('dreamListContainer'));
      });
    });
    document.querySelectorAll('[data-tag-filter]').forEach(chip=>{
      chip.addEventListener('click',()=>{
        const tag=chip.dataset.tagFilter;
        currentJournalTag = (currentJournalTag === tag) ? null : tag;
        document.querySelectorAll('[data-tag-filter]').forEach(c=>c.classList.toggle('selected', c.dataset.tagFilter===currentJournalTag));
        document.getElementById('dreamListContainer').innerHTML=renderDreamList(currentJournalFilter,currentJournalSearch);
        loadImagesIntoDOM(dreamsCache.map(d=>d.id),document.getElementById('dreamListContainer'));
      });
    });
  }
  if(page==='reality-check'){
    (async()=>{
      const rc=await getSetting('rcReminders',{enabled:false,times:['08:00','14:00','20:00']});
      const toggle=document.getElementById('rcToggle');
      if(toggle){toggle.checked=rc.enabled;toggle.addEventListener('change',async()=>{rc.enabled=toggle.checked;await putSetting('rcReminders',rc);});}
      const timesDiv=document.getElementById('rcTimes');
      if(timesDiv){timesDiv.innerHTML=rc.times.map((t,i)=>`<input type="time" value="${t}" data-rc-time="${i}" aria-label="Reminder time ${i+1}" style="max-width:120px;">`).join('')+`<button class="btn btn-secondary btn-sm" onclick="addRCReminder()">+ Add time</button>`;
      timesDiv.querySelectorAll('[data-rc-time]').forEach(input=>{input.addEventListener('change',async()=>{const idx=parseInt(input.dataset.rcTime);rc.times[idx]=input.value;await putSetting('rcReminders',rc);});});}
    })();
  }
  if(page==='recurring'){
    document.querySelectorAll('[data-rfilter]').forEach(chip=>{
      chip.addEventListener('click',()=>{
        window.__recurringFilter = chip.dataset.rfilter;
        document.querySelectorAll('[data-rfilter]').forEach(c=>c.classList.toggle('selected', c===chip));
        document.querySelector('.main-content').innerHTML = renderRecurring();
        lucide.createIcons();
        bindPageEvents('recurring');
      });
    });
  }
  if(page==='dictionary'){
    const searchInput = document.getElementById('dictSearch');
    if (searchInput) {
      let searchTimer;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          window.__dictSearch = searchInput.value;
          document.querySelector('.main-content').innerHTML = renderDictionary();
          lucide.createIcons();
          bindPageEvents('dictionary');
          const newInput = document.getElementById('dictSearch');
          if (newInput) { newInput.focus(); newInput.setSelectionRange(newInput.value.length, newInput.value.length); }
        }, 250);
      });
    }
    document.querySelectorAll('[data-dict-cat]').forEach(chip => {
      chip.addEventListener('click', () => {
        window.__dictFilter = chip.dataset.dictCat;
        document.querySelector('.main-content').innerHTML = renderDictionary();
        lucide.createIcons();
        bindPageEvents('dictionary');
      });
    });
  }
  if(page==='constellation'){
    const container=document.getElementById('constellationContainer');
    if(container){
      const tooltip=document.getElementById('constTooltip');
      container.querySelectorAll('.constellation-star').forEach(star=>{
        star.addEventListener('mouseenter',e=>{
          const title = star.dataset.title || 'Untitled';
          const date = star.dataset.date || '';
          const isLucid = star.dataset.lucid === '1';
          let dateStr = '';
          if (date) {
            const dt = new Date(date + 'T00:00:00');
            dateStr = dt.toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric' });
          }
          tooltip.innerHTML = `<div class="tip-title">${escapeHtml(title)}${isLucid?' <span style="color:var(--gold-bright);">&#9733;</span>':''}</div><div class="tip-meta">${dateStr}${isLucid?' &middot; Lucid':''}</div>`;
          tooltip.style.display='block';
          const rect=container.getBoundingClientRect();
          tooltip.style.left=(e.clientX-rect.left+12)+'px';
          tooltip.style.top=(e.clientY-rect.top-50)+'px';
        });
        star.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
        star.addEventListener('mousemove',e=>{
          const rect=container.getBoundingClientRect();
          tooltip.style.left=(e.clientX-rect.left+12)+'px';
          tooltip.style.top=(e.clientY-rect.top-50)+'px';
        });
        star.addEventListener('click', () => {
          const id = star.dataset.id;
          if (id) viewDream(id);
        });
      });
      // Mouse parallax: shift stars slightly based on cursor position
      const svg = container.querySelector('.constellation-svg');
      if (svg && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        container.addEventListener('mousemove', e => {
          const rect = container.getBoundingClientRect();
          const cx = (e.clientX - rect.left) / rect.width - 0.5;  // -0.5 to 0.5
          const cy = (e.clientY - rect.top) / rect.height - 0.5;
          // Subtle parallax: shift stars by up to 4px
          svg.style.transform = `translate(${cx * -4}px, ${cy * -4}px)`;
          svg.style.transition = 'transform 0.3s ease-out';
        });
        container.addEventListener('mouseleave', () => {
          svg.style.transform = '';
        });
      }
    }
  }
}

// ==================== KEYBOARD SHORTCUTS ====================
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Ignore when typing in input/textarea, or with modifier keys
    const target = e.target;
    const isTyping = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable;
    if (isTyping && e.key !== 'Escape') return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    if (e.key === 'Escape') {
      const modal = document.getElementById('dreamModal');
      if (modal) { closeModal(); return; }
      const onb = document.getElementById('onboardingOverlay');
      if (onb && onb.style.display !== 'none') return; // Let onboarding handle it
    }

    // Shortcuts (only when not typing)
    switch (e.key.toLowerCase()) {
      case 'n':
        if (!isTyping) { e.preventDefault(); openDreamForm(); }
        break;
      case 'j':
        if (!isTyping) { e.preventDefault(); navigate('journal'); }
        break;
      case 'd':
        if (!isTyping) { e.preventDefault(); navigate('dashboard'); }
        break;
      case 'r':
        if (!isTyping) { e.preventDefault(); navigate('reality-check'); }
        break;
      case 's':
        if (!isTyping) { e.preventDefault(); navigate('stats'); }
        break;
      case '?':
        if (!isTyping) { e.preventDefault(); showKeyboardHelp(); }
        break;
      case '/':
        e.preventDefault();
        if (currentPage === 'journal') {
          const s = document.getElementById('journalSearch');
          if (s) s.focus();
        } else if (currentPage === 'dictionary') {
          const s = document.getElementById('dictSearch');
          if (s) s.focus();
        } else {
          navigate('journal');
          setTimeout(() => {
            const s = document.getElementById('journalSearch');
            if (s) s.focus();
          }, 300);
        }
        break;
    }
  });
}
