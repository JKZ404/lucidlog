  position: fixed; inset: 0; z-index: 250; background: var(--overlay);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); animation: fadeIn 0.4s ease;
}
.achievement-card {
  background: var(--surface); border: 2px solid var(--gold);
  border-radius: var(--radius); padding: 48px 36px; max-width: 400px;
  width: 90%; text-align: center; box-shadow: 0 0 60px rgba(245,217,122,0.15);
  animation: achievePop 0.5s ease;
}
@keyframes achievePop {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
.achievement-card .achieve-icon { font-size: 3rem; margin-bottom: 16px; color: var(--gold); }
.achievement-card h2 { color: var(--gold); margin-bottom: 8px; }
.achievement-card p { color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

/* Badge shelf */
.badge-shelf { display: flex; flex-wrap: wrap; gap: 12px; }
.badge-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 14px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card-bg);
  min-width: 90px; max-width: 110px; flex: 1 1 90px;
  text-align: center; transition: all var(--transition);
  overflow: hidden;
}
.badge-item.unlocked { border-color: rgba(245,217,122,0.4); background: rgba(245,217,122,0.06); }
.badge-item.locked { opacity: 0.35; }
.badge-item .badge-icon { font-size: 1.6rem; line-height: 1; }
.badge-item .badge-name {
  font-size: 0.68rem; color: var(--muted); font-weight: 600; line-height: 1.3;
  word-wrap: break-word; overflow-wrap: break-word; hyphens: auto;
}
.badge-item.unlocked .badge-name { color: var(--gold); }

/* ========== SETTINGS ========== */
.settings-card { padding: 24px; margin-bottom: 16px; }
.settings-card:last-of-type { margin-bottom: 0; }
.settings-card h3 { margin-bottom: 16px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--card-border); gap: 16px; }
.settings-row:last-child { border-bottom: none; }
.settings-row .settings-label { font-weight: 600; font-size: 0.93rem; }
.settings-row .settings-desc { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

/* Install banner */
.install-banner {
  background: var(--accent-dim); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px; font-size: 0.88rem;
}
.install-banner a { text-decoration: underline; }

/* RC Notification Setup */
.rc-setup-section { margin-top: 12px; }
.rc-technique-option {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--transition); margin-bottom: 8px;
}
.rc-technique-option:hover { border-color: var(--accent); }
.rc-technique-option.selected { border-color: var(--accent); background: var(--accent-dim); }
.rc-technique-option .rc-radio {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--muted);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all var(--transition);
}
.rc-technique-option.selected .rc-radio { border-color: var(--accent); }
.rc-technique-option.selected .rc-radio::after {
  content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
}
.rc-freq-option {
  display: inline-flex; align-items: center; padding: 8px 16px;
  border: 1px solid var(--card-border); border-radius: 20px;
  cursor: pointer; transition: all var(--transition); font-size: 0.85rem; font-weight: 500;
  margin-right: 8px; margin-bottom: 8px;
}
.rc-freq-option:hover { border-color: var(--accent); }
.rc-freq-option.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

/* In-app RC notification banner */
.rc-notification-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 280;
  background: var(--surface); border-bottom: 2px solid var(--accent);
  padding: 16px 20px; display: flex; align-items: center; gap: 14px;
  animation: slideDown 0.4s ease; box-shadow: 0 4px 24px rgba(159,234,232,0.2);
}
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
.rc-notification-banner .rc-notif-text { flex: 1; }
.rc-notification-banner .rc-notif-text strong { color: var(--accent); }
.rc-notification-banner .rc-notif-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

/* ========== TAG INPUT ========== */
.tag-input-container { display: flex; flex-direction: column; gap: 4px; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 4px; }
.tag-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--card-border); border-radius: 16px;
  font-size: 0.78rem; font-weight: 500;
}
.tag-pill .tag-remove {
  background: none; border: none; color: var(--accent);
  cursor: pointer; font-size: 1rem; line-height: 1; padding: 0;
  opacity: 0.6; transition: opacity var(--transition);
}
.tag-pill .tag-remove:hover { opacity: 1; }

/* ========== RECURRING ELEMENTS ========== */
.recurring-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.recurring-card {
  display: flex; gap: 12px; padding: 16px; cursor: pointer;
  border: 1px solid var(--card-border); border-radius: var(--radius);
  background: var(--card-bg); transition: border-color var(--transition);
}
.recurring-card:hover { border-color: rgba(159,234,232,0.45); }
.recurring-card .recurring-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  background: var(--accent-dim); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
}
.recurring-card .recurring-body { flex: 1; min-width: 0; }
.recurring-card .recurring-name { font-family: 'Lora', serif; font-weight: 600; font-size: 1rem; margin-bottom: 2px; }
.recurring-card .recurring-meta { font-size: 0.78rem; color: var(--muted); }
.recurring-card .recurring-notes { font-size: 0.85rem; color: var(--text); margin-top: 4px; line-height: 1.5; }
.recurring-type-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }

/* ========== STAT CARDS GRID FOR NEW PAGES ========== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.mini-stat { padding: 16px; }
.mini-stat .mini-val { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--accent); line-height: 1.1; }
.mini-stat .mini-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

/* ========== SLEEP TRACKER ========== */
.sleep-summary-card { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.sleep-summary-card .sleep-stat { text-align: center; padding: 18px; background: var(--mist); border-radius: var(--radius-sm); }
.sleep-summary-card .sleep-stat .val { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--accent); }
.sleep-summary-card .sleep-stat .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
.sleep-quality-bar { display: flex; gap: 4px; }
.sleep-quality-bar .qbar { flex: 1; height: 32px; border-radius: 6px; background: var(--mist); border: 1px solid var(--card-border); cursor: pointer; transition: all var(--transition); }
.sleep-quality-bar .qbar.filled { background: var(--accent-dim); border-color: var(--accent); }
.sleep-quality-bar .qbar:hover { border-color: var(--accent); }
.sleep-trend-svg { width: 100%; height: auto; min-height: 180px; }
.sleep-log-row {
  display: grid; grid-template-columns: 90px 1fr 70px 80px 40px; gap: 10px;
  padding: 12px; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  background: var(--card-bg); margin-bottom: 6px; align-items: center;
  overflow: hidden;
}
.sleep-log-row > * { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.sleep-log-row .sleep-date { font-family: 'Lora', serif; font-weight: 600; color: var(--accent); }
.sleep-log-row .sleep-times { font-size: 0.86rem; color: var(--text); }
.sleep-log-row .sleep-hrs { font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; color: var(--text); text-align: center; }
.sleep-log-row .sleep-q { text-align: center; }
.sleep-log-row .sleep-q .star-mini { color: var(--accent); font-size: 0.8rem; }
@media (max-width: 768px) {
  .sleep-log-row { grid-template-columns: 1fr 1fr; font-size: 0.82rem; }
  .sleep-summary-card { grid-template-columns: 1fr; }
}

/* ========== STATISTICS PAGE ========== */
.stat-section { margin-bottom: 28px; }
.stat-section h2 { font-size: 1.15rem; margin-bottom: 12px; }
.stat-chart-card { padding: 20px; }
.stat-chart-svg { width: 100%; height: auto; min-height: 200px; }
.stat-bars { display: flex; flex-direction: column; gap: 8px; }
.stat-bar-row { display: grid; grid-template-columns: 120px 1fr 40px; gap: 12px; align-items: center; }
.stat-bar-row .stat-bar-label { font-size: 0.86rem; color: var(--text); }
.stat-bar-row .stat-bar-track { background: var(--mist); border-radius: 6px; height: 22px; overflow: hidden; }
.stat-bar-row .stat-bar-fill { background: var(--accent-dim); height: 100%; border-radius: 6px; transition: width 0.5s ease; }
.stat-bar-row .stat-bar-val { font-family: 'JetBrains Mono', monospace; font-size: 0.84rem; color: var(--accent); text-align: right; }

/* ========== RC LOG ========== */
.rc-log-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.rc-awareness-ring { display: flex; align-items: center; gap: 16px; padding: 20px; }
.rc-awareness-ring .ring-svg { flex-shrink: 0; }
.rc-awareness-ring .ring-text { font-family: 'Lora', serif; font-size: 2rem; fill: var(--accent); }
.rc-awareness-ring .ring-body h3 { margin-bottom: 6px; }
.rc-log-entry {
  display: grid; grid-template-columns: 80px 1fr 100px 60px; gap: 12px;
  padding: 12px; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  background: var(--card-bg); margin-bottom: 6px; align-items: center;
}
.rc-log-entry .rc-time { font-family: 'JetBrains Mono', monospace; font-size: 0.84rem; color: var(--accent); }
.rc-log-entry .rc-tech { font-size: 0.88rem; color: var(--text); font-weight: 500; }
.rc-log-entry .rc-result { font-size: 0.82rem; padding: 3px 10px; border-radius: 12px; text-align: center; }
.rc-log-entry .rc-result.awake { background: rgba(52,211,153,0.15); color: var(--success); }
.rc-log-entry .rc-result.dreaming { background: rgba(159,234,232,0.2); color: var(--accent); }
.rc-log-entry .rc-result.uncertain { background: rgba(251,191,36,0.15); color: var(--warning); }
@media (max-width: 768px) {
  .rc-log-stats { grid-template-columns: 1fr; }
  .rc-log-entry { grid-template-columns: 1fr 1fr; font-size: 0.8rem; }
}

/* ========== DREAM DICTIONARY ========== */
.dict-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.dict-card { padding: 16px; cursor: pointer; }
.dict-card h3 { font-size: 1rem; margin-bottom: 6px; color: var(--accent); }
.dict-card .dict-meaning { font-size: 0.86rem; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.dict-card .dict-questions { font-size: 0.82rem; color: var(--text); font-style: italic; }
.dict-search { margin-bottom: 18px; }

/* ========== LUCID CHALLENGES ========== */
.challenge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.challenge-card { padding: 16px; position: relative; }
.challenge-card.completed { border-color: rgba(52,211,153,0.5); background: rgba(52,211,153,0.06); }
.challenge-card .challenge-icon { font-size: 1.6rem; margin-bottom: 8px; }
.challenge-card h3 { font-size: 0.98rem; margin-bottom: 4px; }
.challenge-card .challenge-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.challenge-card .challenge-diff { font-size: 0.74rem; color: var(--gold); }
.challenge-card .challenge-check {
  position: absolute; top: 12px; right: 12px;
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--card-border); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.challenge-card .challenge-check.done { background: var(--success); border-color: var(--success); color: white; }
.challenge-card .challenge-check:hover { border-color: var(--accent); }


/* ========== LIGHT THEME ========== */
:root.theme-light {
  --accent: #0E7C7B;
  --accent-dim: rgba(14,124,123,0.10);
  --accent-glow: rgba(14,124,123,0.05);
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --text: #1A2238;
  --muted: #5C6577;
  --card-bg: rgba(255,255,255,0.92);
  --input-bg: rgba(255,255,255,0.7);
  --overlay: rgba(247,245,240,0.88);
  --card-border: rgba(14,124,123,0.2);
  --card-shadow: 0 4px 32px rgba(14,124,123,0.08);
  --mist: rgba(14,124,123,0.05);
}
:root.theme-light .star-field { display: none; }
:root.theme-light .atmos-bg { opacity: 0.4; }

/* ========== SKIP LINK ========== */
.skip-link {
  position: absolute; top: -100px; left: 16px;
  background: var(--accent); color: var(--bg);
  padding: 10px 16px; border-radius: 0 0 8px 8px;
  font-weight: 600; z-index: 500; transition: top 0.2s ease;
}
.skip-link:focus { top: 0; color: var(--bg); }

/* ========== QUICK LOG FAB ========== */
.quick-log-fab {
  position: fixed; bottom: 88px; right: 24px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 24px rgba(159,234,232,0.4);
  cursor: pointer; z-index: 60;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: none;
}
.quick-log-fab:hover { transform: scale(1.08) translateY(-2px); box-shadow: 0 8px 32px rgba(159,234,232,0.6); }
.quick-log-fab i { width: 24px; height: 24px; }
@media (min-width: 769px) { .quick-log-fab { bottom: 24px; } }
@media (max-width: 768px) { .quick-log-fab { bottom: 84px; } }

/* ========== KEYBOARD HINT ========== */
.kbd {
  display: inline-block; padding: 2px 6px;
  background: var(--mist); border: 1px solid var(--card-border);
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--muted);
}

/* ========== TOAST VARIANTS ========== */
.toast.toast-success { border-left: 3px solid var(--success); }
.toast.toast-warning { border-left: 3px solid var(--warning); }
.toast.toast-error { border-left: 3px solid var(--danger); }
.toast.toast-info { border-left: 3px solid var(--accent); }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding: 20px 16px 100px; }
  .bottom-nav { display: flex; }
  .sleep-grid { grid-template-columns: 1fr; }
  .dash-stats { grid-template-columns: 1fr 1fr; }
  .rc-grid, .tech-grid { grid-template-columns: 1fr; }
  .modal { padding: 22px 18px; }
  .onboarding-card { padding: 32px 22px; }
  .form-row { grid-template-columns: 1fr; }
  .moon-streak-banner { flex-direction: column; text-align: center; gap: 12px; }
  .achievement-card { padding: 32px 22px; }
  /* Smaller thumbnails on mobile, but still prominent */
  .dream-entry-card .dream-thumb { width: 120px; height: 80px; }
  .dream-entry-card { padding: 10px; gap: 12px; }
  .dream-entry-card .dream-title { font-size: 0.95rem; }
  .dream-entry-card .dream-preview { font-size: 0.8rem; -webkit-line-clamp: 2; }
  .hero-time { font-size: 2.4rem; }
  .hero-section { padding: 20px 16px; }
  .dream-detail-actions { justify-content: center; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .sidebar { width: 68px; }
  .sidebar-logo span, .sidebar-nav a span { display: none; }
  .sidebar-nav a { justify-content: center; padding: 12px; }
  .main-content { margin-left: 68px; }
}
@media (min-width: 1025px) { .bottom-nav { display: none; } }

/* ========== REDUCED MOTION ========== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
.text-center { text-align: center; }
.text-muted { color: var(--muted); }

// ==================== IndexedDB SETUP ====================
const DB_NAME = 'lucidlog-db';
const DB_VERSION = 5;
let db = null;

async function openDB() {
  if (db) return db;
  db = await idb.openDB(DB_NAME, DB_VERSION, {
    upgrade(database, oldVersion) {
      if (!database.objectStoreNames.contains('dreams')) {
        const ds = database.createObjectStore('dreams', { keyPath: 'id' });
        ds.createIndex('date', 'date');
        ds.createIndex('lucidityLevel', 'lucidityLevel');
      }
      if (!database.objectStoreNames.contains('settings'))
        database.createObjectStore('settings', { keyPath: 'key' });
      if (!database.objectStoreNames.contains('bookmarks'))
        database.createObjectStore('bookmarks', { keyPath: 'techniqueId' });
      if (!database.objectStoreNames.contains('dream_images'))
        database.createObjectStore('dream_images', { keyPath: 'dreamId' });
      // v4: upgrade dream_images to support multiple images per dream
      // Existing records (keyed by dreamId) get migrated lazily on access.
      if (!database.objectStoreNames.contains('achievements'))
        database.createObjectStore('achievements', { keyPath: 'id' });
      if (!database.objectStoreNames.contains('intentions'))
        database.createObjectStore('intentions', { keyPath: 'date' });
      // v3: new stores for tags, recurring elements, RC log, sleep logs
      if (!database.objectStoreNames.contains('recurring_elements')) {
        const re = database.createObjectStore('recurring_elements', { keyPath: 'id' });
        re.createIndex('type', 'type');
        re.createIndex('name', 'name');
      }
      if (!database.objectStoreNames.contains('rc_log')) {
        const rl = database.createObjectStore('rc_log', { keyPath: 'id' });
        rl.createIndex('timestamp', 'timestamp');
      }
      if (!database.objectStoreNames.contains('sleep_logs')) {
        const sl = database.createObjectStore('sleep_logs', { keyPath: 'date' });
        sl.createIndex('date', 'date');
      }
      // v4: new dream_images_v2 store — multi-image gallery
      // Each record: { id (imageId), dreamId, url, provider, prompt, style, scene, generatedAt, procedural, isPrimary }
      if (!database.objectStoreNames.contains('dream_images_v2')) {
        const dv2 = database.createObjectStore('dream_images_v2', { keyPath: 'id' });
        dv2.createIndex('dreamId', 'dreamId');
        dv2.createIndex('generatedAt', 'generatedAt');
      }
      // v5: ritual logs — MILD affirmation sessions
      // Each record: { id, date, intention, durationSec, completedAt }
      if (!database.objectStoreNames.contains('ritual_logs')) {
        const rl = database.createObjectStore('ritual_logs', { keyPath: 'id' });
        rl.createIndex('date', 'date');
        rl.createIndex('completedAt', 'completedAt');
      }
    }
  });
  return db;
}

// ==================== MULTI-IMAGE GALLERY (v4) ====================
async function getAllDreamImages(dreamId) {
  try {
    const d = await openDB();
    // Try v2 store first
    if (d.objectStoreNames.contains('dream_images_v2')) {
      const idx = d.transaction('dream_images_v2').store.index('dreamId');
      const all = await idx.getAll(dreamId);
      if (all && all.length) {
        // Sort: primary first, then by generatedAt desc
        return all.sort((a, b) => {
          if (a.isPrimary && !b.isPrimary) return -1;
          if (!a.isPrimary && b.isPrimary) return 1;
          return (b.generatedAt || 0) - (a.generatedAt || 0);
        });
      }
    }
    // Fallback: read from legacy store
    const legacy = await getDreamImage(dreamId);
    if (legacy && legacy.url) {
      return [{ ...legacy, id: 'legacy_' + dreamId, dreamId, isPrimary: true }];
    }
    return [];
  } catch (e) {
    console.error('getAllDreamImages', e);
    return [];
  }
}

async function getPrimaryDreamImage(dreamId) {
  const all = await getAllDreamImages(dreamId);
  return all[0] || null;
}

async function addDreamImage(dreamId, record) {
  try {
    const d = await openDB();
    if (!d.objectStoreNames.contains('dream_images_v2')) return;
    // Generate imageId if not provided
    const imageId = record.id || 'img_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    // Check if this is the first image for this dream -> mark as primary
    const existing = await getAllDreamImages(dreamId);
    const isPrimary = existing.length === 0;
    const full = {
      id: imageId,
      dreamId,
      url: record.url,
      provider: record.provider || 'unknown',
      prompt: record.prompt || '',
      style: record.style || '',
      scene: record.scene || '',
      generatedAt: record.generatedAt || Date.now(),
      procedural: !!record.procedural,
      isPrimary,
    };
    await d.put('dream_images_v2', full);
    return imageId;
  } catch (e) { console.error('addDreamImage', e); }
}

async function deleteDreamImageV2(imageId) {
  try {
    const d = await openDB();
    if (d.objectStoreNames.contains('dream_images_v2')) {
      await d.delete('dream_images_v2', imageId);
    }
  } catch (e) { console.error('deleteDreamImageV2', e); }
}

async function deleteAllDreamImages(dreamId) {
  try {
    const d = await openDB();
    if (d.objectStoreNames.contains('dream_images_v2')) {
      const idx = d.transaction('dream_images_v2').store.index('dreamId');
      const all = await idx.getAll(dreamId);
      const tx = d.transaction('dream_images_v2', 'readwrite');
      for (const img of all) tx.objectStore('dream_images_v2').delete(img.id);
      await tx.done;
    }
    // Also clear legacy
    await deleteDreamImage(dreamId);
  } catch (e) { console.error('deleteAllDreamImages', e); }
}

async function setPrimaryDreamImage(imageId) {
  try {
    const d = await openDB();
    if (!d.objectStoreNames.contains('dream_images_v2')) return;
    const rec = await d.get('dream_images_v2', imageId);
    if (!rec) return;
    // Unmark all other images for this dream
    const all = await getAllDreamImages(rec.dreamId);
    const tx = d.transaction('dream_images_v2', 'readwrite');
    for (const img of all) {
      tx.objectStore('dream_images_v2').put({ ...img, isPrimary: img.id === imageId });
    }
    await tx.done;
  } catch (e) { console.error('setPrimaryDreamImage', e); }
}

// ==================== MIGRATION (localStorage → IndexedDB) ====================
async function migrateFromLocalStorage() {
  const migrated = await getSetting('migrated', false);
  if (migrated) return;
  const OLD_KEY = 'lucid_app_state';
  try {
    const raw = localStorage.getItem(OLD_KEY);
    if (!raw) { await putSetting('migrated', true); return; }
    const old = JSON.parse(raw);
    const d = await openDB();
    const tx = d.transaction(['dreams', 'settings', 'bookmarks'], 'readwrite');
    if (old.dreams && Array.isArray(old.dreams)) {
      for (const dream of old.dreams) {
        const mapped = { ...dream, lucidityLevel: dream.lucidity, isLucid: (dream.lucidity||0)>=3 };
        tx.objectStore('dreams').put(mapped);
      }
    }
    if (old.bookmarks && Array.isArray(old.bookmarks)) {
      for (const tid of old.bookmarks) tx.objectStore('bookmarks').put({ techniqueId: tid });
    }
    if (old.onboardingComplete) tx.objectStore('settings').put({ key: 'onboardingComplete', value: true });
    if (old.sleepSchedule) tx.objectStore('settings').put({ key: 'sleepSchedule', value: old.sleepSchedule });
    if (old.rcReminders) tx.objectStore('settings').put({ key: 'rcReminders', value: old.rcReminders });
    if (old.notifications) tx.objectStore('settings').put({ key: 'notifications', value: old.notifications });
    tx.objectStore('settings').put({ key: 'imageGen', value: true });
    tx.objectStore('settings').put({ key: 'migrated', value: true });
    await tx.done;
    localStorage.removeItem(OLD_KEY);
    showToast('Data migrated to new storage');
  } catch(e) {
    console.error('Migration failed', e);
    await putSetting('migrated', true);
  }
}

// ==================== TAG HELPERS ====================
function getAllTagsFromDreams(dreams) {
  const counts = {};
  for (const d of dreams) {
    if (!d.tags || !Array.isArray(d.tags)) continue;
    for (const t of d.tags) {
      counts[t] = (counts[t] || 0) + 1;
    }
  }
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([tag, count]) => ({ tag, count }));
}

// ==================== VOLUMETRIC NEBULA (Three.js + GLSL) ====================
// Raymarched SDF noise nebula with parallax stars. Falls back gracefully.
let __nebulaRenderer = null;
let __nebulaScene = null;
let __nebulaCamera = null;
let __nebulaMaterial = null;
let __nebulaRAF = null;
let __nebulaActive = false;

async function initVolumetricNebula() {
  // Hard gates: respect reduced motion, low-power devices, missing APIs
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return false;
  if (window.__lucidLowPower) return false;
  if (typeof THREE === 'undefined') {
    // Three.js is loaded as ES module via importmap; import dynamically.
    try {
      const mod = await import('three');
      window.THREE = mod;
    } catch (e) {
      console.warn('Three.js failed to load, falling back to 2D canvas', e);
      return false;
    }
  }
  const THREE = window.THREE;
  if (!THREE || !THREE.WebGLRenderer) return false;

  const canvas = document.getElementById('bgCanvas');
  if (!canvas) return false;

  try {
    // Try WebGL2 first (universal support); WebGPU is still spotty.
    // Use a WebGL renderer with a full-screen shader quad.
    __nebulaRenderer = new THREE.WebGLRenderer({
      canvas,
      antialias: false,
      alpha: false,
      powerPreference: 'high-performance',
    });
    __nebulaRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    __nebulaRenderer.setSize(window.innerWidth, window.innerHeight);
    __nebulaRenderer.setClearColor(0x0D1B2A, 1);

    __nebulaScene = new THREE.Scene();
    __nebulaCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    // Volumetric nebula fragment shader: raymarched 3D noise + parallax starfield.
    // The shader produces: deep navy base, flowing teal nebula clouds (3D Simplex),
    // subtle violet accents, golden highlights, and a parallax star layer.
    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `;

    const fragmentShader = `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform vec2 uResolution;
      uniform vec2 uMouse;
      uniform float uCharge;     // 0..1 — brightens when ritual is active
      uniform float uLucidBoost; // 0..1 — brightens when user has lucid dreams

      // --- 3D Simplex noise (Ashima Arts, public domain) ---
      vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
      float snoise(vec3 v){
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
                   i.z + vec4(0.0, i1.z, i2.z, 1.0))
                 + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                 + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      // FBM (Fractal Brownian Motion) — layered noise for cloud-like density
      float fbm(vec3 p) {
        float v = 0.0;
        float a = 0.5;
        for (int i = 0; i < 5; i++) {
          v += a * snoise(p);
          p *= 2.0;
          a *= 0.5;
        }
        return v;
      }

      // Hash for procedural stars
      float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }

      void main() {
        vec2 uv = vUv;
        vec2 p = (uv - 0.5) * vec2(uResolution.x / uResolution.y, 1.0);
        // Mouse parallax (subtle)
        p += uMouse * 0.05;

        float t = uTime * 0.02;

        // === NEBULA CLOUDS (3D FBM) ===
        vec3 cloudPos = vec3(p * 1.5, t);
        float clouds = fbm(cloudPos);
        clouds = smoothstep(-0.2, 0.6, clouds);

        // Second layer — slower, deeper
        float deepClouds = fbm(vec3(p * 0.6, t * 0.5 + 100.0));
        deepClouds = smoothstep(0.0, 0.5, deepClouds);

        // === COLOR PALETTE (navy + teal + gold accents) ===
        vec3 deepNavy = vec3(0.05, 0.10, 0.16);     // #0D1B2A
        vec3 midNavy  = vec3(0.08, 0.13, 0.22);     // #152238
        vec3 teal     = vec3(0.62, 0.92, 0.91);     // #9FEAE8
        vec3 deepTeal = vec3(0.37, 0.74, 0.73);     // #5FBDB9
        vec3 gold     = vec3(0.96, 0.85, 0.48);     // #F5D97A
        vec3 violet   = vec3(0.72, 0.58, 0.96);     // #B794F4

        // Base gradient: deep at edges, mid in center
        float vignette = 1.0 - length(p) * 0.6;
        vec3 col = mix(deepNavy, midNavy, vignette);

        // Apply nebula clouds (teal)
        col = mix(col, col + teal * 0.18 * clouds, clouds * 0.7);
        // Deep cloud shadows
        col = mix(col, col - deepNavy * 0.3 * deepClouds, deepClouds * 0.4);

        // Golden highlights where clouds are densest
        float goldMask = smoothstep(0.55, 0.85, clouds) * smoothstep(0.3, 0.6, deepClouds);
        col += gold * 0.12 * goldMask;

        // Violet accents (rare, on the periphery)
        float violetMask = smoothstep(0.4, 0.7, fbm(vec3(p * 2.0 + 50.0, t * 0.3)));
        col += violet * 0.08 * violetMask * (1.0 - vignette);

        // Charge boost — when ritual active, brighten everything + add gold
        col += teal * 0.15 * uCharge;
        col += gold * 0.25 * uCharge * clouds;

        // Lucid boost — subtle, persistent for users with lucid dreams
        col += teal * 0.05 * uLucidBoost;

        // === STARFIELD (procedural, parallax) ===
        // Two layers: distant (small, many) + near (larger, fewer, brighter)
        for (int layer = 0; layer < 2; layer++) {
          float scale = layer == 0 ? 180.0 : 80.0;
          float brightBoost = layer == 0 ? 0.6 : 1.0;
          vec2 starUv = uv * scale + uMouse * (layer == 0 ? 5.0 : 12.0);
          vec2 cell = floor(starUv);
          vec2 cellUv = fract(starUv) - 0.5;
          float starSeed = hash(cell);
          // Only ~15% of cells have a star
          if (starSeed > 0.85) {
            float twinkle = 0.5 + 0.5 * sin(uTime * (1.0 + starSeed * 2.0) + starSeed * 10.0);
            float starDist = length(cellUv);
            float star = smoothstep(0.15, 0.0, starDist) * twinkle * brightBoost;
            // Star color: mostly teal-white, occasional gold
            vec3 starCol = starSeed > 0.97 ? gold : mix(teal, vec3(1.0), 0.4);
            col += starCol * star * 0.8;
            // Glow halo for bright stars
            col += starCol * star * smoothstep(0.4, 0.0, starDist) * 0.15;
          }
        }

        // Subtle film grain to prevent banding
        float grain = hash(uv * uResolution + uTime) * 0.015;
        col += grain - 0.0075;

        // Final vignette
        col *= 1.0 - length(p) * 0.15;

        gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
      }
    `;

    __nebulaMaterial = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uTime: { value: 0 },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        uMouse: { value: new THREE.Vector2(0, 0) },
        uCharge: { value: 0 },
        uLucidBoost: { value: 0 },
      },
      depthTest: false,
      depthWrite: false,
    });

    const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), __nebulaMaterial);
    __nebulaScene.add(quad);

    // Mouse parallax
    let mouseX = 0, mouseY = 0;
    const onMouseMove = (e) => {
      mouseX = (e.clientX / window.innerWidth) - 0.5;
      mouseY = (e.clientY / window.innerHeight) - 0.5;
    };
    window.addEventListener('mousemove', onMouseMove, { passive: true });
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length) {
        mouseX = (e.touches[0].clientX / window.innerWidth) - 0.5;
        mouseY = (e.touches[0].clientY / window.innerHeight) - 0.5;
      }
    }, { passive: true });

    // Resize
    const onResize = () => {
      __nebulaRenderer.setSize(window.innerWidth, window.innerHeight);
      __nebulaMaterial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    };
    window.addEventListener('resize', onResize);

    // Pause when tab hidden
    let visible = true;
    document.addEventListener('visibilitychange', () => {
      visible = !document.hidden;
    });

    // Render loop
    __nebulaActive = true;
    const clock = new THREE.Clock();
    const animate = () => {
      if (!__nebulaActive) return;
      __nebulaRAF = requestAnimationFrame(animate);
      if (!visible) return;
      const t = clock.getElapsedTime();
      __nebulaMaterial.uniforms.uTime.value = t;
      // Smooth mouse follow
      __nebulaMaterial.uniforms.uMouse.value.x += (mouseX - __nebulaMaterial.uniforms.uMouse.value.x) * 0.05;
      __nebulaMaterial.uniforms.uMouse.value.y += (mouseY - __nebulaMaterial.uniforms.uMouse.value.y) * 0.05;
      // Charge uniform is updated externally by ritual engine
      try { __nebulaRenderer.render(__nebulaScene, __nebulaCamera); } catch(e) { stopNebula(); }
    };
    animate();

    // Expose API for ritual engine to drive uCharge
    window.__nebulaSetCharge = (v) => {
      if (__nebulaMaterial) __nebulaMaterial.uniforms.uCharge.value = Math.max(0, Math.min(1, v));
    };
    window.__nebulaSetLucidBoost = (v) => {
      if (__nebulaMaterial) __nebulaMaterial.uniforms.uLucidBoost.value = Math.max(0, Math.min(1, v));
    };

    // Set initial lucid boost based on user's lucid dream count
    setTimeout(async () => {
      try {
        const lucidCount = dreamsCache.filter(d => d.isLucid).length;
        window.__nebulaSetLucidBoost(Math.min(1, lucidCount / 20));
      } catch(e) {}
    }, 2000);

    return true;
  } catch (e) {
    console.warn('Volumetric nebula init failed, falling back to 2D canvas', e);
    stopNebula();
    return false;
  }
}

function stopNebula() {
  __nebulaActive = false;
  if (__nebulaRAF) cancelAnimationFrame(__nebulaRAF);
  __nebulaRAF = null;
  if (__nebulaRenderer) {
    try { __nebulaRenderer.dispose(); } catch(e) {}
    __nebulaRenderer = null;
  }
  __nebulaScene = null;
  __nebulaCamera = null;
  __nebulaMaterial = null;
}

function initLivingBackground() {
  const canvas = document.getElementById('bgCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d', { alpha: false });
  if (!ctx) return;

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isMobile = window.matchMedia('(max-width: 768px)').matches;

  let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
  let stars = [];
  let nebulae = [];
  let shootingStars = [];
  let mouse = { x: -9999, y: -9999, active: false };
  let lastFrame = 0;
  let visible = true;
  let frameCount = 0;

  const NUM_STARS_DEEP = isMobile ? 80 : 180;
  const NUM_STARS_MID  = isMobile ? 50 : 120;
  const NUM_STARS_NEAR = isMobile ? 25 : 60;
  const NUM_NEBULAE    = isMobile ? 2 : 4;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function rand(min, max) { return min + Math.random() * (max - min); }

  function makeStar(layer) {
    // layer: 0 = deep (dim, slow twinkle), 1 = mid, 2 = near (bright, larger)
    const sizeMap = [
      () => rand(0.4, 1.0),
      () => rand(0.8, 1.6),
      () => rand(1.4, 2.6),
    ];
    const brightnessMap = [0.25, 0.5, 0.85];
    const speedMap = [0.02, 0.06, 0.12]; // parallax speed
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      size: sizeMap[layer](),
      brightness: brightnessMap[layer],
      twinkleSpeed: rand(0.4, 1.6),
      twinklePhase: Math.random() * Math.PI * 2,
      parallax: speedMap[layer],
      hue: Math.random() < 0.85 ? 'teal' : (Math.random() < 0.5 ? 'gold' : 'violet'),
      layer
    };
  }

  function makeNebula() {
    const palettes = [
      ['rgba(159,234,232,0.10)', 'rgba(159,234,232,0)'],     // teal
      ['rgba(95,189,185,0.08)',  'rgba(95,189,185,0)'],      // deep teal
      ['rgba(183,148,244,0.06)', 'rgba(183,148,244,0)'],     // violet (rare)
      ['rgba(245,217,122,0.04)', 'rgba(245,217,122,0)'],     // gold (rare)
    ];
    const palette = palettes[Math.floor(Math.random() * palettes.length)];
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: rand(180, 360),
      dx: rand(-0.04, 0.04),
      dy: rand(-0.02, 0.02),
      color: palette[0],
      colorEnd: palette[1],
    };
  }

  function makeShootingStar() {
    const fromLeft = Math.random() < 0.5;
    return {
      x: fromLeft ? -50 : W + 50,
      y: Math.random() * H * 0.6,
      vx: (fromLeft ? 1 : -1) * rand(6, 10),
      vy: rand(2, 4),
      life: 0,
      maxLife: rand(40, 80),
      trail: [],
    };
  }

  function init() {
    resize();
    stars = [];
    for (let i = 0; i < NUM_STARS_DEEP; i++) stars.push(makeStar(0));
    for (let i = 0; i < NUM_STARS_MID; i++)  stars.push(makeStar(1));
    for (let i = 0; i < NUM_STARS_NEAR; i++) stars.push(makeStar(2));
    nebulae = [];
    for (let i = 0; i < NUM_NEBULAE; i++) nebulae.push(makeNebula());
  }

  function drawNebulae() {
    for (const n of nebulae) {
      n.x += n.dx;
      n.y += n.dy;
      // Wrap around
      if (n.x < -n.r) n.x = W + n.r;
      if (n.x > W + n.r) n.x = -n.r;
      if (n.y < -n.r) n.y = H + n.r;
      if (n.y > H + n.r) n.y = -n.r;
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(1, n.r));
      grad.addColorStop(0, n.color);
      grad.addColorStop(1, n.colorEnd);
      ctx.fillStyle = grad;
      ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
    }
  }

  function drawStars(t) {
    for (const s of stars) {
      // Twinkle
      const twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 * s.twinkleSpeed + s.twinklePhase);
      let alpha = s.brightness * (0.6 + 0.4 * twinkle);

      // Mouse interaction: brighten stars near cursor
      if (mouse.active) {
        const dx = s.x - mouse.x;
        const dy = s.y - mouse.y;
        const dist2 = dx * dx + dy * dy;
        if (dist2 < 14400) { // within 120px
          const boost = 1 - Math.sqrt(dist2) / 120;
          alpha = Math.min(1, alpha + boost * 0.6);
        }
      }

      const color = s.hue === 'gold' ? '245,217,122' : s.hue === 'violet' ? '183,148,244' : '159,234,232';
      const size = Math.max(0.1, s.size * (1 + (alpha - s.brightness) * 0.4));

      // Glow for brighter stars
      if (s.layer >= 1 || alpha > 0.7) {
        const glowGrad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, size * 4);
        glowGrad.addColorStop(0, `rgba(${color},${alpha * 0.4})`);
        glowGrad.addColorStop(1, `rgba(${color},0)`);
        ctx.fillStyle = glowGrad;
        ctx.fillRect(s.x - size * 4, s.y - size * 4, size * 8, size * 8);
      }

      // Core
      ctx.fillStyle = `rgba(${color},${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, size, 0, Math.PI * 2);
      ctx.fill();

      // Cross-flare for the brightest stars
      if (s.layer === 2 && alpha > 0.75) {
        ctx.strokeStyle = `rgba(${color},${alpha * 0.35})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(s.x - size * 3, s.y);
        ctx.lineTo(s.x + size * 3, s.y);
        ctx.moveTo(s.x, s.y - size * 3);
        ctx.lineTo(s.x, s.y + size * 3);
        ctx.stroke();
      }
    }
  }

  function drawShootingStars() {
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.trail.push({ x: s.x, y: s.y });
      if (s.trail.length > 12) s.trail.shift();
      s.x += s.vx;
      s.y += s.vy;
      s.life++;

      // Draw trail
      for (let j = 0; j < s.trail.length; j++) {
        const p = s.trail[j];
        const a = (j / s.trail.length) * (1 - s.life / s.maxLife) * 0.8;
        const r = Math.max(0.1, (j / s.trail.length) * 1.5);
        ctx.fillStyle = `rgba(159,234,232,${a})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      // Head
      const headAlpha = 1 - s.life / s.maxLife;
      ctx.fillStyle = `rgba(184,245,243,${headAlpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.8, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 12);
      grad.addColorStop(0, `rgba(184,245,243,${headAlpha * 0.6})`);
      grad.addColorStop(1, 'rgba(184,245,243,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(s.x - 12, s.y - 12, 24, 24);

      // Remove if off-screen or expired
      if (s.life >= s.maxLife || s.x < -100 || s.x > W + 100 || s.y > H + 100) {
        shootingStars.splice(i, 1);
      }
    }
    // Occasionally spawn a new shooting star
    if (!isMobile && Math.random() < 0.0015 && shootingStars.length < 2) {
      shootingStars.push(makeShootingStar());
    }
  }

  function drawMouseTrail() {
    if (!mouse.active) return;
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 80);
    grad.addColorStop(0, 'rgba(159,234,232,0.08)');
    grad.addColorStop(1, 'rgba(159,234,232,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(mouse.x - 80, mouse.y - 80, 160, 160);
  }

  function render(t) {
    if (!visible) {
      requestAnimationFrame(render);
      return;
    }
    // Throttle to ~60fps max; skip frames if tab is throttling
    if (t - lastFrame < 14) {
      requestAnimationFrame(render);
      return;
    }
    lastFrame = t;

    // Clear with bg colour
    ctx.fillStyle = '#0D1B2A';
    ctx.fillRect(0, 0, W, H);

    drawNebulae();
    drawStars(t);
    drawShootingStars();
    drawMouseTrail();

    frameCount++;
    requestAnimationFrame(render);
  }

  // Event handlers
  window.addEventListener('resize', () => {
    // Re-init star positions on significant resize
    init();
  });
  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
  });
  window.addEventListener('mouseleave', () => { mouse.active = false; });
  window.addEventListener('touchmove', e => {
    if (e.touches.length) {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.active = true;
    }
  }, { passive: true });
  window.addEventListener('touchend', () => { mouse.active = false; });
  document.addEventListener('visibilitychange', () => {
    visible = !document.hidden;
  });

  init();
  if (prefersReduced) {
    // Static single frame for reduced motion
    ctx.fillStyle = '#0D1B2A';
    ctx.fillRect(0, 0, W, H);
    drawNebulae();
    drawStars(0);
  } else {
    requestAnimationFrame(render);
  }
}

// ==================== MOON PHASE ====================
function getMoonPhase() {
  const knownNew=new Date(2000,0,6,18,14), syn=29.53058867;
  const diff=(Date.now()-knownNew.getTime())/(1000*60*60*24);
  const frac=((diff%syn)+syn)%syn/syn;
  let n;
  if(frac<0.0625)n='New Moon';else if(frac<0.1875)n='Waxing Crescent';else if(frac<0.3125)n='First Quarter';
  else if(frac<0.4375)n='Waxing Gibbous';else if(frac<0.5625)n='Full Moon';else if(frac<0.6875)n='Waning Gibbous';
  else if(frac<0.8125)n='Last Quarter';else if(frac<0.9375)n='Waning Crescent';else n='New Moon';
  return {name:n,fraction:frac};
}
function moonPhaseSVG(sz=48) {
  return moonPhaseDetailedSVG(sz, false);
}

function moonPhaseDetailedSVG(sz=48, isHero=false) {
  const m = getMoonPhase(), f = m.fraction;
  // Unique gradient IDs per call to avoid collisions when multiple moons on a page
  const uid = 'moon' + Math.random().toString(36).slice(2, 8);
  const glowId = 'glow_' + uid;
  const surfaceId = 'surf_' + uid;
  const shadowId = 'shadow_' + uid;
  const craterMaskId = 'cm_' + uid;
  const terminatorId = 'term_' + uid;

  // Compute lit ellipse parameters
  // f=0 new moon (all dark), f=0.5 full moon (all lit), f=1 new moon again
  // The lit limb is on the right for waxing (f<0.5), left for waning (f>0.5)
  const waxing = f < 0.5;
  const litFraction = waxing ? f * 2 : (1 - f) * 2; // 0..1, 1 at full
  // Terminator ellipse x-radius: full disc at litFraction=0.5, 0 at 0 or 1
  // For waxing crescent: lit area is right side
  // semi-major axis perpendicular to terminator line = 18 * |cos(litFraction*pi)|
  const terminatorRadius = 18 * Math.abs(Math.cos(litFraction * Math.PI));

  // Stably-seeded crater positions (deterministic by phase so they don't flicker)
  const seed = Math.floor(f * 1000);
  function rng(s) { return function() { s = (s * 9301 + 49297) % 233280; return s / 233280; }; }
  const rand = rng(seed);
  const craters = [];
  for (let i = 0; i < (isHero ? 14 : 7); i++) {
    const angle = rand() * Math.PI * 2;
    const dist = rand() * 14;  // within moon disc
    const cx = 24 + Math.cos(angle) * dist;
    const cy = 24 + Math.sin(angle) * dist;
    const r = 0.6 + rand() * 1.4;
    // Only keep craters inside the disc
    if (Math.hypot(cx - 24, cy - 24) > 16) continue;
    craters.push({ cx, cy, r, opacity: 0.15 + rand() * 0.2 });
  }

  // Crater SVG
  let craterSvg = '';
  for (const c of craters) {
    craterSvg += `<circle cx="${c.cx.toFixed(2)}" cy="${c.cy.toFixed(2)}" r="${c.r.toFixed(2)}" fill="#000" opacity="${c.opacity.toFixed(2)}"/>`;
    craterSvg += `<circle cx="${(c.cx - c.r * 0.3).toFixed(2)}" cy="${(c.cy - c.r * 0.3).toFixed(2)}" r="${(c.r * 0.5).toFixed(2)}" fill="#fff" opacity="${(c.opacity * 0.4).toFixed(2)}"/>`;
  }

  // Surface gradient (radial, offset highlight)
  const surfaceGrad = `<radialGradient id="${surfaceId}" cx="35%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#F8FBFA" stop-opacity="0.95"/>
    <stop offset="40%" stop-color="#C5EAE8" stop-opacity="0.85"/>
    <stop offset="80%" stop-color="#5FBDB9" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#1E4A4A" stop-opacity="0.5"/>
  </radialGradient>`;

  // Shadow gradient for the dark side
  const shadowGrad = `<radialGradient id="${shadowId}" cx="65%" cy="70%" r="80%">
    <stop offset="0%" stop-color="#1B2A45" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.95"/>
  </radialGradient>`;

  // Terminator soft edge
  const terminatorGrad = `<linearGradient id="${terminatorId}" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="50%" stop-color="#000" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </linearGradient>`;

  // Outer glow filter
  const glowFilter = `<filter id="${glowId}" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="${isHero ? 2 : 1.2}" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;

  // Determine path for lit area
  // Full disc: <circle r=18>
  // For phases, we use a path that's an arc on the outer circle + arc on terminator ellipse
  // Waxing: lit on right, terminator on left
  // Waning: lit on left, terminator on right
  // New moon: empty (just outline)
  // Full moon: full disc
  let litPath;
  if (litFraction > 0.98) {
    litPath = `<circle cx="24" cy="24" r="18" fill="url(#${surfaceId})"/>`;
  } else if (litFraction < 0.02) {
    litPath = ''; // new moon — no lit area
  } else {
    // For waxing: outer arc from top (24,6) clockwise to bottom (24,42), then terminator arc back
    // For waning: outer arc from bottom (24,42) clockwise to top (24,6), then terminator arc back
    const sweepOuter = waxing ? 1 : 0;  // outer arc direction
    const sweepTerm = waxing ? 0 : 1;   // terminator arc direction (opposite)
    // When litFraction < 0.5, terminator curve bulges into lit side (concave from lit side's perspective)
    // When litFraction > 0.5, terminator bulges into dark side (oval shape on lit side)
    const termRx = Math.max(0.5, terminatorRadius);
    litPath = `<path d="M 24 6 A 18 18 0 ${sweepOuter} 1 24 42 A ${termRx.toFixed(2)} 18 0 ${sweepTerm} ${litFraction < 0.5 ? sweepTerm : 1 - sweepTerm} 24 6 Z" fill="url(#${surfaceId})"/>`;
  }

  // Dark side (always present, behind lit area)
  const darkSide = `<circle cx="24" cy="24" r="18" fill="url(#${shadowId})"/>`;

  // Outer ring (subtle)
  const outerRing = `<circle cx="24" cy="24" r="18.5" fill="none" stroke="rgba(159,234,232,0.25)" stroke-width="0.5"/>`;

  // Crater mask: only show craters on the lit side (use the litPath as a clip)
  const craterClip = `<clipPath id="${craterMaskId}">${litPath || '<path d="M0 0"/>'}</clipPath>`;
  const craterLayer = `<g clip-path="url(#${craterMaskId})" style="animation: rotateSlow ${isHero ? 240 : 180}s linear infinite; transform-origin: 24px 24px;">${craterSvg}</g>`;

  // Soft glow halo around moon
  const haloRadius = isHero ? 28 : 24;
  const halo = `<circle cx="24" cy="24" r="${haloRadius}" fill="none" stroke="rgba(159,234,232,0.15)" stroke-width="${isHero ? 6 : 3}" filter="url(#${glowId})" style="animation: breathe ${isHero ? 5 : 6}s ease-in-out infinite; transform-origin: 24px 24px;"/>`;

  // For hero only: orbiting particles
  let orbitParticles = '';
  if (isHero) {
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const r = 26;
      const px = 24 + Math.cos(angle) * r;
      const py = 24 + Math.sin(angle) * r;
      orbitParticles += `<circle cx="${px.toFixed(2)}" cy="${py.toFixed(2)}" r="0.7" fill="var(--accent-bright)" opacity="0.6">
        <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="${60 + i * 5}s" repeatCount="indefinite"/>
      </circle>`;
    }
  }

  return `<svg width="${sz}" height="${sz}" viewBox="0 0 48 48" style="overflow:visible;">
    <defs>
      ${surfaceGrad}
      ${shadowGrad}
      ${terminatorGrad}
      ${glowFilter}
      ${craterClip}
    </defs>
    ${halo}
    ${outerRing}
    ${darkSide}
    ${litPath}
    ${craterLayer}
    ${orbitParticles}
  </svg>`;
}

// Hero version: larger, with orbiting particles
function moonPhaseHeroSVG(sz=120) {
  return moonPhaseDetailedSVG(sz, true);
}

// Moon with crack for broken streak
function moonPhaseCrackedSVG(sz=48) {
  const m=getMoonPhase(),f=m.fraction; let p;

// ==================== STREAK ====================
function calculateStreak() {
  if(!dreamsCache.length) return 0;
  const dates=[...new Set(dreamsCache.map(d=>d.date))].sort().reverse();
  const today=new Date().toISOString().split('T')[0];
  const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(dates[0]!==today&&dates[0]!==yest) return 0;
  let s=1; for(let i=1;i<dates.length;i++){if((new Date(dates[i-1])-new Date(dates[i]))/86400000===1)s++;else break;} return s;
}

// ==================== LUCID SUMMARY ====================
function getLucidSummary() {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const thisMonth = dreamsCache.filter(d => d.date >= monthStart);
  const lucidThisMonth = thisMonth.filter(d => d.isLucid).length;
  const totalThisMonth = thisMonth.length;
  return { lucid: lucidThisMonth, total: totalThisMonth };
}

function extractDreamSigns(dreams, topN=5) {
  if (!dreams || !dreams.length) return [];
  const freq = {};
  const lucidWords = new Set();
  const dreamSignsList = (DREAM_DICTIONARY || []).map(d => d.symbol.toLowerCase());

  for (const d of dreams) {
    if (!d.narrative) continue;
    const cleaned = d.narrative.toLowerCase().replace(/[^a-z\s'-]/g, ' ');
    const words = cleaned.split(/\s+/).filter(Boolean);
    const uniqueInDream = new Set();

    // Single words
    for (const w of words) {
      if (w.length < 3 || STOP_WORDS.has(w)) continue;
      // Boost score for known dream dictionary symbols
      uniqueInDream.add(w);
      const boost = dreamSignsList.includes(w) ? 2 : 1;
      freq[w] = (freq[w] || 0) + boost;
    }

    // Bigrams (two-word phrases) — useful for "old man", "red door" etc.
    for (let i = 0; i < words.length - 1; i++) {
      const a = words[i], b = words[i + 1];
      if (a.length < 3 || b.length < 3) continue;
      if (STOP_WORDS.has(a) || STOP_WORDS.has(b)) continue;
      // Skip if both words are common verbs/adjectives
      const phrase = a + ' ' + b;
      // Only count phrases that appear 2+ times across dreams (handled below)
      uniqueInDream.add(phrase);
      freq[phrase] = (freq[phrase] || 0) + 1;
    }

    if (d.isLucid) {
      for (const w of uniqueInDream) lucidWords.add(w);
    }
  }

  // Sort by frequency, prefer phrases that appear multiple times, prefer longer phrases (more specific)
  const sorted = Object.entries(freq)
    .filter(([w, c]) => c >= 2)
    .sort((a, b) => {
      // Prefer multi-word phrases (more specific dream signs)
      const aWords = a[0].split(' ').length;
      const bWords = b[0].split(' ').length;
      if (aWords !== bWords) return bWords - aWords;
      return b[1] - a[1];
    })
    .slice(0, topN);

  return sorted.map(([word, count]) => ({
    word,
    count,
    isLucidSign: lucidWords.has(word)
  }));
}

// In-memory latency tracker (resets per session)
const __providerStats = {};
function recordProviderAttempt(providerId, success, latencyMs) {
  if (!__providerStats[providerId]) __providerStats[providerId] = { attempts: 0, successes: 0, totalLatency: 0 };
  const s = __providerStats[providerId];
  s.attempts++;
  if (success) s.successes++;
  s.totalLatency += latencyMs;
}
function getProviderScore(providerId) {
  const s = __providerStats[providerId];
  if (!s || s.attempts === 0) return 1.0;
  return s.successes / s.attempts;
}

// Build a Pollinations URL with given prompt + options
function buildPollinationsUrl(provider, prompt, opts) {
  const params = new URLSearchParams({
    width: String(opts.width || 1024),
    height: String(opts.height || 512),
    nologo: 'true',
    seed: opts.seed || (Date.now().toString(36) + Math.random().toString(36).slice(2, 7)),
    model: provider.model,
  });
  return `${provider.endpoint}${encodeURIComponent(prompt)}?${params.toString()}`;
}

// Try to load an image URL with timeout. Resolves to {naturalWidth, naturalHeight} on success.
function loadImageWithTimeout(url, timeoutMs = 45000) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    let settled = false;
    const timer = setTimeout(() => {
      if (settled) return;
      settled = true;
      img.src = '';
      reject(new Error('Image load timeout'));
    }, timeoutMs);
    img.onload = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      if (img.naturalWidth < 10) {
        reject(new Error('Image too small (likely error placeholder)'));
        return;
      }
      resolve({ url, naturalWidth: img.naturalWidth, naturalHeight: img.naturalHeight });
    };
    img.onerror = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error('Image load error'));
    };
    img.src = url;
  });
}

// Procedural SVG fallback — generates a beautiful deterministic abstract scene from dream content.
// NEVER fails. Used when all network providers fail or are disabled.
function generateProceduralSVG(dream, opts = {}) {
  const w = opts.width || 1024, h = opts.height || 512;
  const seed = (dream.id || 'x').split('').reduce((s, c) => s + c.charCodeAt(0), 0);
  function rng(s) { return function() { s = (s * 9301 + 49297) % 233280; return s / 233280; }; }
  const rand = rng(seed);

  // Pick palette based on dominant emotion
  const emotion = (dream.emotions && dream.emotions[0]) || 'Wonder';
  const palettes = {
    'Joy': ['#FFE08A', '#F5D97A', '#9FEAE8'],
    'Fear': ['#3D2855', '#1B2A45', '#5FBDB9'],
    'Wonder': ['#9FEAE8', '#B794F4', '#F5D97A'],
    'Peace': ['#B8F5F3', '#9FEAE8', '#5FBDB9'],
    'Anxiety': ['#5C4A6E', '#3D2855', '#9FEAE8'],
    'Excitement': ['#FFE08A', '#F87171', '#9FEAE8'],
    'Sadness': ['#3D5A6E', '#1B2A45', '#5FBDB9'],
    'Confusion': ['#B794F4', '#9FEAE8', '#F5D97A'],
    'Nostalgia': ['#C9A040', '#F5D97A', '#5FBDB9'],
    'Awe': ['#9FEAE8', '#FFE08A', '#B794F4'],
    'Curiosity': ['#5FBDB9', '#9FEAE8', '#FFE08A'],
    'Love': ['#F87171', '#FFE08A', '#9FEAE8'],
  };
  const palette = palettes[emotion] || palettes['Wonder'];

  // Build SVG with layers: bg gradient, nebula clouds, stars, central abstract shape, title text
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">`;
  // Defs
  svg += `<defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="${palette[2]}" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="${palette[1]}" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="cloudGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${palette[0]}" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="${palette[0]}" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloudGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${palette[2]}" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="${palette[2]}" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>`;
  // Background
  svg += `<rect width="${w}" height="${h}" fill="url(#bgGrad)"/>`;
  // Nebula clouds
  for (let i = 0; i < 4; i++) {
    const cx = rand() * w, cy = rand() * h, r = 100 + rand() * 200;
    svg += `<circle cx="${cx.toFixed(0)}" cy="${cy.toFixed(0)}" r="${r.toFixed(0)}" fill="url(#cloudGrad${i%2+1})" filter="url(#glow)"/>`;
  }
  // Stars
  for (let i = 0; i < 80; i++) {
    const x = rand() * w, y = rand() * h, r = 0.5 + rand() * 1.8, o = 0.2 + rand() * 0.7;
    svg += `<circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${r.toFixed(1)}" fill="${palette[0]}" opacity="${o.toFixed(2)}"/>`;
  }
  // Central abstract shape (varies by lucidity)
  const isLucid = dream.isLucid;
  if (isLucid) {
    // Concentric rings for lucid dreams
    const cx = w/2, cy = h/2;
    for (let i = 0; i < 5; i++) {
      const r = 30 + i * 25;
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${palette[0]}" stroke-width="1.5" opacity="${0.5 - i*0.08}"/>`;
    }
    svg += `<circle cx="${cx}" cy="${cy}" r="20" fill="${palette[0]}" opacity="0.6" filter="url(#glow)"/>`;
  } else {
    // Abstract flowing curves for non-lucid
    let path = `M ${rand()*w} ${rand()*h}`;
    for (let i = 0; i < 5; i++) {
      const x1 = rand()*w, y1 = rand()*h, x2 = rand()*w, y2 = rand()*h;
      path += ` Q ${x1.toFixed(0)} ${y1.toFixed(0)}, ${x2.toFixed(0)} ${y2.toFixed(0)}`;
    }
    svg += `<path d="${path}" fill="none" stroke="${palette[0]}" stroke-width="2" opacity="0.5" filter="url(#glow)"/>`;
  }
  // Title text
  if (dream.title) {
    svg += `<text x="${w/2}" y="${h - 40}" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-style="italic" fill="${palette[0]}" opacity="0.85" filter="url(#glow)">${escapeHtml(dream.title).slice(0, 40)}</text>`;
  }
  // Phase marker
  const moon = getMoonPhase();
  svg += `<text x="20" y="30" font-family="monospace" font-size="11" fill="${palette[0]}" opacity="0.5">${moon.name} &middot; ${escapeHtml(emotion)}</text>`;
  svg += `</svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}

// Main orchestrator: tries providers in order, falls back to SVG.
// opts: { width, height, seed, style, prompt, onProgress }
async function generateDreamImage(dreamId, options = {}) {
  // Determine dimensions from aspect ratio (or explicit width/height override)
  let width = options.width;
  let height = options.height;
  if (!width || !height) {
    const aspectRatioId = options.aspectRatio || (await getSetting('imageAspectRatio', 'banner'));
    const dims = await getImageDimensions(aspectRatioId);
    width = dims.width;
    height = dims.height;
  }
  const opts = Object.assign({
    width, height,
    seed: dreamId + '-' + Date.now().toString(36),
    style: null,  // chosen style key
    prompt: null, // pre-built prompt
    onProgress: () => {},
  }, options);
  opts.width = width;
  opts.height = height;

  const dream = await getDream(dreamId);
  if (!dream) return null;

  // Build prompt if not provided
  const prompt = opts.prompt || buildImagePrompt(dream, { style: opts.style, sceneIndex: opts.sceneIndex });

  opts.onProgress('composing');
  // Try each provider
  // Order by reliability (most successful first), then by avg latency
  const providers = [...IMAGE_PROVIDERS].sort((a, b) => {
    const sa = getProviderScore(a.id) * 0.7 + (1 / (a.avgLatency / 1000)) * 0.3;
    const sb = getProviderScore(b.id) * 0.7 + (1 / (b.avgLatency / 1000)) * 0.3;
    return sb - sa;
  });

  for (let i = 0; i < providers.length; i++) {
    const provider = providers[i];
    if (!navigator.onLine) break;
    opts.onProgress('rendering', provider.name);
    const url = buildPollinationsUrl(provider, prompt, opts);
    const start = Date.now();
    try {
      const result = await loadImageWithTimeout(url, 45000);
      const latency = Date.now() - start;
      recordProviderAttempt(provider.id, true, latency);
      return {
        url: result.url,
        provider: provider.id,
        prompt,
        style: opts.style,
        width: opts.width,
        height: opts.height,
        generatedAt: Date.now(),
        procedural: false,
      };
    } catch (e) {
      const latency = Date.now() - start;
      recordProviderAttempt(provider.id, false, latency);
      console.warn(`Provider ${provider.id} failed:`, e.message);
      // try next provider
    }
  }

  // All network providers failed (or offline) — generate procedural SVG
  opts.onProgress('fallback');
  const svgUrl = generateProceduralSVG(dream, opts);
  return {
    url: svgUrl,
    provider: 'procedural-svg',
    prompt,
    style: opts.style || 'procedural',
    width: opts.width,
    height: opts.height,
    generatedAt: Date.now(),
    procedural: true,
  };
}

// ==================== SMART SCENE EXTRACTION (v5) ====================
// Split narrative into sentences, score by "visualness", pick the most painterly ones.

function splitSentences(text) {
  if (!text) return [];
  // Handle common abbreviations to avoid false splits
  const cleaned = text.replace(/\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|vs|etc|e\.g|i\.e)\./g, '$1<DOT>');
  // Split on . ! ? followed by space + capital letter, or newline
  const parts = cleaned.split(/(?<=[.!?])\s+(?=[A-Z"])|\n+/);
  return parts
    .map(s => s.replace(/<DOT>/g, '.').trim())
    .filter(s => s.length >= 10 && s.length < 400);
}

function scoreSentenceVisualness(sentence) {
  if (!sentence) return 0;
  const text = sentence.toLowerCase();
  let score = 0;

  // Visual nouns (high weight)
  for (const key of Object.keys(VISUAL_NOUNS)) {
    const re = new RegExp('\\b' + key + 's?\\b', 'i');
    if (re.test(text)) score += 15;
  }

  // Visual adjectives (medium weight)
  for (const key of Object.keys(VISUAL_ADJECTIVES)) {
    const re = new RegExp('\\b' + key + '\\b', 'i');
    if (re.test(text)) score += 8;
  }

  // Action verbs (medium weight)
  const actionVerbs = ['flew','flying','fell','falling','ran','running','swam','swimming','danced','dancing',
    'floated','floating','climbed','climbing','jumped','jumping','flew','soared','plummeted','sank','rose',
    'turned','transformed','appeared','vanished','emerged','glowed','shimmered','whispered','called'];
  for (const v of actionVerbs) {
    if (text.includes(v)) score += 10;
  }

  // Sensory words (light, sound, texture)
  const sensoryWords = ['light','dark','bright','shadow','glow','glowing','shimmer','sparkle','glisten',
    'gold','silver','crystal','glass','mirror','mist','fog','rain','snow','wind','fire','smoke','steam',
    'loud','silent','quiet','roar','whisper','sing','echo','cold','warm','hot','wet','dry','soft','hard',
    'smooth','rough','sharp','blunt'];
  for (const w of sensoryWords) {
    if (text.includes(w)) score += 5;
  }

  // Colors (high weight)
  const colors = ['red','blue','green','yellow','purple','orange','pink','black','white','gold','silver',
    'crimson','azure','emerald','violet','scarlet','teal','navy','cream','ivory','obsidian'];
  for (const c of colors) {
    if (text.includes(c)) score += 8;
  }

  // Numbers + size descriptors
  if (/\b(huge|tiny|massive|enormous|gigantic|microscopic|infinite|vast|towering)\b/.test(text)) score += 10;

  // Penalty: too generic
  const generic = ['i was','i am','then i','and then','suddenly','i saw','i went','i walked','i came'];
  for (const g of generic) {
    if (text.startsWith(g)) score -= 3;
  }

  // Length bonus: longer sentences tend to be more descriptive
  if (sentence.length > 60) score += 5;
  if (sentence.length > 120) score += 5;

  return Math.max(0, Math.min(100, score));
}

function extractDreamScenes(narrative, maxScenes = 3) {
  const sentences = splitSentences(narrative);
  if (!sentences.length) return [];

  // Score each
  const scored = sentences.map(s => ({
    text: s,
    score: scoreSentenceVisualness(s),
    keywords: extractVisualKeywords(s),
  }));

  // Sort by score desc, take top N
  const top = scored.sort((a, b) => b.score - a.score).slice(0, maxScenes);

  // Re-sort by original order (so scenes flow chronologically)
  const topTexts = new Set(top.map(t => t.text));
  return scored
    .filter(s => topTexts.has(s.text))
    .slice(0, maxScenes);
}

function detectDreamType(dream) {
  if (!dream) return null;
  const narrative = dream.narrative || '';
  const emotions = dream.emotions || [];
  const matches = [];

  for (const template of DREAM_TYPE_TEMPLATES) {
    let score = 0;
    // Regex match: strong signal
    if (template.detectRegex.test(narrative)) score += 5;
    // Emotion match: weaker signal
    for (const e of emotions) {
      if (template.detectEmotions.includes(e)) score += 1;
    }
    // Apply template weight
    score *= template.weight;
    if (score > 0) matches.push({ template, score });
  }

  if (!matches.length) return null;
  matches.sort((a, b) => b.score - a.score);
  return matches[0].template;
}

function chooseDefaultStyle(dream) {

  const dreamType = detectDreamType(dream);
  if (dreamType && dreamType.suggestedStyle) {
    // Still apply emotion/narrative overrides below if they're stronger
    // (but template's suggested style is a good default)
  }
  const narrative = (dream.narrative || '').toLowerCase();
  const emotions = dream.emotions || [];

  // Cosmic vision for awe/wonder + space mentions
  if (emotions.includes('Awe') && /space|stars|galaxy|cosmos|universe|nebula/.test(narrative)) {
    return 'cosmic_vision';
  }
  // Cyberpunk for tech/city/futuristic mentions
  if (/cyberpunk|neon|city|skyscraper|robot|android|future|cyber|matrix|hologram/.test(narrative)) {
    return 'cyberpunk_neon';
  }
  // Botanical for nature/garden mentions
  if (/garden|flower|plant|tree|forest|botanical|leaf|petal/.test(narrative)) {
    return 'botanical_vintage';
  }
  // Surrealist for impossible/abstract mentions
  if (/impossible|floating|melting|geometry|infinite|strange|surreal|twisted|warped/.test(narrative)) {
    return 'surreal_dali';
  }
  // Minimalist for peaceful/zen
  if (emotions.includes('Peace') && emotions.length === 1) {
    return 'minimalist_ink';
  }
  // Ghibli for childlike wonder
  if (emotions.includes('Wonder') || /child|childhood|play|magic|whimsy/.test(narrative)) {
    return 'ghibli';
  }
  // Oil for sad/melancholic
  if (emotions.includes('Sadness') || emotions.includes('Nostalgia')) {
    return 'oil_dreamscape';
  }
  // If a dream type template matched, use its suggested style
  if (dreamType && dreamType.suggestedStyle) {
    return dreamType.suggestedStyle;
  }
  // Default: watercolour comic
  return 'watercolour_comic';
}

// Pick a style for a dream based on user's rotation mode setting
async function pickStyleForDream(dream) {
  const mode = await getSetting('styleRotationMode', 'auto');
  const fixedStyle = await getSetting('defaultStyle', 'watercolour_comic');

  if (mode === 'fixed') return fixedStyle;
  if (mode === 'random') {
    return ART_STYLES[Math.floor(Math.random() * ART_STYLES.length)].id;
  }
  // auto: use content-based default
  return chooseDefaultStyle(dream);
}

  // Based on dream time of day
  'night': 'midnight navy and silver moonlight',

function extractVisualKeywords(narrative) {
  if (!narrative) return [];
  const text = narrative.toLowerCase();
  const found = new Set();
  // Single-word visual nouns
  for (const [key, phrase] of Object.entries(VISUAL_NOUNS)) {
    const re = new RegExp('\\b' + key + 's?\\b', 'i');
    if (re.test(text)) found.add(phrase);
  }
  // Adjective-noun pairs (e.g. "old house" -> "ancient weathered house")
  const words = text.split(/\s+/);
  for (let i = 0; i < words.length - 1; i++) {
    const adj = words[i].replace(/[^a-z]/g, '');
    const noun = words[i + 1].replace(/[^a-z]/g, '');
    if (VISUAL_ADJECTIVES[adj] && VISUAL_NOUNS[noun]) {
      found.add(`${VISUAL_ADJECTIVES[adj]} ${VISUAL_NOUNS[noun]}`);
    }
  }
  // Limit to 5 most relevant (first occurrences)
  return Array.from(found).slice(0, 5);
}

function getTimeOfDay(timeStr) {
  if (!timeStr) return 'unknown';
  const [h] = timeStr.split(':').map(Number);
  if (isNaN(h)) return 'unknown';
  if (h >= 22 || h < 4) return 'night';
  if (h >= 4 && h < 8) return 'dawn';
  if (h >= 8 && h < 12) return 'morning';
  if (h >= 12 && h < 17) return 'day';
  if (h >= 17 && h < 22) return 'dusk';
  return 'unknown';
}

function getMoodModifier(emotions) {
  if (!emotions || !emotions.length) return 'mysterious, ethereal atmosphere';
  // Use up to 2 emotions
  const topEmotions = emotions.slice(0, 2);
  const modifiers = topEmotions.map(e => EMOTION_MODIFIERS[e]).filter(Boolean);
  if (!modifiers.length) return 'mysterious, ethereal atmosphere';
  return modifiers.join(', ');
}

// Build a rich, detailed image prompt
function buildImagePrompt(dream, options = {}) {
  const level = dream.lucidityLevel || 0;
  const lucidityDesc = LUCIDITY_DESCRIPTORS[Math.min(level, 5)];
  const mood = getMoodModifier(dream.emotions);
  const timeOfDay = getTimeOfDay(dream.time);
  const palette = TIME_OF_NIGHT_PALETTE[timeOfDay];

  // Use smart scene extraction: pick most visual sentence
  const scenes = extractDreamScenes(dream.narrative, 3);
  let scene;
  if (scenes && scenes.length) {
    const sceneIdx = Math.min(options.sceneIndex || 0, scenes.length - 1);
    scene = scenes[sceneIdx].text;
  } else {
    scene = (dream.narrative || '').slice(0, 180).trim();
  }
  if (scene.length > 220) scene = scene.slice(0, 220).replace(/\s+\S*$/, '') + '…';

  // Pick keywords from the chosen scene (or fall back to full narrative)
  const keywords = scenes && scenes.length
    ? scenes[Math.min(options.sceneIndex || 0, scenes.length - 1)].keywords
    : extractVisualKeywords(dream.narrative);

  // Style is determined by Stage 3 (ART_STYLES). If options.style is provided,
  // we'll look it up; otherwise default to 'watercolour_comic'.
  let stylePrefix = 'watercolour and ink illustration,';
  let styleSuffix = 'field guide illustration aesthetic';
  if (options.style && typeof ART_STYLES !== 'undefined') {
    const style = ART_STYLES.find(s => s.id === options.style);
    if (style) {
      stylePrefix = style.promptPrefix;
      styleSuffix = style.promptSuffix;
    }
  }

  // Composition rules — vary based on whether lucid
  const composition = dream.isLucid
    ? 'centered composition with radiant focal point, sense of clarity and intention'
    : 'asymmetric composition with shifting perspectives, dreamlike layered depth';

  // v5: Emotion-driven palette + lighting (overrides time-of-night)
  const emotionPalette = buildPaletteString(dream.emotions, timeOfDay, dream.isLucid);
  const emotionLighting = buildLightingString(dream.emotions, dream.isLucid);
  const visualElements = buildVisualElementsString(dream.emotions);

  // Negative prompt (with user customizations applied at build time via async getter — but buildImagePrompt is sync.
  // So we read from a cached value populated on init.
  const customSuffix = window.__customPromptSuffix || '';
  const customNegative = window.__customNegativePrompt || '';
  const negative = 'no text, no words, no letters, no signature, no watermark, no speech bubbles, no captions, no distorted faces, no extra limbs' + (customNegative ? ', ' + customNegative : '');

  // Title (shorten if too long)
  const title = (dream.title || 'Untitled Dream').slice(0, 60);

  // Detect dream type for template-specific prompt additions
  const dreamType = detectDreamType(dream);
  const typeAdd = dreamType ? dreamType.promptAdd : '';

  // Assemble prompt parts
  const parts = [
    stylePrefix,
    `depicting a ${lucidityDesc}`,
    `titled "${title}".`,
    `Scene: ${scene}.`,
    keywords.length ? `Visual elements: ${keywords.join(', ')}.` : '',
    typeAdd ? `Dream type: ${dreamType.label}. ${typeAdd}.` : '',
    `Mood: ${mood}.`,
    `Atmospheric elements: ${visualElements}.`,
    `${composition}.`,
    `Lighting: ${emotionLighting}.`,
    `Colour palette: ${emotionPalette}.`,
    styleSuffix + '.',
    negative + '.',
  ].filter(Boolean);

  if (customSuffix) parts.push(customSuffix + '.');
  return parts.join(' ');
}

// Update image in DOM after generation or IDB lookup (v5)
function updateImageInDOM(dreamId, url, meta = null) {
  window.__dreamImageCache = window.__dreamImageCache || {};
  window.__dreamImageCache[dreamId] = url;
  window.__dreamImageMeta = window.__dreamImageMeta || {};
  if (meta) window.__dreamImageMeta[dreamId] = meta;

  const thumb = document.querySelector(`[data-thumb="${dreamId}"]`);
  if (thumb) {
    const proceduralClass = meta && meta.procedural ? ' procedural' : '';
    thumb.innerHTML = `<img src="${url}" alt="Dream illustration" loading="lazy" class="dream-thumb-img${proceduralClass}">`;
  }
  const banner = document.querySelector(`[data-banner="${dreamId}"]`);
  if (banner) {
    const proceduralClass = meta && meta.procedural ? ' procedural' : '';
    const styleLabel = meta && meta.style ? `<div class="banner-style-label">${escapeHtml(meta.style)}</div>` : '';
    banner.innerHTML = `<img class="dream-banner${proceduralClass}" src="${url}" alt="Dream illustration" loading="lazy">${styleLabel}`;
