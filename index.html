      banner.innerHTML = `<img class="dream-banner${proceduralClass}" src="${img.url}" alt="Dream illustration" loading="lazy" style="cursor:pointer;" onclick="openLightbox('${img.url}', ${JSON.stringify(img).replace(/"/g, '&quot;')})">`;
    }
  });
}
// ==================== MILD RITUAL ENGINE (v5) ====================
// A game-like hold-to-charge affirmation system with haptic + visual + audio crescendo.

const RITUAL_PHASES = [
  { id: 'awakening',  name: 'Awakening',  threshold: 0.00, breathDur: 4, color: 'var(--muted)' },
  { id: 'gathering',  name: 'Gathering',  threshold: 0.25, breathDur: 5, color: 'var(--accent)' },
  { id: 'imbuing',    name: 'Imbuing',    threshold: 0.50, breathDur: 6, color: 'var(--accent-bright)' },
  { id: 'saturating', name: 'Saturating', threshold: 0.75, breathDur: 8, color: 'var(--gold-bright)' },
  { id: 'complete',   name: 'Complete',   threshold: 1.00, breathDur: 8, color: 'var(--gold-bright)' },
];

const RITUAL_TOTAL_DURATION_MS = 30000; // 30 seconds of holding = full charge
const RITUAL_MIN_HOLD_FOR_LOG = 5000;   // 5s minimum to count as a ritual

let __ritualState = null;

function getRitualPhase(progress) {
  for (let i = RITUAL_PHASES.length - 1; i >= 0; i--) {
    if (progress >= RITUAL_PHASES[i].threshold) return RITUAL_PHASES[i];
  }
  return RITUAL_PHASES[0];
}

// Haptic patterns — escalate with phase. Each pulse <= 200ms for Android safety.
const RITUAL_HAPTICS = {
  awakening:  [40],                                    // single soft tap every 2s
  gathering:  [60, 40, 60],                            // heartbeat-ish
  imbuing:    [80, 40, 80, 40, 100],                   // stronger heartbeat
  saturating: [100, 30, 100, 30, 100, 30, 120],        // rolling sustained
  release:    [120, 60, 180, 80, 240, 100, 300],       // crescendo burst
  complete:   [200, 100, 200, 100, 200],               // triple boom
};

function vibrateSafe(pattern) {
  if (!navigator.vibrate) return;
  try { navigator.vibrate(pattern); } catch(e) { /* ignore */ }
}

// Audio: low drone using Web Audio API. Started on user interaction.
let __ritualAudioCtx = null;
let __ritualDroneOsc = null;
let __ritualDroneGain = null;
let __ritualDroneOsc2 = null; // second osc for richer timbre

function startRitualAudio() {
  try {
    if (!__ritualAudioCtx) {
      __ritualAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (__ritualAudioCtx.state === 'suspended') __ritualAudioCtx.resume();
    if (__ritualDroneOsc) return; // already playing

    // Two oscillators slightly detuned for richness
    __ritualDroneOsc = __ritualAudioCtx.createOscillator();
    __ritualDroneOsc.type = 'sine';
    __ritualDroneOsc.frequency.value = 110; // A2

    __ritualDroneOsc2 = __ritualAudioCtx.createOscillator();
    __ritualDroneOsc2.type = 'sine';
    __ritualDroneOsc2.frequency.value = 110.5; // slight detune for beating

    __ritualDroneGain = __ritualAudioCtx.createGain();
    __ritualDroneGain.gain.value = 0;
    // Lowpass to soften
    const filter = __ritualAudioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;

    __ritualDroneOsc.connect(filter);
    __ritualDroneOsc2.connect(filter);
    filter.connect(__ritualDroneGain);

    // === Tone.js analyser for audio-reactive orb (v5) ===
    // Create an AnalyserNode on the same ctx so the orb shader can read levels.
    // We use a raw Web Audio analyser (Tone.js wraps this, but raw is sufficient
    // and avoids needing Tone.start() which requires explicit user gesture).
    try {
      const analyser = __ritualAudioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.8;
      __ritualDroneGain.connect(analyser);
      // Wrap into a Tone-like interface for the orb shader's expected API
      const analyserWrapper = {
        _analyser: analyser,
        _data: new Uint8Array(analyser.frequencyBinCount),
        getValue: function() {
          this._analyser.getByteTimeDomainData(this._data);
          // Convert 0-255 to -1..1 range
          return Array.from(this._data).map(v => (v - 128) / 128);
        }
      };
      setRitualOrbAudioAnalyser(analyserWrapper);
    } catch(e) { /* analyser optional */ }

    __ritualDroneGain.connect(__ritualAudioCtx.destination);
    __ritualDroneOsc.start();
    __ritualDroneOsc2.start();
  } catch(e) { console.warn('Ritual audio failed', e); }
}

function setRitualAudioIntensity(progress) {
  if (!__ritualDroneGain || !__ritualAudioCtx) return;
  // Volume rises 0 -> 0.15 (gentle)
  const targetVol = 0.02 + progress * 0.13;
  __ritualDroneGain.gain.linearRampToValueAtTime(targetVol, __ritualAudioCtx.currentTime + 0.3);
  // Pitch rises slightly (110 -> 165 Hz, a perfect fifth)
  const targetFreq = 110 + progress * 55;
  __ritualDroneOsc.frequency.linearRampToValueAtTime(targetFreq, __ritualAudioCtx.currentTime + 0.3);
  __ritualDroneOsc2.frequency.linearRampToValueAtTime(targetFreq + 0.5, __ritualAudioCtx.currentTime + 0.3);
}

function stopRitualAudio() {
  if (!__ritualDroneGain || !__ritualAudioCtx) return;
  __ritualDroneGain.gain.linearRampToValueAtTime(0, __ritualAudioCtx.currentTime + 0.5);
  setTimeout(() => {
    try {
      if (__ritualDroneOsc) __ritualDroneOsc.stop();
      if (__ritualDroneOsc2) __ritualDroneOsc2.stop();
      __ritualDroneOsc = null;
      __ritualDroneOsc2 = null;
    } catch(e) {}
  }, 600);
}

// ==================== RITUAL ORB SHADER (Three.js GLSL) ====================
// Raymarched SDF sphere with noise displacement, glow, and charge-driven deformation.
// Falls back gracefully if Three.js unavailable (CSS orb pseudo-elements remain visible).
let __orbRenderer = null, __orbScene = null, __orbCamera = null, __orbMaterial = null, __orbRAF = null;
let __orbAudioAnalyser = null, __orbAudioData = null;

async function initRitualOrbShader() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if (window.__lucidLowPower) return;
  // Ensure THREE is available (shared with nebula)
  if (typeof THREE === 'undefined') {
    try { window.THREE = await import('three'); } catch (e) { return; }
  }
  const THREE = window.THREE;
  if (!THREE || !THREE.WebGLRenderer) return;

  const canvas = document.getElementById('ritualOrbCanvas');
  if (!canvas) return;

  try {
    __orbRenderer = new THREE.WebGLRenderer({
      canvas, antialias: true, alpha: true, premultipliedAlpha: false,
      powerPreference: 'high-performance',
    });
    __orbRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    __orbRenderer.setSize(280, 280, false);
    __orbRenderer.setClearColor(0x000000, 0);

    __orbScene = new THREE.Scene();
    __orbCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `;

    // Raymarched SDF sphere with FBM noise displacement.
    // The sphere morphs based on charge (0..1) and audio level (0..1).
    const fragmentShader = `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uCharge;     // 0..1 ritual charge
      uniform float uAudio;      // 0..1 audio level from Tone.js analyser
      uniform float uHolding;    // 0..1 whether user is currently holding

      // 3D Simplex noise (Ashima Arts)
      vec3 mod289(vec3 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 mod289(vec4 x){ return x - floor(x * (1.0/289.0)) * 289.0; }
      vec4 permute(vec4 x){ return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
      float snoise(vec3 v){
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
                   i.z + vec4(0.0, i1.z, i2.z, 1.0))
                 + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                 + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      float fbm(vec3 p) {
        float v = 0.0, a = 0.5;
        for (int i = 0; i < 4; i++) { v += a * snoise(p); p *= 2.0; a *= 0.5; }
        return v;
      }

      // SDF of a sphere with noise displacement
      float sdSphere(vec3 p, float r) {
        // Displacement scales with charge + audio
        float disp = fbm(p * 2.0 + uTime * 0.1) * (0.08 + uCharge * 0.25 + uAudio * 0.15);
        return length(p) - r + disp;
      }

      vec3 calcNormal(vec3 p, float r) {
        float eps = 0.01;
        vec2 h = vec2(eps, 0.0);
        return normalize(vec3(
          sdSphere(p + h.xyy, r) - sdSphere(p - h.xyy, r),
          sdSphere(p + h.yxy, r) - sdSphere(p - h.yxy, r),
          sdSphere(p + h.yyx, r) - sdSphere(p - h.yyx, r)
        ));
      }

      void main() {
        vec2 uv = vUv * 2.0 - 1.0;
        vec3 ro = vec3(0.0, 0.0, 2.5);
        vec3 rd = normalize(vec3(uv, -1.5));

        // Raymarch
        float t = 0.0;
        float r = 0.7;
        bool hit = false;
        vec3 hitPos = vec3(0.0);
        for (int i = 0; i < 48; i++) {
          vec3 p = ro + rd * t;
          float d = sdSphere(p, r);
          if (d < 0.001) { hit = true; hitPos = p; break; }
          if (t > 4.0) break;
          t += d * 0.9;
        }

        // Background fade (transparent so CSS shows through)
        if (!hit) {
          // Soft glow around the orb
          float glow = exp(-length(uv) * 1.5) * (0.15 + uCharge * 0.4);
          vec3 glowCol = mix(vec3(0.62, 0.92, 0.91), vec3(0.96, 0.85, 0.48), uCharge);
          gl_FragColor = vec4(glowCol * glow, glow * 0.6);
          return;
        }

        vec3 n = calcNormal(hitPos, r);

        // Lighting
        vec3 lightDir = normalize(vec3(0.5, 0.7, 1.0));
        float diff = max(0.0, dot(n, lightDir));
        float fresnel = pow(1.0 - max(0.0, dot(n, -rd)), 2.5);

        // Color: teal at low charge, shifting to gold at high charge
        vec3 teal = vec3(0.62, 0.92, 0.91);
        vec3 deepTeal = vec3(0.37, 0.74, 0.73);
        vec3 gold = vec3(0.96, 0.85, 0.48);
        vec3 navy = vec3(0.05, 0.10, 0.16);

        vec3 baseCol = mix(deepTeal, teal, diff);
        baseCol = mix(baseCol, gold, uCharge * 0.7);
        // Fresnel rim
        baseCol += mix(teal, gold, uCharge) * fresnel * (0.6 + uCharge * 0.4);
        // Inner glow when holding
        baseCol += teal * uHolding * 0.15 * (1.0 - fresnel);
        // Audio reactivity — pulses brightness
        baseCol *= 1.0 + uAudio * 0.3;

        // Subsurface scatter tint
        baseCol += navy * 0.1 * (1.0 - diff);

        // Alpha — fully opaque where hit, soft edge
        float alpha = 1.0;

        gl_FragColor = vec4(clamp(baseCol, 0.0, 1.0), alpha);
      }
    `;

    __orbMaterial = new THREE.ShaderMaterial({
      vertexShader, fragmentShader,
      uniforms: {
        uTime: { value: 0 },
        uCharge: { value: 0 },
        uAudio: { value: 0 },
        uHolding: { value: 0 },
      },
      transparent: true,
      depthTest: false,
      depthWrite: false,
    });

    const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), __orbMaterial);
    __orbScene.add(quad);

    const clock = new THREE.Clock();
    const animate = () => {
      if (!__orbRenderer) return;
      __orbRAF = requestAnimationFrame(animate);
      __orbMaterial.uniforms.uTime.value = clock.getElapsedTime();
      // Read audio level if analyser available
      if (__orbAudioAnalyser) {
        try {
          const vals = __orbAudioAnalyser.getValue();
          let sum = 0;
          for (let i = 0; i < vals.length; i++) sum += Math.abs(vals[i]);
          const avg = sum / vals.length;
          __orbMaterial.uniforms.uAudio.value = Math.min(1, avg * 3);
        } catch(e) {}
      }
      try { __orbRenderer.render(__orbScene, __orbCamera); } catch(e) { stopRitualOrbShader(); }
    };
    animate();
  } catch (e) {
    console.warn('Ritual orb shader init failed', e);
    stopRitualOrbShader();
  }
}

function stopRitualOrbShader() {
  if (__orbRAF) cancelAnimationFrame(__orbRAF);
  __orbRAF = null;
  if (__orbRenderer) {
    try { __orbRenderer.dispose(); } catch(e) {}
    __orbRenderer = null;
  }
  __orbScene = null; __orbCamera = null; __orbMaterial = null;
  __orbAudioAnalyser = null;
}

function setRitualOrbCharge(charge, holding) {
  if (__orbMaterial) {
    __orbMaterial.uniforms.uCharge.value = Math.max(0, Math.min(1, charge));
    __orbMaterial.uniforms.uHolding.value = holding ? 1 : 0;
  }
}

function setRitualOrbAudioAnalyser(analyser) {
  __orbAudioAnalyser = analyser;
}

// Main animation tick
function ritualTick(now) {
  if (!__ritualState) return;
  const s = __ritualState;

  // Update accumulated time if holding
  if (s.holding && !s.completed) {
    const currentHoldMs = Date.now() - s.holdStartTime;
    const totalMs = s.accumulatedMs + currentHoldMs;
    s.progress = Math.min(1, totalMs / RITUAL_TOTAL_DURATION_MS);
  }

  // Update phase based on progress
  const newPhase = getRitualPhase(s.progress);
  if (newPhase.id !== s.phase.id) {
    s.phase = newPhase;
    onRitualPhaseChange(s);
  }

  // Update DOM
  const orb = document.getElementById('ritualOrb');
  if (orb) orb.style.setProperty('--charge', s.progress.toFixed(3));

  // Push charge to shader orb + nebula background for synchronized visual feedback
  setRitualOrbCharge(s.progress, s.holding);
  if (window.__nebulaSetCharge) window.__nebulaSetCharge(s.progress);

  const arcFill = document.getElementById('ritualArcFill');
  if (arcFill) {
    const circumference = 2 * Math.PI * 150;
    const offset = circumference * (1 - s.progress);
    arcFill.style.strokeDashoffset = offset;
  }

  const phaseEl = document.getElementById('ritualPhase');
  if (phaseEl) {
    phaseEl.textContent = s.phase.name;
    phaseEl.className = 'ritual-phase ' + s.phase.id;
  }

  // Update stats
  const totalHeld = s.holding ? s.accumulatedMs + (Date.now() - s.holdStartTime) : s.accumulatedMs;
  document.getElementById('ritualStatTime').textContent = (totalHeld / 1000).toFixed(1) + 's';
  document.getElementById('ritualStatCharge').textContent = Math.round(s.progress * 100) + '%';

  // Update breath cue
  updateBreathCue(s);

  // Update audio intensity
  if (s.holding) setRitualAudioIntensity(s.progress);

  // Update particles
  updateRitualParticles(s);

  // Continue loop
  s.rafId = requestAnimationFrame(ritualTick);
}

function onRitualPhaseChange(s) {
  // Update breath ring duration
  document.querySelectorAll('.ritual-breath-ring').forEach(r => {
    r.style.setProperty('--breath-duration', s.phase.breathDur + 's');
  });
  // Haptic pulse on phase change (except first)
  if (s.progress > 0) {
    vibrateSafe(RITUAL_HAPTICS[s.phase.id] || [60]);
  }
  // Update instruction text
  const instructions = {
    awakening: 'Press and hold the orb. Release only when you feel the intention has settled.',
    gathering: 'Breathe with the rings. Let each inhale draw the intention deeper.',
    imbuing: 'Feel the affirmation saturating your mind. You are entering the dream state.',
    saturating: 'Almost there. Hold steady. The intention is becoming part of you.',
    complete: 'Release now. The ritual is complete.',
  };
  const el = document.getElementById('ritualInstruction');
  if (el) el.textContent = instructions[s.phase.id] || '';
  // Show "release" cue when complete
  if (s.phase.id === 'complete') {
    const orb = document.getElementById('ritualOrb');
    if (orb) orb.classList.add('charged');
  }
}

function updateBreathCue(s) {
  const cue = document.getElementById('ritualBreathCue');
  if (!cue) return;
  const breathDur = s.phase.breathDur * 1000;
  const elapsed = (Date.now() - s.breathStartTime) % breathDur;
  const isInhale = elapsed < breathDur / 2;
  cue.textContent = isInhale ? 'Breathe in&hellip;' : 'Breathe out&hellip;';
}

// Particle system: drift particles toward orb while holding; burst on completion
function updateRitualParticles(s) {
  const ctx = s.particleCtx;
  if (!ctx) return;
  const w = s.particleCanvas.width, h = s.particleCanvas.height;
  ctx.clearRect(0, 0, w, h);

  // Spawn particles while holding
  if (s.holding && s.particles.length < 80) {
    for (let i = 0; i < 2; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.max(w, h) * 0.6;
      s.particles.push({
        x: w/2 + Math.cos(angle) * dist,
        y: h/2 + Math.sin(angle) * dist,
        tx: w/2, ty: h/2,
        vx: 0, vy: 0,
        life: 1,
        size: 1 + Math.random() * 2,
        hue: s.progress > 0.75 ? 'gold' : 'teal',
      });
    }
  }

  // Update + draw
  const orb = document.getElementById('ritualOrb');
  const orbRect = orb ? orb.getBoundingClientRect() : { left: w/2, top: h/2, width: 200, height: 200 };
  const cx = orbRect.left + orbRect.width / 2;
  const cy = orbRect.top + orbRect.height / 2;

  for (let i = s.particles.length - 1; i >= 0; i--) {
    const p = s.particles[i];
    if (s.completed) {
      // Explosion: push outward
      const dx = p.x - cx, dy = p.y - cy;
      const d = Math.hypot(dx, dy) || 1;
      p.vx += (dx / d) * 0.8;
      p.vy += (dy / d) * 0.8;
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.015;
    } else {
      // Drift toward orb
      const dx = cx - p.x, dy = cy - p.y;
      const d = Math.hypot(dx, dy) || 1;
      const speed = 1 + s.progress * 3;
      p.vx += (dx / d) * 0.1 * speed;
      p.vy += (dy / d) * 0.1 * speed;
      p.vx *= 0.95; p.vy *= 0.95;
      p.x += p.vx; p.y += p.vy;
      // Absorb when close
      if (d < 60) p.life -= 0.05;
    }
    if (p.life <= 0) { s.particles.splice(i, 1); continue; }

    const color = p.hue === 'gold' ? '245,217,122' : '159,234,232';
    ctx.fillStyle = `rgba(${color},${p.life * 0.7})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.fillStyle = `rgba(${color},${p.life * 0.2})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.size * p.life * 3), 0, Math.PI * 2);
    ctx.fill();
  }
}

async function completeRitual() {
  const s = __ritualState;
  if (!s || s.completed) return;
  s.completed = true;

  // Massive haptic burst
  vibrateSafe(RITUAL_HAPTICS.release);
  setTimeout(() => vibrateSafe(RITUAL_HAPTICS.complete), 800);

  // Peak audio
  setRitualAudioIntensity(1);
  setTimeout(() => stopRitualAudio(), 1500);

  // Spawn explosion particles
  for (let i = 0; i < 100; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    s.particles.push({
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      size: 1.5 + Math.random() * 2.5,
      hue: 'gold',
    });
  }

  // Show completion overlay
  const overlay = document.getElementById('ritualOverlay');
  if (overlay) {
    const completeDiv = document.createElement('div');
    completeDiv.className = 'ritual-complete-overlay';
    completeDiv.innerHTML = `<div class="ritual-complete-text">${escapeHtml(s.intention)}</div>`;
    overlay.appendChild(completeDiv);
  }

  // Persist ritual log
  const today = new Date().toISOString().split('T')[0];
  const durationSec = Math.round((s.accumulatedMs + (Date.now() - s.holdStartTime)) / 1000);
  await putRitualLog({
    id: 'ritual_' + today + '_' + Date.now().toString(36),
    date: today,
    intention: s.intention,
    durationSec,
    completedAt: Date.now(),
  });

  // Update intention record too (in case it was edited)
  await putIntention({ date: today, text: s.intention, createdAt: Date.now() });

  // Check achievements
  checkAchievements();

  // Auto-close after 4 seconds
  setTimeout(() => {
    closeMildRitual();
    showToast('Intention charged. Sweet dreams.', 'moon', 'success');
    // Refresh ritual page if open
    if (currentPage === 'ritual') renderPage('ritual');
  }, 4000);
}

async function getRitualStreak() {
  const logs = await getAllRitualLogs();
  if (!logs.length) return 0;
  // Sort by date desc
  const dates = [...new Set(logs.map(l => l.date))].sort().reverse();
  const today = new Date().toISOString().split('T')[0];
  const yest = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (dates[0] !== today && dates[0] !== yest) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    if ((new Date(dates[i-1]) - new Date(dates[i])) / 86400000 === 1) streak++;
    else break;
  }
  return streak;
}

// ==================== MICRO-INTERACTIONS (v5) ====================
function setupMagneticButtons() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  if (window.matchMedia('(hover: none)').matches) return; // skip on touch
  const buttons = document.querySelectorAll('.btn-primary, .btn-gold, .quick-log-fab');
  buttons.forEach(btn => {
    btn.setAttribute('data-magnetic', '');
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      const strength = 0.25;
      btn.style.transform = `translate(${x * strength}px, ${y * strength}px)`;
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transform = '';
    });
  });
}

function setupRippleEffect() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('.sidebar-nav a').forEach(link => {
    link.addEventListener('click', e => {
      const rect = link.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (x - size / 2) + 'px';
      ripple.style.top = (y - size / 2) + 'px';
      link.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
}

// ==================== PERFORMANCE TUNING (v5) ====================
function detectLowPower() {
  // Heuristic: touch device + small screen + slow CPU indication
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const isTouch = window.matchMedia('(hover: none)').matches;
  // navigator.hardwareConcurrency indicates CPU cores (low = slower device)
  const cores = navigator.hardwareConcurrency || 4;
  return isMobile && isTouch && cores <= 4;
}

// If low-power, reduce canvas intensity (already done via isMobile in init, but double-check)
window.__lucidLowPower = detectLowPower();
if (window.__lucidLowPower) {
  document.documentElement.classList.add('low-power');
}
// Load user image-gen customizations into window globals (sync access from buildImagePrompt)
async function loadImageGenCustomizations() {
  window.__customPromptSuffix = await getSetting('customPromptSuffix', '');
  window.__customNegativePrompt = await getSetting('customNegativePrompt', '');
}
// ==================== INIT ====================
async function init() {
  createStarField();
  await openDB();
  await migrateFromLocalStorage();
  await refreshCache();
  // Load image gen customizations
  await loadImageGenCustomizations();
  // Apply theme
  const theme = await getSetting('theme', 'dark');
  applyTheme(theme);
  setupKeyboardShortcuts();
  setupRippleEffect();
  const onboardingDone = await getSetting('onboardingComplete', false);
  if (!onboardingDone) showOnboarding();
  navigate('dashboard');
  retryPendingImages();
  scheduleRitualNotification();
  // Auto-start RC notifications if previously enabled
  const rcSetup = await getSetting('rcNotifSetup', { technique:'fingers', frequency:5, enabled:false });
  if(rcSetup.enabled) {
    const opt = RC_NOTIF_OPTIONS.find(o=>o.id===rcSetup.technique) || RC_NOTIF_OPTIONS[0];
    if('Notification' in window && Notification.permission === 'granted') {
      schedulePushRCReminders(opt, rcSetup.frequency);
    } else {
      scheduleInAppRCReminders(opt, rcSetup.frequency);
    }
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

<!-- Inline Service Worker for PWA (must be at end of body) -->
<script>
(function(){
  if (!('serviceWorker' in navigator)) return;
  const SW_CODE = `
    const CACHE = 'lucidlog-v4';
    const IMAGE_CACHE = 'lucidlog-images-v1';
    const FONT_CACHE = 'lucidlog-fonts-v1';

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(['/'])).then(() => self.skipWaiting())
      );
    });

    self.addEventListener('activate', e => {
      e.waitUntil((async () => {
        const keys = await caches.keys();
        await Promise.all(
          keys.filter(k => ![CACHE, IMAGE_CACHE, FONT_CACHE].includes(k)).map(k => caches.delete(k))
        );
        await self.clients.claim();
      })());
    });

    self.addEventListener('fetch', e => {
      const req = e.request;
      const url = new URL(req.url);

      // Skip non-GET (e.g., POST, PUT)
      if (req.method !== 'GET') return;

      // Skip cross-origin requests except fonts and images we explicitly cache
      const sameOrigin = url.origin === self.location.origin;
      const isPollinations = url.hostname === 'image.pollinations.ai';
      const isFont = url.hostname === 'fonts.googleapis.com' || url.hostname === 'fonts.gstatic.com';
      const isLucide = url.hostname === 'unpkg.com' && url.pathname.includes('lucide');
      const isIDB = url.hostname === 'cdn.jsdelivr.net';

      if (!sameOrigin && !isPollinations && !isFont && !isLucide && !isIDB) return;

      // App shell (same-origin): cache-first
      if (sameOrigin) {
        e.respondWith(
          caches.match(req).then(cached => cached || fetch(req).then(resp => {
            // Cache successful responses for next time
            if (resp && resp.status === 200) {
              const clone = resp.clone();
              caches.open(CACHE).then(c => c.put(req, clone));
            }
            return resp;
          }).catch(() => caches.match('/')))
        );
        return;
      }

      // Fonts: stale-while-revalidate (cache first, update in background)
      if (isFont) {
        e.respondWith(
          caches.open(FONT_CACHE).then(async cache => {
            const cached = await cache.match(req);
            const fetchPromise = fetch(req).then(resp => {
              if (resp && resp.status === 200) cache.put(req, resp.clone());
              return resp;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        );
        return;
      }

      // Lucide/idb: cache-first with revalidation
      if (isLucide || isIDB) {
        e.respondWith(
          caches.open(CACHE).then(async cache => {
            const cached = await cache.match(req);
            if (cached) {
              // Revalidate in background
              fetch(req).then(resp => { if (resp && resp.status === 200) cache.put(req, resp.clone()); }).catch(() => {});
              return cached;
            }
            const resp = await fetch(req);
            if (resp && resp.status === 200) cache.put(req, resp.clone());
            return resp;
          })
        );
        return;
      }

      // Pollinations images: cache-first with long TTL
      if (isPollinations) {
        e.respondWith(
          caches.open(IMAGE_CACHE).then(async cache => {
            const cached = await cache.match(req);
            if (cached) return cached;
            try {
              const resp = await fetch(req);
              if (resp && resp.status === 200) cache.put(req, resp.clone());
              return resp;
            } catch (e) {
              return new Response('', { status: 503, statusText: 'Offline' });
            }
          })
        );
        return;
      }
    });

    // Listen for messages from the page
    self.addEventListener('message', e => {
      if (e.data && e.data.type === 'SKIP_WAITING') self.skipWaiting();
    });
  `;
  try {
    const blob = new Blob([SW_CODE], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).then(reg => {
      // Check for updates
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // New version available — notify user
            window.dispatchEvent(new CustomEvent('sw-update-available'));
          }
        });
      });
    });
    // Listen for controller change (new SW took over)
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  } catch(e) { console.warn('SW registration failed', e); }

  // Listen for update-available event and show toast
  window.addEventListener('sw-update-available', () => {
    showToast('New version available — reload to update.', 'refresh-cw', 'info');
    // Add a small reload button to the toast
    setTimeout(() => {
      const toasts = document.querySelectorAll('.toast');
      const last = toasts[toasts.length - 1];
      if (last) {
        const reloadBtn = document.createElement('button');
        reloadBtn.className = 'btn btn-secondary btn-sm';
        reloadBtn.style.marginLeft = '8px';
        reloadBtn.textContent = 'Reload';
        reloadBtn.onclick = () => window.location.reload();
        last.appendChild(reloadBtn);
      }
    }, 100);
  });
})();
</script>
