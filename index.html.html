<style>
/* ========== DESIGN SYSTEM ========== */
:root {
  --accent: #9FEAE8;
  --accent-dim: rgba(159,234,232,0.12);
  --accent-glow: rgba(159,234,232,0.06);
  --bg: #0D1B2A;
  --surface: #152238;
  --text: #F0F4F8;
  --muted: #A8B4BC;
  --card-bg: rgba(21,34,56,0.85);
  --input-bg: rgba(21,34,56,0.6);
  --overlay: rgba(13,27,42,0.88);
  --card-border: rgba(159,234,232,0.25);
  --card-shadow: 0 4px 32px rgba(159,234,232,0.08);
  --danger: #F87171;
  --warning: #FBBF24;
  --success: #34D399;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --transition: 0.25s ease;
  --nav-height: 68px;
  --sidebar-width: 240px;
  --gold: #F5D97A;
  --mist: rgba(159,234,232,0.07);
}

/* ========== RESET ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  min-height: 100dvh; overflow-x: hidden;
}
h1,h2,h3,h4 { font-family: 'Lora', Georgia, serif; font-weight: 600; line-height: 1.25; }
h1 { font-size: 2rem; } h2 { font-size: 1.5rem; } h3 { font-size: 1.2rem; }
code, .mono { font-family: 'JetBrains Mono', monospace; }
button { font-family: 'Inter', sans-serif; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
input, textarea, select {
  font-family: 'Inter', sans-serif; color: var(--text); background: var(--input-bg);
  border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  padding: 10px 14px; font-size: 0.95rem; transition: border var(--transition); outline: none; width: 100%;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 120px; }
a { color: var(--accent); text-decoration: none; }
ul, ol { list-style: none; }

.atmos-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, var(--accent-glow), transparent),
    radial-gradient(ellipse 50% 40% at 80% 70%, var(--accent-glow), transparent);
}
.star-field { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.star-field .star {
  position: absolute; width: 2px; height: 2px; background: var(--accent);
  border-radius: 50%; opacity: 0.3; animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle { 0% { opacity: 0.15; } 100% { opacity: 0.6; } }

/* ========== LAYOUT ========== */
.app-shell { position: relative; z-index: 1; display: flex; min-height: 100dvh; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width);
  background: var(--surface); border-right: 1px solid var(--card-border);
  display: flex; flex-direction: column; padding: 24px 0; z-index: 50;
}
.sidebar-logo { padding: 0 24px 28px; display: flex; align-items: center; gap: 12px; }
.sidebar-logo .logo-moon { width: 36px; height: 36px; flex-shrink: 0; }
.sidebar-logo span { font-family: 'Lora', serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); }
.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 12px; padding: 11px 16px;
  border-radius: var(--radius-sm); color: var(--muted); font-weight: 500;
  transition: all var(--transition); font-size: 0.93rem;
}
.sidebar-nav a:hover { color: var(--text); background: var(--accent-dim); }
.sidebar-nav a.active { color: var(--accent); background: var(--accent-dim); }
.sidebar-nav a i { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-footer { padding: 16px 24px; border-top: 1px solid var(--card-border); margin-top: auto; }
.main-content { flex: 1; margin-left: var(--sidebar-width); padding: 36px 40px; max-width: 1080px; width: 100%; }
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-height); background: var(--surface);
  border-top: 1px solid var(--card-border); z-index: 50;
  padding: 0 4px; align-items: center; justify-content: space-around;
}
.bottom-nav a {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 0; color: var(--muted); font-size: 0.62rem; font-weight: 600;
  transition: color var(--transition); flex: 1; text-align: center; letter-spacing: 0.02em;
}
.bottom-nav a.active { color: var(--accent); }
.bottom-nav a i { width: 22px; height: 22px; }

/* ========== CARDS ========== */
.card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 24px; box-shadow: var(--card-shadow);
}

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600;
  font-size: 0.9rem; transition: all var(--transition);
}
.btn-primary { background: var(--accent); color: #0D1B2A; }
.btn-primary:hover { background: #b5f0ee; transform: translateY(-1px); }
.btn-secondary { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--card-border); }
.btn-secondary:hover { background: rgba(159,234,232,0.2); border-color: var(--accent); }
.btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); }
.btn-danger:hover { background: rgba(248,113,113,0.25); }
.btn-sm { padding: 7px 14px; font-size: 0.82rem; }
.btn-icon { width: 40px; height: 40px; padding: 0; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
.btn-gold { background: rgba(245,217,122,0.15); color: var(--gold); border: 1px solid rgba(245,217,122,0.3); }
.btn-gold:hover { background: rgba(245,217,122,0.25); border-color: var(--gold); }

/* ========== BADGES & CHIPS ========== */
.badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.badge-accent { background: var(--accent-dim); color: var(--accent); }
.badge-warning { background: rgba(251,191,36,0.15); color: var(--warning); }
.badge-gold { background: rgba(245,217,122,0.15); color: var(--gold); }
.badge-lucid { background: rgba(159,234,232,0.2); color: var(--accent); border: 1px solid rgba(159,234,232,0.4); }
.chip {
  display: inline-flex; align-items: center; padding: 6px 14px;
  border-radius: 20px; font-size: 0.82rem; font-weight: 500;
  border: 1px solid var(--card-border); cursor: pointer;
  transition: all var(--transition); user-select: none;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* ========== ACCORDION ========== */
.accordion-item { border: 1px solid var(--card-border); border-radius: var(--radius-xs); overflow: hidden; margin-bottom: 6px; }
.accordion-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
  background: rgba(159,234,232,0.04); transition: background var(--transition);
}
.accordion-header:hover { background: var(--accent-dim); }
.accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.accordion-body.open { max-height: 600px; }
.accordion-body-inner { padding: 12px 16px 16px; color: var(--muted); line-height: 1.7; font-size: 0.9rem; }
.chevron { transition: transform var(--transition); }
.accordion-header.open .chevron { transform: rotate(180deg); }

/* ========== STAR SLIDER ========== */
.star-slider { display: flex; gap: 4px; }
.star-slider .star-btn {
  width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all var(--transition); font-size: 1.15rem;
  color: var(--muted); background: transparent; border: 1px solid transparent;
}
.star-slider .star-btn.filled { color: var(--accent); background: var(--accent-dim); border-color: rgba(159,234,232,0.3); }
.star-slider .star-btn:hover { transform: scale(1.15); border-color: var(--card-border); }

/* ========== PAGE TRANSITIONS ========== */
.page { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 150; background: var(--overlay);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); animation: fadeIn 0.25s ease; padding: 20px;
}
.modal {
  background: var(--surface); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 28px; max-width: 540px;
  width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--card-shadow);
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h2 { margin: 0; }

/* ========== EMPTY STATES ========== */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 24px; text-align: center; }
.empty-state svg { margin-bottom: 20px; opacity: 0.5; }
.empty-state h3 { margin-bottom: 8px; }
.empty-state p { color: var(--muted); max-width: 340px; margin-bottom: 24px; }

/* ========== TOAST ========== */
.toast-container { position: fixed; top: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 12px 18px; font-size: 0.88rem;
  box-shadow: var(--card-shadow); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

/* ========== ONBOARDING ========== */
.onboarding-overlay {
  position: fixed; inset: 0; z-index: 200; background: var(--overlay);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); animation: fadeIn 0.4s ease;
}
.onboarding-card {
  background: var(--surface); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 44px 36px; max-width: 460px;
  width: 90%; text-align: center; box-shadow: var(--card-shadow);
}
.onboarding-card h2 { margin-bottom: 12px; }
.onboarding-card p { color: var(--muted); margin-bottom: 24px; line-height: 1.7; }
.onboarding-steps { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
.onboarding-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all var(--transition); }
.onboarding-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

/* ========== TOGGLE SWITCH ========== */
.toggle-switch { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider {
  position: absolute; inset: 0; background: var(--muted); border-radius: 14px;
  cursor: pointer; transition: background var(--transition);
}
.toggle-slider::before {
  content: ''; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px;
  background: white; border-radius: 50%; transition: transform var(--transition);
}
.toggle-switch input:checked + .toggle-slider { background: var(--accent); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

/* ========== FORM GROUPS ========== */
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-weight: 600; font-size: 0.85rem; color: var(--muted); letter-spacing: 0.01em; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.emotion-chips { display: flex; flex-wrap: wrap; gap: 8px; }

/* ========== SHIMMER / LOADING ========== */
.shimmer {
  background: linear-gradient(90deg, rgba(159,234,232,0.06) 25%, rgba(159,234,232,0.14) 50%, rgba(159,234,232,0.06) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s ease infinite; border-radius: var(--radius-sm);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-line { height: 14px; margin-bottom: 8px; border-radius: 4px; }
.skeleton-line.w60 { width: 60%; } .skeleton-line.w80 { width: 80%; } .skeleton-line.w40 { width: 40%; }
.skeleton-card { padding: 20px; border-radius: var(--radius); margin-bottom: 10px; }

/* ========== LUCID DREAM GLOW ========== */
.dream-entry-card.is-lucid {
  border-color: rgba(159,234,232,0.5);
  box-shadow: 0 0 20px rgba(159,234,232,0.12), var(--card-shadow);
  position: relative;
  overflow: hidden;
}
.dream-entry-card.is-lucid::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(135deg, rgba(159,234,232,0.08) 0%, transparent 50%, rgba(159,234,232,0.04) 100%);
  animation: lucidShimmer 3s ease-in-out infinite;
}
@keyframes lucidShimmer {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.lucid-star-marker {
  color: var(--accent); font-size: 0.7rem; margin-left: 2px;
  animation: lucidPulse 2.5s ease-in-out infinite;
}
@keyframes lucidPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* ========== DASHBOARD ========== */
.dash-greeting { margin-bottom: 4px; font-size: 1.05rem; color: var(--muted); font-weight: 400; }
.dash-time { font-family: 'Lora', serif; font-size: 2.2rem; margin-bottom: 4px; letter-spacing: -0.01em; }
.dash-quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px; }
.dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
.stat-card { position: relative; overflow: hidden; padding: 20px; }
.stat-card .stat-value { font-family: 'Lora', serif; font-size: 1.9rem; color: var(--accent); line-height: 1.1; }
.stat-card .stat-label { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
.stat-card .stat-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); opacity: 0.12; }

/* Moon + Streak Banner */
.moon-streak-banner {
  display: flex; align-items: center; gap: 16px; padding: 20px 24px;
  background: var(--mist); border: 1px solid var(--card-border);
  border-radius: var(--radius); margin-bottom: 28px; position: relative; overflow: hidden;
}
.moon-streak-banner .moon-visual { flex-shrink: 0; }
.moon-streak-banner .banner-text { flex: 1; }
.moon-streak-banner .moon-name { font-family: 'Lora', serif; font-size: 1.1rem; color: var(--text); margin-bottom: 2px; }
.moon-streak-banner .streak-row { display: flex; align-items: center; gap: 8px; }
.moon-streak-banner .streak-count { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--gold); line-height: 1; }
.moon-streak-banner .streak-count.no-streak { color: var(--muted); }
.moon-streak-banner .streak-label { font-size: 0.82rem; color: var(--muted); }
.moon-streak-banner .streak-fire { color: var(--gold); font-size: 1.3rem; animation: fireGlow 2s ease-in-out infinite; }
@keyframes fireGlow { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
.moon-streak-banner .streak-broken { opacity: 0.5; }

/* Lucid Summary */
.lucid-summary {
  font-size: 0.88rem; color: var(--muted); margin-bottom: 24px;
  padding: 10px 16px; background: var(--mist); border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
}
.lucid-summary strong { color: var(--accent); }

/* Dream Sign Chips */
.dream-signs-section { margin-bottom: 28px; }
.dream-signs-section h3 { font-size: 1rem; margin-bottom: 10px; color: var(--text); }
.dream-sign-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.dream-sign-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 500;
  border: 1px solid var(--card-border); cursor: pointer;
  transition: all var(--transition); background: var(--card-bg);
}
.dream-sign-chip:hover { border-color: var(--accent); color: var(--accent); }
.dream-sign-chip .sign-star { color: var(--accent); font-size: 0.65rem; }

/* ========== DREAM JOURNAL ========== */
.journal-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.search-box { position: relative; flex: 1; max-width: 360px; min-width: 200px; }
.search-box input { padding-left: 40px; }
.search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 18px; height: 18px; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.dream-list { display: flex; flex-direction: column; gap: 10px; }
.dream-entry-card {
  display: flex; gap: 14px; padding: 14px 16px; cursor: pointer;
  border: 1px solid var(--card-border); border-radius: var(--radius);
  background: var(--card-bg); box-shadow: var(--card-shadow);
  transition: border-color var(--transition);
}
.dream-entry-card:hover { border-color: rgba(159,234,232,0.45); }
.dream-entry-card .dream-thumb {
  width: 80px; height: 48px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
  background: linear-gradient(135deg, var(--surface), rgba(159,234,232,0.1));
  position: relative;
}
.dream-entry-card .dream-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.dream-entry-card .dream-thumb .thumb-shimmer { width: 100%; height: 100%; }
.dream-entry-card .dream-body { flex: 1; min-width: 0; }
.dream-entry-card .dream-title { font-family: 'Lora', serif; font-weight: 600; margin-bottom: 3px; font-size: 1.02rem; display: flex; align-items: center; gap: 6px; }
.dream-entry-card .dream-preview { color: var(--muted); font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.dream-entry-card .dream-bottom { display: flex; align-items: center; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
.dream-lucidity { display: flex; gap: 1px; }
.dream-lucidity .l-star { color: var(--accent); font-size: 0.72rem; }
.dream-lucidity .l-star.dim { opacity: 0.2; }

/* Dream detail banner */
.dream-banner {
  width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-sm);
  margin-bottom: 16px; display: block;
}
.dream-banner-shimmer { width: 100%; height: 160px; border-radius: var(--radius-sm); margin-bottom: 16px; }
.dream-banner-fallback {
  width: 100%; height: 120px; border-radius: var(--radius-sm); margin-bottom: 16px;
  background: linear-gradient(135deg, var(--surface), rgba(159,234,232,0.12));
  display: flex; align-items: center; justify-content: center;
}

/* ========== REALITY CHECKS ========== */
.rc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.rc-card { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 28px 20px; }
.rc-card .rc-illustration { width: 100px; height: 100px; margin-bottom: 14px; color: var(--accent); }
.rc-card .rc-illustration svg { width: 100%; height: 100%; }
.rc-card h3 { margin-bottom: 8px; }
.rc-card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 18px; line-height: 1.6; }
.rc-reminder { margin-top: 32px; }
.rc-reminder .reminder-times { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
.rc-reminder .reminder-times input { max-width: 120px; }

/* ========== TECHNIQUE LIBRARY ========== */
.tech-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
.tech-card { padding: 24px; position: relative; }
.tech-card .tech-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; padding-right: 32px; }
.tech-card .diff-dots { display: flex; gap: 4px; align-items: center; }
.tech-card .diff-dots span { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--accent); }
.tech-card .diff-dots span.filled { background: var(--accent); }
.tech-card .tech-desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 14px; line-height: 1.65; }
.tech-accordion { margin-top: 14px; display: flex; flex-direction: column; }
.tech-tip { margin-top: 14px; padding: 12px 14px; background: var(--accent-dim); border-radius: var(--radius-xs); font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
.tech-tip strong { color: var(--accent); }
.tech-bookmark-btn { position: absolute; top: 16px; right: 16px; }

/* ========== SLEEP SCHEDULE ========== */
.sleep-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.rem-timeline { margin-top: 24px; }
.rem-timeline svg { width: 100%; height: auto; }
.rem-legend { display: flex; gap: 16px; margin-top: 12px; font-size: 0.8rem; color: var(--muted); flex-wrap: wrap; }
.rem-legend span { display: flex; align-items: center; gap: 6px; }
.rem-legend .dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* ========== EVENING RITUAL ========== */
.ritual-container {
  max-width: 560px; margin: 0 auto;
}
.ritual-step {
  padding: 32px 28px; margin-bottom: 16px; position: relative; overflow: hidden;
}
.ritual-step .step-num {
  font-family: 'Lora', serif; font-size: 0.75rem; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
}
.ritual-mist-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(159,234,232,0.04), transparent);
  animation: mistPulse 4s ease-in-out infinite;
}
@keyframes mistPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
.ritual-intention-input {
  font-family: 'Lora', serif; font-size: 1.1rem; text-align: center;
  background: var(--input-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 16px 20px; width: 100%;
  color: var(--text); line-height: 1.6;
}
.ritual-intention-input:focus { border-color: var(--accent); }
.wbtb-info {
  padding: 12px 16px; background: var(--accent-dim); border-radius: var(--radius-xs);
  font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-top: 12px;
}
.wbtb-info strong { color: var(--accent); }

/* ========== CONSTELLATION VIEW ========== */
.constellation-container { position: relative; width: 100%; }
.constellation-svg { width: 100%; height: auto; min-height: 400px; }
.constellation-tooltip {
  position: absolute; background: var(--surface); border: 1px solid var(--card-border);
  border-radius: var(--radius-xs); padding: 8px 14px; font-size: 0.82rem;
  color: var(--text); pointer-events: none; z-index: 10; box-shadow: var(--card-shadow);
  white-space: nowrap; display: none;
}

/* ========== ACHIEVEMENT MODAL ========== */
.achievement-modal {
  position: fixed; inset: 0; z-index: 250; background: var(--overlay);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); animation: fadeIn 0.4s ease;
}
.achievement-card {
  background: var(--surface); border: 2px solid var(--gold);
  border-radius: var(--radius); padding: 48px 36px; max-width: 400px;
  width: 90%; text-align: center; box-shadow: 0 0 60px rgba(245,217,122,0.15);
  animation: achievePop 0.5s ease;
}
@keyframes achievePop {
  0% { transform: scale(0.8); opacity: 0; }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
.achievement-card .achieve-icon { font-size: 3rem; margin-bottom: 16px; color: var(--gold); }
.achievement-card h2 { color: var(--gold); margin-bottom: 8px; }
.achievement-card p { color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

/* Badge shelf */
.badge-shelf { display: flex; flex-wrap: wrap; gap: 12px; }
.badge-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 14px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--card-border); background: var(--card-bg);

}
.badge-item.unlocked { border-color: rgba(245,217,122,0.4); background: rgba(245,217,122,0.06); }
.badge-item.locked { opacity: 0.35; }
.badge-item .badge-icon { font-size: 1.6rem; }
.badge-item .badge-name { font-size: 0.68rem; color: var(--muted); font-weight: 600; line-height: 1.3; }
.badge-item.unlocked .badge-name { color: var(--gold); }

/* ========== SETTINGS ========== */
.settings-card { padding: 24px; margin-bottom: 16px; }
.settings-card:last-of-type { margin-bottom: 0; }
.settings-card h3 { margin-bottom: 16px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--card-border); gap: 16px; }
.settings-row:last-child { border-bottom: none; }
.settings-row .settings-label { font-weight: 600; font-size: 0.93rem; }
.settings-row .settings-desc { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

/* Install banner */
.install-banner {
  background: var(--accent-dim); border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 16px;

}

/* RC Notification Setup */
.rc-setup-section { margin-top: 12px; }
.rc-technique-option {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border: 1px solid var(--card-border); border-radius: var(--radius-sm);

}

.rc-technique-option .rc-radio {

  transition: all var(--transition);
}
.rc-technique-option.selected .rc-radio { border-color: var(--accent); }
.rc-technique-option.selected .rc-radio::after {
  content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
}
.rc-freq-option {
  display: inline-flex; align-items: center; padding: 8px 16px;
  border: 1px solid var(--card-border); border-radius: 20px;
  cursor: pointer; transition: all var(--transition); font-size: 0.85rem; font-weight: 500;
  margin-right: 8px; margin-bottom: 8px;
}
.rc-freq-option:hover { border-color: var(--accent); }
.rc-freq-option.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

/* In-app RC notification banner */
.rc-notification-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 280;
  background: var(--surface); border-bottom: 2px solid var(--accent);
  padding: 16px 20px; display: flex; align-items: center; gap: 14px;
  animation: slideDown 0.4s ease; box-shadow: 0 4px 24px rgba(159,234,232,0.2);
}
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
.rc-notification-banner .rc-notif-text { flex: 1; }
.rc-notification-banner .rc-notif-text strong { color: var(--accent); }
.rc-notification-banner .rc-notif-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding: 20px 16px 100px; }
  .bottom-nav { display: flex; }
  .sleep-grid { grid-template-columns: 1fr; }
  .dash-stats { grid-template-columns: 1fr 1fr; }
  .rc-grid, .tech-grid { grid-template-columns: 1fr; }
  .modal { padding: 22px 18px; }
  .onboarding-card { padding: 32px 22px; }
  .form-row { grid-template-columns: 1fr; }
  .moon-streak-banner { flex-direction: column; text-align: center; gap: 12px; }
  .achievement-card { padding: 32px 22px; }
}
@media (min-width: 769px) and (max-width: 1024px) {

  .sidebar-logo span, .sidebar-nav a span { display: none; }
  .sidebar-nav a { justify-content: center; padding: 12px; }
  .main-content { margin-left: 68px; }
}
@media (min-width: 1025px) { .bottom-nav { display: none; } }

/* ========== REDUCED MOTION ========== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

<script>
/* ==========================================================================
   LUCIDLOG — APPLICATION LOGIC (v3: Engagement + Lucidity + Constellation)
   ========================================================================== */

// ==================== IndexedDB SETUP ====================
const DB_NAME = 'lucidlog-db';
const DB_VERSION = 2;
let db = null;

async function openDB() {
  if (db) return db;
  db = await idb.openDB(DB_NAME, DB_VERSION, {
    upgrade(database, oldVersion) {
      if (!database.objectStoreNames.contains('dreams')) {
        const ds = database.createObjectStore('dreams', { keyPath: 'id' });
        ds.createIndex('date', 'date');
        ds.createIndex('lucidityLevel', 'lucidityLevel');
      }
      if (!database.objectStoreNames.contains('settings'))
        database.createObjectStore('settings', { keyPath: 'key' });
      if (!database.objectStoreNames.contains('bookmarks'))
        database.createObjectStore('bookmarks', { keyPath: 'techniqueId' });
      if (!database.objectStoreNames.contains('dream_images'))
        database.createObjectStore('dream_images', { keyPath: 'dreamId' });
      if (!database.objectStoreNames.contains('achievements'))
        database.createObjectStore('achievements', { keyPath: 'id' });
      if (!database.objectStoreNames.contains('intentions'))
        database.createObjectStore('intentions', { keyPath: 'date' });
    }
  });
  return db;
}

// ==================== DATA ACCESS LAYER ====================
async function getAllDreams() {
  try { return await (await openDB()).getAll('dreams'); } catch { return []; }
}
async function getDream(id) {
  try { return await (await openDB()).get('dreams', id); } catch { return null; }
}
async function putDream(dream) {
  try { await (await openDB()).put('dreams', dream); } catch(e) { console.error('putDream', e); }
}
async function deleteDreamFromDB(id) {
  try { await (await openDB()).delete('dreams', id); } catch(e) { console.error('deleteDream', e); }
}
async function getSetting(key, defaultVal) {
  try { const r = await (await openDB()).get('settings', key); return r ? r.value : defaultVal; } catch { return defaultVal; }
}
async function putSetting(key, value) {
  try { await (await openDB()).put('settings', { key, value }); } catch(e) { console.error('putSetting', e); }
}
async function getAllBookmarks() {
  try { return (await (await openDB()).getAll('bookmarks')).map(b => b.techniqueId); } catch { return []; }
}
async function putBookmark(techniqueId) {
  try { await (await openDB()).put('bookmarks', { techniqueId }); } catch(e) { console.error('putBookmark', e); }
}
async function removeBookmark(techniqueId) {
  try { await (await openDB()).delete('bookmarks', techniqueId); } catch(e) { console.error('removeBookmark', e); }
}
async function getDreamImage(dreamId) {
  try { return await (await openDB()).get('dream_images', dreamId); } catch { return null; }
}
async function putDreamImage(dreamId, url) {
  try { await (await openDB()).put('dream_images', { dreamId, url, generatedAt: Date.now() }); } catch(e) { console.error('putDreamImage', e); }
}
async function deleteDreamImage(dreamId) {
  try { await (await openDB()).delete('dream_images', dreamId); } catch(e) { console.error('deleteDreamImage', e); }
}
async function getAllAchievements() {
  try { return await (await openDB()).getAll('achievements'); } catch { return []; }
}
async function putAchievement(ach) {
  try { await (await openDB()).put('achievements', ach); } catch(e) { console.error('putAchievement', e); }
}
async function getIntention(date) {
  try { return await (await openDB()).get('intentions', date); } catch { return null; }
}
async function putIntention(rec) {
  try { await (await openDB()).put('intentions', rec); } catch(e) { console.error('putIntention', e); }
}

// ==================== MIGRATION (localStorage → IndexedDB) ====================
async function migrateFromLocalStorage() {
  const migrated = await getSetting('migrated', false);
  if (migrated) return;
  const OLD_KEY = 'lucid_app_state';
  try {
    const raw = localStorage.getItem(OLD_KEY);
    if (!raw) { await putSetting('migrated', true); return; }
    const old = JSON.parse(raw);
    const d = await openDB();
    const tx = d.transaction(['dreams', 'settings', 'bookmarks'], 'readwrite');
    if (old.dreams && Array.isArray(old.dreams)) {
      for (const dream of old.dreams) {
        const mapped = { ...dream, lucidityLevel: dream.lucidity, isLucid: (dream.lucidity||0)>=3 };
        tx.objectStore('dreams').put(mapped);
      }
    }
    if (old.bookmarks && Array.isArray(old.bookmarks)) {
      for (const tid of old.bookmarks) tx.objectStore('bookmarks').put({ techniqueId: tid });
    }
    if (old.onboardingComplete) tx.objectStore('settings').put({ key: 'onboardingComplete', value: true });
    if (old.sleepSchedule) tx.objectStore('settings').put({ key: 'sleepSchedule', value: old.sleepSchedule });
    if (old.rcReminders) tx.objectStore('settings').put({ key: 'rcReminders', value: old.rcReminders });
    if (old.notifications) tx.objectStore('settings').put({ key: 'notifications', value: old.notifications });
    tx.objectStore('settings').put({ key: 'imageGen', value: true });
    tx.objectStore('settings').put({ key: 'migrated', value: true });
    await tx.done;
    localStorage.removeItem(OLD_KEY);
    showToast('Data migrated to new storage');
  } catch(e) {
    console.error('Migration failed', e);
    await putSetting('migrated', true);
  }
}

// ==================== IN-MEMORY CACHE ====================
let dreamsCache = [];
let bookmarksCache = [];
let currentPage = 'dashboard';
let currentJournalFilter = 'all';
let currentJournalSearch = '';

async function refreshCache() {
  dreamsCache = await getAllDreams();
  bookmarksCache = await getAllBookmarks();
}

// ==================== STAR FIELD ====================
function createStarField() {
  const c = document.getElementById('starField');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*4)+'s'; s.style.animationDuration = (3+Math.random()*3)+'s';
    if (Math.random()>0.7) { s.style.width='3px'; s.style.height='3px'; }
    c.appendChild(s);
  }
}

// ==================== TOAST ====================
function showToast(message, icon='check-circle') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className='toast';
  t.innerHTML=`<i data-lucide="${icon}" style="width:18px;height:18px;color:var(--accent);flex-shrink:0;"></i><span>${message}</span>`;
  c.appendChild(t); lucide.createIcons({nodes:[t]});
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(40px)';t.style.transition='all 0.3s ease';setTimeout(()=>t.remove(),300);},3000);
}

// ==================== MOON PHASE ====================
function getMoonPhase() {
  const knownNew=new Date(2000,0,6,18,14), syn=29.53058867;
  const diff=(Date.now()-knownNew.getTime())/(1000*60*60*24);
  const frac=((diff%syn)+syn)%syn/syn;
  let n;
  if(frac<0.0625)n='New Moon';else if(frac<0.1875)n='Waxing Crescent';else if(frac<0.3125)n='First Quarter';
  else if(frac<0.4375)n='Waxing Gibbous';else if(frac<0.5625)n='Full Moon';else if(frac<0.6875)n='Waning Gibbous';
  else if(frac<0.8125)n='Last Quarter';else if(frac<0.9375)n='Waning Crescent';else n='New Moon';
  return {name:n,fraction:frac};
}
function moonPhaseSVG(sz=48) {
  const m=getMoonPhase(),f=m.fraction; let p;
  if(f<=0.5){const r=Math.abs(f-0.25)/0.25;p=`<circle cx="24" cy="24" r="18" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/><path d="M24 6 A18 18 0 1 1 24 42 A${18*Math.max(0.05,r)} 18 0 1 ${f<0.25?'0':'1'} 24 6Z" fill="var(--accent)" opacity="0.5"/>`;}
  else{const r=Math.abs(f-0.75)/0.25;p=`<circle cx="24" cy="24" r="18" fill="var(--accent)" opacity="0.3"/><path d="M24 6 A18 18 0 1 0 24 42 A${18*Math.max(0.05,r)} 18 0 1 ${f>0.75?'0':'1'} 24 6Z" fill="var(--bg)" opacity="0.6"/>`;}
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 48 48">${p}</svg>`;
}

// Moon with crack for broken streak
function moonPhaseCrackedSVG(sz=48) {
  const m=getMoonPhase(),f=m.fraction; let p;
  if(f<=0.5){const r=Math.abs(f-0.25)/0.25;p=`<circle cx="24" cy="24" r="18" fill="none" stroke="var(--muted)" stroke-width="1.5" opacity="0.3"/><path d="M24 6 A18 18 0 1 1 24 42 A${18*Math.max(0.05,r)} 18 0 1 ${f<0.25?'0':'1'} 24 6Z" fill="var(--muted)" opacity="0.3"/>`;}
  else{const r=Math.abs(f-0.75)/0.25;p=`<circle cx="24" cy="24" r="18" fill="var(--muted)" opacity="0.2"/><path d="M24 6 A18 18 0 1 0 24 42 A${18*Math.max(0.05,r)} 18 0 1 ${f>0.75?'0':'1'} 24 6Z" fill="var(--bg)" opacity="0.4"/>`;}
  // Add crack line
  p += `<line x1="24" y1="14" x2="22" y2="24" stroke="var(--muted)" stroke-width="1" opacity="0.6"><animate attributeName="opacity" values="0;0.6;0.6" dur="0.4s" fill="freeze"/></line><line x1="22" y1="24" x2="26" y2="34" stroke="var(--muted)" stroke-width="1" opacity="0.6"><animate attributeName="opacity" values="0;0.6;0.6" dur="0.4s" fill="freeze"/></line>`;
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 48 48">${p}</svg>`;
}

function isFullMoon() {
  const m = getMoonPhase();
  return m.name === 'Full Moon';
}

// ==================== STREAK ====================
function calculateStreak() {
  if(!dreamsCache.length) return 0;
  const dates=[...new Set(dreamsCache.map(d=>d.date))].sort().reverse();
  const today=new Date().toISOString().split('T')[0];
  const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(dates[0]!==today&&dates[0]!==yest) return 0;
  let s=1; for(let i=1;i<dates.length;i++){if((new Date(dates[i-1])-new Date(dates[i]))/86400000===1)s++;else break;} return s;
}

// ==================== LUCID SUMMARY ====================
function getLucidSummary() {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const thisMonth = dreamsCache.filter(d => d.date >= monthStart);
  const lucidThisMonth = thisMonth.filter(d => d.isLucid).length;
  const totalThisMonth = thisMonth.length;
  return { lucid: lucidThisMonth, total: totalThisMonth };
}

// ==================== DREAM SIGN DETECTION ====================
const STOP_WORDS = new Set([
  'i','me','my','myself','we','our','ours','ourselves','you','your','yours',
  'yourself','yourselves','he','him','his','himself','she','her','hers',
  'herself','it','its','itself','they','them','their','theirs','themselves',
  'what','which','who','whom','this','that','these','those','am','is','are',
  'was','were','be','been','being','have','has','had','having','do','does',
  'did','doing','a','an','the','and','but','if','or','because','as','until',
  'while','of','at','by','for','with','about','against','between','through',
  'during','before','after','above','below','to','from','up','down','in',
  'out','on','off','over','under','again','further','then','once','here',
  'there','when','where','why','how','all','both','each','few','more','most',
  'other','some','such','no','nor','not','only','own','same','so','than',
  'too','very','s','t','can','will','just','don','should','now','also',
  'could','would','much','many','like','back','still','even','well','way',
  'really','thing','things','got','get','got','went','go','come','came',
  'see','saw','look','looked','know','knew','think','thought','feel','felt',
  'make','made','take','took','say','said','tell','told','find','found',
  'give','gave','keep','kept','let','put','seem','seemed','try','tried',
  'ask','asked','want','wanted','need','needed','one','two','first','last',
  'long','great','little','right','old','big','high','different','small',
  'large','next','early','young','important','another','every','around',
  'into','could','quite','rather','already','always','never','sometimes',
  'something','someone','anything','anyone','nothing','nobody','everything',
  'everyone','somewhere','anywhere','nowhere','everywhere'
]);

function extractDreamSigns(dreams, topN=5) {
  const freq = {};
  const lucidWords = new Set();
  for (const d of dreams) {
    if (!d.narrative) continue;
    const words = d.narrative.toLowerCase().replace(/[^a-z\s'-]/g, '').split(/\s+/);
    const uniqueInDream = new Set();
    for (const w of words) {
      if (w.length < 3 || STOP_WORDS.has(w)) continue;
      uniqueInDream.add(w);
      freq[w] = (freq[w]||0) + 1;
    }
    if (d.isLucid) {
      for (const w of uniqueInDream) lucidWords.add(w);
    }
  }
  const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, topN * 3);
  // Filter to likely nouns (heuristic: words that appear in 2+ dreams, skip very short)
  const candidates = sorted.filter(([w,c]) => c >= 2).slice(0, topN);
  return candidates.map(([word, count]) => ({
    word,
    count,
    isLucidSign: lucidWords.has(word)
  }));
}

// ==================== IMAGE PROMPT BUILDER ====================
function buildImagePrompt(dream) {
  const level = dream.lucidityLevel || 0;
  const type = level>=4?'fully lucid dream':level>=2?'semi-lucid dream':'vivid dream';
  const mood = (dream.emotions && dream.emotions.length) ? dream.emotions.join(', ') : 'mysterious, ethereal';
  const scene = (dream.narrative||'').slice(0,120);
  return [
    '2-panel comic strip, watercolour and ink illustration,',
    `depicting a ${type} titled "${dream.title}".`,
    `Mood: ${mood}. Scene: ${scene}.`,
    'Teal and midnight navy colour palette. Surreal, ethereal.',
    'Field guide illustration aesthetic. No text. No speech bubbles.'
  ].join(' ');
}

// Update image in DOM after generation or IDB lookup
function updateImageInDOM(dreamId, url) {
  window.__dreamImageCache = window.__dreamImageCache || {};

function showImageFallbackInDOM(dreamId) {

}

// Image generation with retry and DOM update
async function triggerImageGeneration(dreamId, retryCount=0) {
  const imageGenOn = await getSetting('imageGen', true);
  if (!imageGenOn) return;
  if (!navigator.onLine) {
    const d2 = await getDream(dreamId);
    if(d2) await putDream({...d2, imagePending:true});
    showImageFallbackInDOM(dreamId);
    return;
  }
  const existing = await getDreamImage(dreamId);
  if (existing && existing.url) {
    updateImageInDOM(dreamId, existing.url);
    return;
  }
  const dream = await getDream(dreamId);
  if (!dream) return;
  const prompt = buildImagePrompt(dream);
  const seed = String(dreamId) + (retryCount > 0 ? '-retry' + retryCount : '');
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=384&nologo=true&seed=${encodeURIComponent(seed)}`;
  const img = new Image();
  let settled = false;
  const timer = setTimeout(() => {
    if (settled) return;
    settled = true;
    img.src = '';
    console.warn('LucidLog: image generation timed out for', dreamId, '(retry', retryCount, ')');
    if (retryCount < 1) {
      triggerImageGeneration(dreamId, retryCount + 1);
    } else {
      showImageFallbackInDOM(dreamId);
    }
  }, 120000);
  img.onload = async () => {
    if (settled) return;
    settled = true;
    clearTimeout(timer);
    await putDreamImage(dreamId, url);
    updateImageInDOM(dreamId, url);
  };
  img.onerror = () => {
    if (settled) return;
    settled = true;
    clearTimeout(timer);
    console.warn('LucidLog: image generation failed for', dreamId, '(retry', retryCount, ')');
    if (retryCount < 1) {
      setTimeout(() => triggerImageGeneration(dreamId, retryCount + 1), 2000);
    } else {
      showImageFallbackInDOM(dreamId);
    }
  };
  img.src = url;
}

// Retry pending images on app open
async function retryPendingImages() {
  const dreams = await getAllDreams();
  // Also populate cache for all existing images
  window.__dreamImageCache = window.__dreamImageCache || {};
  for (const d of dreams) {
    const rec = await getDreamImage(d.id);
    if (rec && rec.url) {
      window.__dreamImageCache[d.id] = rec.url;
    }
  }
  // Retry pending
  for (const d of dreams) {
    if (d.imagePending && navigator.onLine) {
      await putDream({...d, imagePending: false});
      triggerImageGeneration(d.id);
    }
  }
}

// Async image loader
async function loadImagesIntoDOM(dreamIds, container) {
  window.__dreamImageCache = window.__dreamImageCache || {};
  for (const id of dreamIds) {
    const rec = await getDreamImage(id);
    if (rec && rec.url) {
      window.__dreamImageCache[id] = rec.url;
    }
  }
  if (!container) container = document;
  for (const id of dreamIds) {
    const url = window.__dreamImageCache[id];
    if (!url) continue;
    const thumb = container.querySelector(`[data-thumb="${id}"]`);
    if (thumb) thumb.innerHTML = `<img src="${url}" alt="" loading="lazy">`;
    const banner = container.querySelector(`[data-banner="${id}"]`);
    if (banner) banner.innerHTML = `<img class="dream-banner" src="${url}" alt="Dream illustration" loading="lazy">`;
  }
}

let achievementDebounceTimer = null;

async function checkAchievements() {
  clearTimeout(achievementDebounceTimer);
  achievementDebounceTimer = setTimeout(async () => {
    const unlocked = (await getAllAchievements()).map(a => a.id);
    const streak = calculateStreak();
    const totalDreams = dreamsCache.length;
    const lucidDreams = dreamsCache.filter(d => d.isLucid).length;
    const checks = [
      { id: 'first_dream', cond: totalDreams >= 1 },
      { id: 'first_lucid', cond: lucidDreams >= 1 },
      { id: 'streak_7', cond: streak >= 7 },
      { id: 'streak_30', cond: streak >= 30 },
      { id: 'lucid_10', cond: lucidDreams >= 10 },
      { id: 'dream_archaeologist', cond: totalDreams >= 50 },
      { id: 'full_moon_logger', cond: isFullMoon() && totalDreams > 0 },
    ];
    for (const check of checks) {
      if (check.cond && !unlocked.includes(check.id)) {
        const def = ACHIEVEMENTS_DEF.find(a => a.id === check.id);
        if (def) {
          await putAchievement({ id: def.id, unlockedAt: Date.now() });
          showAchievementModal(def);
        }
      }
    }
  }, 300);
}

function showAchievementModal(def) {
  const el = document.createElement('div');
  el.className = 'achievement-modal';
  el.innerHTML = `<div class="achievement-card">
    <div class="achieve-icon">${def.icon}</div>
    <h2>${def.name}</h2>
    <p>${def.desc}</p>
    <button class="btn btn-gold" onclick="this.closest('.achievement-modal').remove()">Celebrate</button>
  </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', e => { if(e.target === el) el.remove(); });
}

function renderDreamList(filter='all',search='') {
  let dreams=[...dreamsCache].reverse();

  document.body.appendChild(overlay); lucide.createIcons({nodes:[overlay]});
  let currentLucidity=lucidity;
  overlay.querySelectorAll('.star-btn').forEach(btn=>{btn.addEventListener('click',()=>{currentLucidity=parseInt(btn.dataset.val);overlay.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('filled',parseInt(b.dataset.val)<=currentLucidity));});});
  overlay.querySelectorAll('.emotion-chips .chip').forEach(chip=>{chip.addEventListener('click',()=>chip.classList.toggle('selected'));});
  // Auto-toggle isLucid when lucidity >= 3
  const lucidToggle = overlay.querySelector('#isLucidToggle');
  overlay.querySelectorAll('.star-btn').forEach(btn=>{btn.addEventListener('click',()=>{if(parseInt(btn.dataset.val)>=3&&currentLucidity>=3)lucidToggle.checked=true;});});

}

async function saveDream(editId) {
  const modal=document.getElementById('dreamModal');
  const title=modal.querySelector('#dreamTitle').value.trim();
  const date=modal.querySelector('#dreamDate').value;
  const time=modal.querySelector('#dreamTime').value;
  const narrative=modal.querySelector('#dreamNarrative').value.trim();
  const lucidityLevel=[...modal.querySelectorAll('.star-btn.filled')].length;
  const isLucid=modal.querySelector('#isLucidToggle').checked;
  const emotions=[...modal.querySelectorAll('.emotion-chips .chip.selected')].map(c=>c.dataset.emotion);
  if(!title){showToast('Please add a title','alert-circle');return;}
  if(!narrative){showToast('Describe your dream to save it','alert-circle');return;}
  let dreamId = editId;
  if(editId) {
    const existing = await getDream(editId);
    await putDream({ ...existing, title, date, time, narrative, lucidityLevel, isLucid, emotions });
  } else {
    dreamId = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    await putDream({ id: dreamId, title, date, time, narrative, lucidityLevel, isLucid, emotions, createdAt: Date.now() });
  }
  closeModal(); showToast(editId?'Dream updated':'Dream saved');
  await refreshCache();
  checkAchievements();
  await renderPage(currentPage);
  if (dreamId) triggerImageGeneration(dreamId);
}

async function deleteDreamAction(id) {
  if(!confirm('Delete this dream entry permanently?'))return;
  await deleteDreamFromDB(id); await deleteDreamImage(id);
  closeModal(); showToast('Dream deleted','trash-2');
  await renderPage(currentPage);
}

async function viewDream(id) {
  const d=await getDream(id); if(!d)return;
  const overlay=document.createElement('div'); overlay.className='modal-overlay'; overlay.id='dreamModal';
  const date=new Date(d.date+'T00:00:00');

  const stars=Array.from({length:5},(_,i)=>`<span style="color:${i<(d.lucidityLevel||0)?'var(--accent)':'var(--muted)'};opacity:${i<(d.lucidityLevel||0)?'1':'0.2'};">&#9733;</span>`).join('');
  const imgRec = await getDreamImage(id);
  const cachedUrl = window.__dreamImageCache && window.__dreamImageCache[id];
  const imgUrl = (imgRec && imgRec.url) || cachedUrl;

async function regenerateImage(dreamId) {
  await deleteDreamImage(dreamId);
  if (window.__dreamImageCache) delete window.__dreamImageCache[dreamId];
  // Show shimmer in current banner while regenerating
  const banner = document.querySelector(`[data-banner="${dreamId}"]`);
  if (banner) banner.innerHTML = `<div class="dream-banner-shimmer shimmer"></div>`;
  const thumb = document.querySelector(`[data-thumb="${dreamId}"]`);
  if (thumb) thumb.innerHTML = `<div class="thumb-shimmer shimmer"></div>`;
  showToast('Regenerating dream art...', 'image');

function timeToMinutes(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function minutesToTime(m){m=((m%1440)+1440)%1440;return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`;}
function calculateREMWindows(bedtime,waketime){let bed=timeToMinutes(bedtime),wake=timeToMinutes(waketime);if(wake<=bed)wake+=1440;const total=wake-bed,windows=[];let s=bed+70,len=10,c=1;while(s<wake){windows.push({start:s,end:Math.min(s+len,wake),cycle:c,isOptimal:c>=3});s+=90;len=Math.min(len+10,40);c++;}return{windows,total,bed,wake};}
function calculateWBTB(bedtime,waketime){const{windows}=calculateREMWindows(bedtime,waketime);const o=windows.find(w=>w.isOptimal);return o?minutesToTime(o.start-5):windows.length?minutesToTime(windows[windows.length-1].start-5):'04:30';}
function renderREMTimeline({windows,total,bed,wake}){const h=80,w=700,pad=44,barY=30,barH=26,barW=w-pad*2;let s=`<svg viewBox="0 0 ${w} ${h}" fill="none" role="img" aria-label="REM timeline"><rect x="${pad}" y="${barY}" width="${barW}" height="${barH}" rx="5" fill="var(--accent-dim)" opacity="0.3"/>`;windows.forEach(v=>{const x1=pad+((v.start-bed)/total)*barW,x2=pad+((v.end-bed)/total)*barW,ww=Math.max(x2-x1,4);if(v.isOptimal){s+=`<rect x="${x1}" y="${barY-3}" width="${ww}" height="${barH+6}" rx="4" fill="var(--accent)" opacity="0.55"/><text x="${x1+ww/2}" y="${barY-8}" text-anchor="middle" fill="var(--accent)" font-size="9" font-family="Inter,sans-serif">Optimal</text>`;}else{s+=`<rect x="${x1}" y="${barY}" width="${ww}" height="${barH}" rx="4" fill="var(--accent)" opacity="0.22"/>`;}s+=`<text x="${x1+ww/2}" y="${barY+barH+14}" text-anchor="middle" fill="var(--muted)" font-size="8" font-family="JetBrains Mono,monospace">R${v.cycle}</text>`;});s+=`<text x="${pad}" y="${barY-6}" fill="var(--muted)" font-size="9" font-family="JetBrains Mono,monospace">${minutesToTime(bed)}</text><text x="${pad+barW}" y="${barY-6}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="JetBrains Mono,monospace">${minutesToTime(wake)}</text></svg>`;return s;}

// ---- Constellation View ----
function renderConstellation() {
  if (!dreamsCache.length) {
    return `<div class="page"><h1 style="margin-bottom:6px;">Constellation</h1><div class="card empty-state" style="margin-top:24px;"><svg width="72" height="72" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="30" stroke="var(--accent)" stroke-width="1" opacity="0.2"/><circle cx="40" cy="40" r="2" fill="var(--accent)" opacity="0.5"/><circle cx="25" cy="30" r="1.5" fill="var(--accent)" opacity="0.3"/><circle cx="55" cy="25" r="1.5" fill="var(--accent)" opacity="0.3"/><circle cx="50" cy="55" r="1.5" fill="var(--accent)" opacity="0.3"/></svg><h3>Your sky is empty</h3><p>Log dreams to fill your personal cosmos. Each dream becomes a star.</p><button class="btn btn-primary btn-sm" onclick="openDreamForm()">Log a dream</button></div></div>`;
  }

  const svgW = 800, svgH = 500, padX = 50, padY = 40;
  const plotW = svgW - padX * 2, plotH = svgH - padY * 2;

  // Date range
  const dates = dreamsCache.map(d => new Date(d.date + 'T00:00:00').getTime());
  const minDate = Math.min(...dates), maxDate = Math.max(...dates);
  const dateRange = maxDate - minDate || 86400000;

  // Build star data
  const stars = dreamsCache.map(d => {
    const dateMs = new Date(d.date + 'T00:00:00').getTime();
    const x = padX + ((dateMs - minDate) / dateRange) * plotW;
    // Y axis: hour of the day from the time field
    const timeParts = (d.time || '06:00').split(':');
    const hour = parseInt(timeParts[0] || 6) + parseInt(timeParts[1] || 0) / 60;
    const y = padY + plotH - (hour / 24) * plotH; // 0 at bottom, 24 at top
    const wordCount = (d.narrative || '').split(/\s+/).length;
    const size = Math.max(3, Math.min(10, wordCount / 15));
    return { ...d, x, y, size };
  });

  // Y-axis labels
  const yLabels = [0, 3, 6, 9, 12, 15, 18, 21, 24].map(h => {
    const y = padY + plotH - (h / 24) * plotH;
    const label = h === 0 ? '12am' : h < 12 ? h + 'am' : h === 12 ? '12pm' : (h-12) + 'pm';
    return `<text x="${padX - 8}" y="${y + 4}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="JetBrains Mono,monospace">${label}</text><line x1="${padX}" y1="${y}" x2="${svgW - padX}" y2="${y}" stroke="var(--card-border)" stroke-width="0.5" opacity="0.3"/>`;
  }).join('');

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" class="constellation-svg" fill="none" role="img" aria-label="Dream constellation">`;
  svg += yLabels;

  // Draw stars
  for (const s of stars) {
    const color = s.isLucid ? 'var(--accent)' : 'rgba(159,234,232,0.35)';
    const glowFilter = s.isLucid ? `filter="url(#lucidGlow)"` : '';
    svg += `<circle cx="${s.x}" cy="${s.y}" r="${s.size}" fill="${color}" ${glowFilter} class="constellation-star" data-title="${escapeHtml(s.title)}" style="cursor:pointer;"/>`;
  }

  // Lucid glow filter
  svg += `<defs><filter id="lucidGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;

  svg += `</svg>`;

  return `<div class="page">
    <h1 style="margin-bottom:6px;">Constellation</h1>
    <p class="text-muted" style="margin-bottom:20px;max-width:560px;">Each star is a dream. Size shows detail. Colour shows lucidity. Tap a star to see its name.</p>
    <div class="card" style="padding:20px;position:relative;">
      <div class="constellation-container" id="constellationContainer">
        ${svg}
        <div class="constellation-tooltip" id="constTooltip"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:0.8rem;color:var(--muted);flex-wrap:wrap;">
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;"></span> Lucid dream</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:50%;background:rgba(159,234,232,0.35);flex-shrink:0;"></span> Non-lucid</span>
        <span style="display:flex;align-items:center;gap:6px;"><span style="font-size:0.75rem;">Star size = word count</span></span>
      </div>
    </div>
  </div>`;
}

async function startRCNotifications() {
  const techniqueEl = document.querySelector('.rc-technique-option.selected');

    return;
  }

  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    showToast(`${frequency} daily reminders set for "${opt.name}"`, 'bell');
    schedulePushRCReminders(opt, frequency);
  } else {
    showToast('Push denied. Using in-app reminders instead.', 'alert-circle');
    scheduleInAppRCReminders(opt, frequency);
  }
}

let rcReminderTimers = [];

function stopRCNotifications() {
  rcReminderTimers.forEach(t => clearTimeout(t));
  rcReminderTimers = [];
}

function schedulePushRCReminders(opt, frequency) {
  stopRCNotifications();
  const now = new Date();
  const startHour = 8, endHour = 22;
  const totalMinutes = (endHour - startHour) * 60;
  const intervalMin = totalMinutes / frequency;

  for (let i = 0; i < frequency; i++) {
    const randomOffset = Math.random() * intervalMin * 0.8;
    const minutesFromStart = i * intervalMin + randomOffset;
    const fireTime = new Date(now);
    fireTime.setHours(startHour, 0, 0, 0);
    fireTime.setTime(fireTime.getTime() + minutesFromStart * 60000);

    const delay = fireTime.getTime() - now.getTime();
    if (delay <= 0) continue;

    const timer = setTimeout(() => {
      new Notification('LucidLog — Reality Check', {
        body: `Are you dreaming? ${opt.short}. If uncertain — you might be.`,
        icon: window.__MOON_ICON_512 || '',
        tag: 'lucidlog-rc-' + i
      });
    }, delay);
    rcReminderTimers.push(timer);
  }
}

function scheduleInAppRCReminders(opt, frequency) {
  stopRCNotifications();
  const now = new Date();
  const startHour = 8, endHour = 22;
  const totalMinutes = (endHour - startHour) * 60;
  const intervalMin = totalMinutes / frequency;

  for (let i = 0; i < frequency; i++) {
    const randomOffset = Math.random() * intervalMin * 0.8;
    const minutesFromStart = i * intervalMin + randomOffset;
    const fireTime = new Date(now);
    fireTime.setHours(startHour, 0, 0, 0);
    fireTime.setTime(fireTime.getTime() + minutesFromStart * 60000);

    const delay = fireTime.getTime() - now.getTime();
    if (delay <= 0) continue;

    const timer = setTimeout(() => {
      showRCInAppBanner(opt);
    }, delay);
    rcReminderTimers.push(timer);
  }
}

async function exportData() {

  const d = await openDB(); const tx = d.transaction('settings','readonly'); const store = tx.objectStore('settings'); let cursor = await store.openCursor();

  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`lucidlog-data-${new Date().toISOString().split('T')[0]}.json`; a.click(); URL.revokeObjectURL(url);

}

async function importData(event) {

  reader.readAsText(file);
}

// ==================== PAGE EVENT BINDING ====================
function bindPageEvents(page) {
  if(page==='journal'){
    const searchInput=document.getElementById('journalSearch'); 
    if(searchInput){
      searchInput.addEventListener('input',()=>{
        currentJournalSearch=searchInput.value;
        document.getElementById('dreamListContainer').innerHTML=renderDreamList(currentJournalFilter,currentJournalSearch);
        loadImagesIntoDOM(dreamsCache.map(d=>d.id),document.getElementById('dreamListContainer'));
      });
    }
    document.querySelectorAll('[data-filter]').forEach(chip=>{
      chip.addEventListener('click',()=>{
        document.querySelectorAll('[data-filter]').forEach(c=>c.classList.remove('selected'));
        chip.classList.add('selected');
        currentJournalFilter=chip.dataset.filter;
        currentJournalSearch=searchInput?searchInput.value:'';
        document.getElementById('dreamListContainer').innerHTML=renderDreamList(currentJournalFilter,currentJournalSearch);
        loadImagesIntoDOM(dreamsCache.map(d=>d.id),document.getElementById('dreamListContainer'));
      });
    });
  }
  if(page==='reality-check'){
    (async()=>{
      const rc=await getSetting('rcReminders',{enabled:false,times:['08:00','14:00','20:00']});
      const toggle=document.getElementById('rcToggle');
      if(toggle){toggle.checked=rc.enabled;toggle.addEventListener('change',async()=>{rc.enabled=toggle.checked;await putSetting('rcReminders',rc);});}
      const timesDiv=document.getElementById('rcTimes');
      if(timesDiv){timesDiv.innerHTML=rc.times.map((t,i)=>`<input type="time" value="${t}" data-rc-time="${i}" aria-label="Reminder time ${i+1}" style="max-width:120px;">`).join('')+`<button class="btn btn-secondary btn-sm" onclick="addRCReminder()">+ Add time</button>`;
      timesDiv.querySelectorAll('[data-rc-time]').forEach(input=>{input.addEventListener('change',async()=>{const idx=parseInt(input.dataset.rcTime);rc.times[idx]=input.value;await putSetting('rcReminders',rc);});});}
    })();
  }
  if(page==='constellation'){
    const container=document.getElementById('constellationContainer');
    if(container){
      const tooltip=document.getElementById('constTooltip');
      container.querySelectorAll('.constellation-star').forEach(star=>{
        star.addEventListener('mouseenter',e=>{
          tooltip.textContent=star.dataset.title;
          tooltip.style.display='block';
          const rect=container.getBoundingClientRect();
          tooltip.style.left=(e.clientX-rect.left+12)+'px';
          tooltip.style.top=(e.clientY-rect.top-30)+'px';
        });
        star.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
        star.addEventListener('mousemove',e=>{
          const rect=container.getBoundingClientRect();
          tooltip.style.left=(e.clientX-rect.left+12)+'px';
          tooltip.style.top=(e.clientY-rect.top-30)+'px';
        });
      });
    }
  }
}

async function addRCReminder(){
  const rc=await getSetting('rcReminders',{enabled:false,times:['08:00','14:00','20:00']});
  if(rc.times.length>=8){showToast('Maximum 8 reminder times','alert-circle');return;}
  rc.times.push('12:00');await putSetting('rcReminders',rc);await renderPage(currentPage);
}

// ==================== ONBOARDING ====================
function showOnboarding() {
  const overlay=document.getElementById('onboardingOverlay');
  const steps=[
    {title:'Welcome to LucidLog',desc:'Your personal companion for exploring lucid dreaming. Learn techniques, track your dreams, and unlock awareness within your dreams.',icon:'moon'},
    {title:'Record Your Dreams',desc:'Keep a dream journal to improve recall and identify patterns. The more you remember, the easier it becomes to recognise when you\'re dreaming.',icon:'book-open'},
    {title:'Practice Reality Checks',desc:'Build the habit of questioning your reality throughout the day. This habit carries into your dreams, triggering lucidity when something doesn\'t add up.',icon:'scan-eye'},
    {title:'Evening Ritual',desc:'Each night, review your dream signs, set a MILD intention, and optionally set a WBTB alarm. This pre-sleep routine is the bridge to lucidity.',icon:'sunset'}
  ];
  let step=0;
  function renderStep(){
    overlay.style.display='flex'; overlay.className='onboarding-overlay';
    overlay.innerHTML=`<div class="onboarding-card"><i data-lucide="${steps[step].icon}" style="width:44px;height:44px;color:var(--accent);margin:0 auto 18px;display:block;"></i><h2>${steps[step].title}</h2><p>${steps[step].desc}</p><div class="onboarding-steps">${steps.map((_,i)=>`<div class="onboarding-dot${i===step?' active':''}"></div>`).join('')}</div><div style="display:flex;gap:10px;justify-content:center;">${step>0?'<button class="btn btn-secondary" onclick="onboardBack()">Back</button>':''}${step<steps.length-1?'<button class="btn btn-primary" onclick="onboardNext()">Next</button>':'<button class="btn btn-primary" onclick="onboardComplete()">Get Started</button>'}</div></div>`;
    lucide.createIcons({nodes:[overlay]});
  }
  window.onboardNext=()=>{step++;renderStep();};
  window.onboardBack=()=>{step--;renderStep();};
  window.onboardComplete=async()=>{await putSetting('onboardingComplete',true);overlay.style.display='none';};
  renderStep();
}

// ==================== SCHEDULE EVENING RITUAL NOTIFICATION ====================
function scheduleRitualNotification() {
  (async()=>{
    const ritualTime = await getSetting('ritualTime','22:00');
    const rcSetup = await getSetting('rcNotifSetup', { technique:'fingers', frequency:5, enabled:false });
    if(!rcSetup.enabled) return;
    const [h,m] = ritualTime.split(':').map(Number);
    const now = new Date();
    const fireTime = new Date(now);
    fireTime.setHours(h,m,0,0);
    let delay = fireTime.getTime() - now.getTime();
    if(delay < 0) delay += 86400000; // Tomorrow
    setTimeout(async()=>{
      if('Notification' in window && Notification.permission === 'granted'){
        new Notification('LucidLog — Evening Ritual', {
          body: 'Time for your pre-sleep ritual. Review dream signs and set your intention.',
          icon: window.__MOON_ICON_512 || '',
          tag: 'lucidlog-ritual'
        });
      } else {
        showToast('Time for your evening ritual. Tap to begin.', 'sunset');
      }
    }, delay);
  })();
}

// ==================== INIT ====================
async function init() {
  createStarField();
  await openDB();
  await migrateFromLocalStorage();
  await refreshCache();
  const onboardingDone = await getSetting('onboardingComplete', false);
  if (!onboardingDone) showOnboarding();
  navigate('dashboard');
  retryPendingImages();
  scheduleRitualNotification();
  // Auto-start RC notifications if previously enabled
  const rcSetup = await getSetting('rcNotifSetup', { technique:'fingers', frequency:5, enabled:false });
  if(rcSetup.enabled) {
    const opt = RC_NOTIF_OPTIONS.find(o=>o.id===rcSetup.technique) || RC_NOTIF_OPTIONS[0];
    if('Notification' in window && Notification.permission === 'granted') {
      schedulePushRCReminders(opt, rcSetup.frequency);
    } else {
      scheduleInAppRCReminders(opt, rcSetup.frequency);
    }
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

<!-- Inline Service Worker for PWA (must be at end of body) -->
<script>
(function(){
  if (!('serviceWorker' in navigator)) return;
  const SW_CODE = `
    const CACHE = 'lucidlog-v3';
    self.addEventListener('install', e =>
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/']))));
    self.addEventListener('activate', e =>
      e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e =>
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  try {
    const blob = new Blob([SW_CODE], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob));
  } catch(e) { console.warn('SW registration failed', e); }
})();
</script>
